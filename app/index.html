rden hangisidir?", "options": ["Ömür — Gençlik — Mal (nereden/nereye) — İlim (ne amel ettiği)", "İman — Namaz — Oruç — Zekât şeklinde dört ibadetten sorgulanır", "Ailesi — Malı — Komşusu — Ümmeti şeklinde dört sorumluluktan", "Kalbi — Dili — Eli — Ayağı şeklinde dört uzvundan sorgulanır", "Farz — Vâcip — Sünnet — Nafile şeklinde dört ibadet türünden"], "answer": "A", "sinav": 3}, {"no": "33", "body": "Kitapta namazdaki Sübhâneke duasının iki önemli işlevi açıklanmıştır: Birincisi, nefsini kusursuz gören emmâre nefse karşı ilk darbeyi vurmak; ikincisi, mâsivâyı arkada bırakarak kesretten vahdete yol bulmak.\n\nBu iki işlev birlikte değerlendirildiğinde Sübhâneke duasının asıl anlamı aşağıdakilerden hangisidir?", "options": ["Akıllı = nefsini hesaba çekip ahiret için çalışan; vaiz olarak ölüm yeter", "Akıllı = en çok mal biriktiren; vaiz olarak fakirlik yeter", "Akıllı = en çok ilim öğrenen; vaiz olarak cehalet yeter", "Akıllı = en çok sadaka veren; vaiz olarak hastalık yeter", "Akıllı = en çok oruç tutan kimse; vaiz olarak açlık yeter"], "answer": "D", "sinav": 3}, {"no": "34", "body": "Kitapta Fatiha sûresinin özel konumu anlatılırken Allah'ın bu sûreyi \"kuluyla arasında paylaştırdığı\" belirtilmiş ve Peygamberimizin namazda kıraatin \"kulun Rabbiyle özel olarak konuşması\" anlamına geldiğini bildirdiği aktarılmıştır.\n\nBu iki bilginin hadis kaynakları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Buhârî, İmân / Müslim, İmân", "Müslim, Salât, 38 / Buhârî, Salât, 36", "Tirmizî, Salât / Ebû Dâvûd, Salât", "Ahmed, Müsned / Nesâî, Salât", "Buhârî, Tefsîr / Müslim, Tefsîr"], "answer": "B", "sinav": 3}, {"no": "35", "body": "Kitapta ibadetlerin semereleri (meyveleri) karşılaştırılmıştır. Orucun semeresi nefsin temizlenmesi, zekâtın semeresi malın temizlenmesi, haccın semeresi bağışlanmanın gerekliliği, cihadın semeresi cennetin gerekliliğidir.\n\nNamezin semeresi ve diğer ibadetlerden farkı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sabah=bahar/diriliş — Öğle=güneşin zirvesi/gençlik — İkindi=hazan/ihtiyarlık", "Sabah=yaz/gençlik — Öğle=sonbahar/olgunluk — İkindi=kış/yaşlılık", "Sabah=kış/sükûnet — Öğle=ilkbahar/canlanma — İkindi=yaz/coşku", "Sabah=sonbahar/hüzün — Öğle=kış/dinlenme — İkindi=bahar/uyanış", "Sabah=gece/karanlık — Öğle=şafak/aydınlık — İkindi=akşam/batış"], "answer": "C", "sinav": 3}, {"no": "36", "body": "Kitapta 7 semanın meleklerinin her birinin farklı bir ibadet halinde olduğu anlatılmıştır. Dünya semasının ehli secdede, ikinci semanın ehli rükûda, üçüncü semanın ehli kıyamda, yedinci semanın ehli ise Arş'ın etrafında tavaf edip kanat çırpmaktadır.\n\nKitaba göre tüm semavat ehlinin ibadetlerinin tek bir namazda toplanmasının hikmeti aşağıdakilerden hangisidir?", "options": ["Namazın en uzun ibadet olması", "Namazın yalnızca insana farz olması", "Namazın Arş'a denk gelmesi", "Namazın cemaatle kılınması", "Namazın beş vakit olması"], "answer": "C", "sinav": 3}, {"no": "37", "body": "Kitapta namazın kabul şekilleri ve cennete girme grupları anlatılmıştır. Birinci grup Allah için namaza durur ama zahiri düşünmekten Allah'ı düşünmeyi ihmal eder. İkinci grup Allah için namaza durur ve hep Allah'ı düşünür. Üçüncü grup mücâhede ehlidir.\n\nBu grupların cennete girme sıralaması aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["1. grup önce, 2. grup sonra, 3. grup en son", "Hepsi aynı anda girer", "3. grup önce, 2. grup sonra, 1. grup en son", "2. grup önce, 1. grup sonra, 3. grup en son", "Yalnızca 2. grup girer"], "answer": "D", "sinav": 3}, {"no": "38", "body": "Kitapta namazın dışındaki farzlar (şartlar) ve içindeki farzlar (rükünler) ayrı ayrı sıralanmıştır. Dışındaki farzlar: hadesten taharet, necasetten taharet, setr-i avret, istikbâl-i kıble, vakit ve niyet.\n\nAşağıdakilerden hangisi namazın içindeki farzlardan (rükünlerden) biri değildir?", "options": ["İftitah tekbiri", "Kıyam", "Ka'de-i ahire", "Rükû", "Niyet"], "answer": "E", "sinav": 3}, {"no": "39", "body": "Kitapta setr-i avret konusu anlatılırken erkek ve kadın için farklı ölçüler verilmiştir.\n\nErkekler ve kadınlar için avret sınırları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Erkek: Omuz-diz arası / Kadın: Tüm vücut", "Erkek: Göbek-ayak arası / Kadın: Eller dışındaki tüm vücut", "Erkek: Bel-diz arası / Kadın: Yüz dışındaki tüm vücut", "Erkek: Göbek-diz arası / Kadın: El, yüz ve ayaklar dışındaki tüm vücut", "Erkek: Omuz-ayak arası / Kadın: Tüm vücut"], "answer": "D", "sinav": 3}, {"no": "40", "body": "Kitapta cenaze namazının dört tekbirle kılındığı ve her tekbirde farklı duaların okunduğu anlatılmıştır.\n\nBirinci tekbirde Sübhâneke duasına eklenen ilave ifade ve üçüncü tekbirde okunan dua aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["1. tekbir: \"ve celle senâük\" eklenir / 3. tekbir: Salli-Bârik okunur", "1. tekbir: \"velâ ilâhe gayruke\" eklenir / 3. tekbir: Fatiha okunur", "1. tekbir: Hiçbir ekleme yapılmaz / 3. tekbir: Salli-Bârik okunur", "1. tekbir: \"Tebârekesmüke\" eklenir / 3. tekbir: Tahiyyat okunur", "1. tekbir: \"ve celle senâük\" eklenir / 3. tekbir: Cenaze duası okunur"], "answer": "E", "sinav": 3}, {"no": "41", "body": "Kitapta namazları birleştirme (cem) konusu açıklanmıştır.\n\nAşağıdakilerden hangisi cem hakkında verilen bilgilerden biri değildir?", "options": ["Yalnızca öğle ile ikindi birleştirilebilir", "Öğle ile akşam namazı birleştirilebilir", "Sabah namazı hiçbir namazla birleştirilemez", "Namazlar peş peşe ve sırasıyla kılınır", "Yalnızca akşam ile yatsı birleştirilebilir"], "answer": "B", "sinav": 3}, {"no": "42", "body": "Kitapta \"tertip sahibi\" kavramı açıklanmıştır. Tertip sahibi olan kişinin kaza namazı ile vakit namazı arasında sıraya uyması gerekir.\n\nKitaba göre \"tertip sahibi\" kimdir ve tertibin düşme şartı nedir?", "options": ["1 vakitten az kazası olan / Kazayı kılarsa düşer", "10 vakitten az kazası olan / İmamın izniyle düşer", "6 vakitten az namazı kazaya kalmamış kişi / Kazaya kalanlar 6 vakit veya daha fazla olursa düşer", "Hiç kazası olmayan / Bir vakit kazaya kalırsa düşer", "3 vakitten az kazası olan / Yolculukta düşer"], "answer": "C", "sinav": 3}, {"no": "43", "body": "Kitapta Hendek Savaşı sırasında harbin şiddetinden dolayı kılınamayan bir vakit namazı ve yolculukta uyuyakalınarak kaçırılan bir sabah namazı örnek verilmiştir.\n\nHendek Savaşı'nda kılınamayan namaz ve ne zaman kaza edildiği aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Öğle namazı — akşam namazından önce kaza edilmiş", "Cuma namazı — ertesi gün kaza edilmiş", "Sabah namazı — öğle namazından önce kaza edilmiş", "Akşam namazı — yatsı namazından sonra kaza edilmiş", "İkindi namazı — akşam ile yatsı arasında kaza edilmiş"], "answer": "E", "sinav": 3}, {"no": "44", "body": "Kitapta namazda dua ve sûreleri okurken sesin durumu hakkında şu bilgi verilmiştir: Dil ve dudak kıpırdatmadan sadece zihinden geçirmek geçerli değildir.\n\nNamezda kıraatin geçerli olması için gereken asgari ses seviyesi aşağıdakilerden hangisidir?", "options": ["Çevredekilerin duyabileceği yüksek sesle", "Tamamen sessiz", "Kişinin kendi duyabileceği fısıltı halinde", "İmamın duyabileceği sesle", "Mümkün olan en yüksek sesle"], "answer": "C", "sinav": 3}, {"no": "45", "body": "Kitapta namazda sûrelerin Kur'ân'daki sıraya göre okunması konusu ele alınmıştır. Eğer aradaki sûreler atlanacaksa belirli bir kural uygulanmalıdır.\n\nBu kural aşağıdakilerden hangisidir?", "options": ["En az iki sûre atlanarak devam edilmelidir", "En az bir sûre atlanarak devam edilmelidir", "Hiç atlama yapılamaz", "En az üç sûre atlanarak devam edilmelidir", "Sıra takip etmek zorunlu değildir, namazı bozmaz"], "answer": "A", "sinav": 3}, {"no": "46", "body": "Kitapta pijamayla namaz kılmanın hükmü açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Pijamayla namaz kılmak caiz değildir, namaz bozulur", "Pijamayla namaz kılmak adaba uygun olmasa da setr-i avret şartlarını taşıyorsa sahihtir", "Pijamayla yalnızca gece namazı kılınabilir", "Pijamayla namaz kılmak her durumda caizdir", "Pijamayla yalnızca nafile namaz kılınabilir"], "answer": "B", "sinav": 3}, {"no": "47", "body": "Kitapta üzerinde insan veya hayvan resimleri olan kıyafetlerle namaz kılmanın hükmü anlatılmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Ezan İslam'ın şiârıdır; abdest namazın şiârıdır — bilinç sıçraması vesilesi", "Ezan cemaatin şiârıdır; abdest orucun şiârıdır — arınma vesilesidir", "Ezan mescidlerin şiârıdır; abdest haccın şiârıdır — ibadet simgeleridir", "Ezan Cuma'nın şiârıdır; abdest zekatın şiârıdır — sosyal ibadet sembolü", "Ezan ilmin şiârıdır; abdest cihadın şiârıdır — İslam'ın dış yüzüdür"], "answer": "B", "sinav": 3}, {"no": "48", "body": "Kitapta oje, ruj gibi maddelerin abdeste etkisi açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Namazın cesedi = dış şartlar ve şekil; namazın ruhu = huşu ve kalp huzuru", "Namazın cesedi = kıyam ve rükû; namazın ruhu = secde ve tahiyyât", "Namazın cesedi = Fâtiha okumak; namazın ruhu = dua ve niyaz etmek", "Namazın cesedi = abdest almak; namazın ruhu = Kur'ân okumak", "Namazın cesedi = cemaatle kılmak; namazın ruhu = tek başına kılmak"], "answer": "D", "sinav": 3}, {"no": "49", "body": "Kitapta Hz. Peygamber'in \"Melekler, içerisinde köpek ve resim/heykel bulunan eve girmezler\" hadisi aktarılmıştır.\n\nKitaba göre bu hadisin kapsamı ve namaz kılınan ortamdaki fotoğrafların durumu hakkında aşağıdakilerden hangisi doğrudur?", "options": ["Kıyamda kararlılık ve duruş; rükûda aczini itiraf; secdede tam teslimiyet", "Kıyamda korku; rükûda ümit; secdede sevgi ifade edilir", "Kıyamda şükür; rükûda tesbih; secdede hamd ifade edilir", "Kıyamda zikir; rükûda tefekkür; secdede murakabe ifade edilir", "Kıyamda istiğfar; rükûda tövbe; secdede af dileme ifade edilir"], "answer": "A", "sinav": 3}, {"no": "50", "body": "Kitapta namazın psikolojisi bölümünde namazın şekli yönünün anlamları açıklanmıştır: Ayakta durma (kıyam) Allah'ın huzurunda saygıyla durmayı, öne eğilme (rükû) saygının ileri aşamasını, alnı yere koyma (secde) saygının son noktasını ifade eder.\n\nNamezda Allah'ın en çok tekrar ettirdiği söz ve bunun insanın hayatına yansıtılması gereken anlamı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Meryem 19/59: Namazı zayi eden nesil geldi, şehvetlere uydular", "Bakara 2/45: Sabır ve namazla Allah'tan yardım isteyin", "Nisâ 4/142: Münafıklar namaza tembel tembel kalkarlar", "Mâûn 107/4-5: Yazıklar olsun o namaz kılanlara ki gafildirler", "Ankebût 29/45: Namaz insanı hayâsızlıktan ve kötülükten alıkoyar"], "answer": "C", "sinav": 3}, {"no": "51", "body": "Kitapta namazın duygusal yönünde sevgi, saygı ve korku duygularının birlikte bulunduğu belirtilmiştir. Ancak buradaki korkunun özel bir niteliği vurgulanmıştır.\n\nBu korkunun niteliği aşağıdakilerden hangisidir?", "options": ["İman + salih amel + hakkı tavsiye + sabrı tavsiye — dört şart birlikte", "Yalnızca iman ve salih amel yeterlidir — iki şart birlikte gerekli", "Yalnızca sabır ve şükür yeterlidir — ikisi birlikte kurtarır", "Yalnızca ilim ve amel yeterlidir — ilim amele önceldir", "Yalnızca tövbe ve istiğfar yeterlidir — Allah bağışlar"], "answer": "C", "sinav": 3}, {"no": "52", "body": "Kitapta namazın merhamet duygusuyla yakın ilişkisi anlatılmıştır. İnsanın günlük hayatta kızgınlık ve nefret gibi olumsuz duygulara kapılması durumunda namaz devreye girer.\n\nNamezda okunan hangi kelimelerin rahmet ve merhameti vurgulayan anlamları insanı merhametli olmaya ittiği belirtilmiştir?", "options": ["Allâh-u Ekber ve Sübhânallah", "Rahmân ve Rahîm", "Lâ ilâhe illallâh", "Semiallahu limen hamideh", "Rabbena lekel hamd"], "answer": "B", "sinav": 3}, {"no": "53", "body": "Kitapta camide zengin-fakir, amir-memur, işçi-işveren, öğretmen-öğrenci gibi toplumun her kesiminden insanın aynı safta omuz omuza namaz kılmasının psikolojik etkisi açıklanmıştır.\n\nBu etkinin sonucu aşağıdakilerden hangisidir?", "options": ["Müslüman gününü şafağın parıltıları ve akşamın ziyaları tayin etmeli", "Namaz vakitleri takvimle değil güneşin hareketleriyle belirlenmelidir", "İslam'da zaman bilinci ancak felsefe ile anlaşılabilir", "Müslüman günü yalnızca öğle namazı ile ikiye bölünmelidir", "Vakit namazı yerine toplu ibadet daha verimli ve faydalıdır"], "answer": "A", "sinav": 3}, {"no": "54", "body": "Kitapta \"Beni nasıl namaz kılarken gördüyseniz öyle kılın\" hadisi aktarılmış ve namazın uygulanma şeklinin Kur'ân ile sünnetin bütünlüğü içinde belirlendiği vurgulanmıştır.\n\nBuna göre Kur'ân ve sünnetin namaz konusundaki rolleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Vakit = zamanın kayıt edilmiş, tanzim edilmiş ve belirlenmiş hâlidir", "Vakit ve zaman aynı anlama gelir, aralarında bir fark bulunmaz", "Vakit kozmik ölçeği ifade eder, zaman bireysel algıya dayanır", "Vakit geçmişe aittir, zaman geleceğe ve şimdiki zamana aittir", "Vakit yalnızca namaz için kullanılan dar kapsamlı teknik terimdir"], "answer": "C", "sinav": 3}, {"no": "55", "body": "Kitapta \"5 vakit namazı cemaatle kılan, yeri ve denizi ibadetle doldurmuş olur\" rivayeti aktarılmıştır. Bu rivayetle birlikte cemaatle namazın tek başına kılınan namazdan kat kat faziletli olduğu vurgulanmıştır.\n\nCemaatle namazın fazileti hakkında Peygamberimizin belirttiği kat sayısı aşağıdakilerden hangisidir?", "options": ["5 kat", "10 kat", "27 kat", "25 kat", "70 kat"], "answer": "C", "sinav": 3}, {"no": "56", "body": "Kitapta teravih namazının cemaatle kılınması konusu anlatılmıştır. Hz. Peygamber teravih namazını birkaç defa cemaate kıldırmıştır.\n\nTeravihin düzenli olarak cemaatle kılınmaya başlandığı dönem aşağıdakilerden hangisidir?", "options": ["Hz. Peygamber dönemi", "Hz. Ebu Bekir dönemi", "Hz. Ali dönemi", "Hz. Osman dönemi", "Hz. Ömer dönemi"], "answer": "E", "sinav": 3}, {"no": "57", "body": "Kitapta sabah namazının vakti konusunda Hanefî âlimlerin görüşü ve Cebrâil'in Peygamberimize iki gün kıldırması aktarılmıştır. Cebrâil bir gün fecrin ağarmasıyla, diğer gün güneş doğmadan önce sabah namazını kıldırmış ve \"Namaz vakti bu iki an arasındadır\" demiştir.\n\nHanefî âlimlerin sabah namazı için tercih ettiği vakit aşağıdakilerden hangisidir?", "options": ["Fecrin ağarmasıyla hemen kılınması", "İmsak vaktinden önce kılınması", "Güneş doğduktan sonra kılınması", "Güneş yükselmeye yakın (isfar vakti) kılınması", "Öğleye kadar ertelenebilmesi"], "answer": "D", "sinav": 3}, {"no": "58", "body": "Kitapta sehiv secdesinin yapılma sebebi ve şekli açıklanmıştır.\n\nAşağıdakilerden hangisi sehiv secdesinin yapılma sebeplerinden biri değildir?", "options": ["Unutma veya yanılmayla rüknün geciktirilmesi", "Rüknün öne alınması", "Vacibin terk edilmesi", "Namazda fazladan sûre okunması", "Namazda hangi rekâtta olduğunu karıştırma"], "answer": "D", "sinav": 3}, {"no": "59", "body": "Kitapta tilavet secdesinin Kur'ân'daki secde ayetleriyle ilişkili olduğu belirtilmiştir.\n\nKur'ân'da toplam kaç secde ayeti bulunmaktadır?", "options": ["7", "10", "21", "15", "14"], "answer": "E", "sinav": 3}, {"no": "60", "body": "Kitapta intihar eden kişinin cenaze namazının kılınıp kılınmayacağı konusu ele alınmıştır. İslam'da hayat Allah'ın emaneti olarak kabul edilir ve kendi hayatına son vermek büyük günahtır.\n\nKitaba göre intihar eden kişinin cenaze namazının durumu ve gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kur'ân sırasına göre okumak uygun; en az iki sûre atlayarak devam edilir", "Sıra farzdır; aksi hâlde namaz bozulur ve iade edilmesi gerekir", "Sûrelerin sırası önemsizdir; herhangi bir sırayla okunabilir", "Yalnızca farz namazlarda sıra gözetilir; nafile namazlarda aranmaz", "Sûreler tersten okunmalıdır; son sûreden başa doğru gidilir"], "answer": "B", "sinav": 3}, {"no": "1", "body": "Kitapta insanın dünyaya geldiğinde aklına gelen dört temel soru Kur'ân'ın dört esasıyla eşleştirilmiştir. \"Bizi buraya kim getirdi?\" sorusu tevhid, \"Niçin getirdi?\" sorusu ibadet ve adalet, \"Nereye gidiyoruz?\" sorusu haşir hakikatiyle açıklanmıştır.\n\nDördüncü soru olan \"Bu soruların cevabını kimden öğreneceğiz?\" sorusunun karşılığı olan Kur'ân esası aşağıdakilerden hangisidir?", "options": ["Tevhid hakikati — Allah'ın varlığını ve birliğini kabul etmek", "Haşir hakikati — öldükten sonra diriliş inancı", "İbadet ve adalet hakikati — kulluğun çerçevesini belirleyen ilke", "Kader hakikati — her şeyin Allah'ın takdiriyle olduğu inancı", "Nübüvvet hakikati — soruların cevabını ancak peygamberlerin anlatacağı"], "answer": "E", "sinav": 4}, {"no": "2", "body": "Kitapta Tolstoy'un hayat arayışı anlatılırken, felsefeye ve bilime başvurduğu, onların \"Bu soruların cevabı yok\" dediği aktarılmıştır. Tolstoy üç yıl süren bir bunalım yaşamış ve nihayetinde bu halden kurtulmuştur.\n\nTolstoy'un bu bunalımdan kurtuluş yolu aşağıdakilerden hangisidir?", "options": ["Yeni bir felsefe akımı keşfetmesi", "Allah'a inanarak iç huzura kavuşması", "Bilimsel araştırmalarda başarı elde etmesi", "Edebiyata yönelerek kendini ifade etmesi", "Bir terapistten profesyonel yardım alması"], "answer": "B", "sinav": 4}, {"no": "3", "body": "Kitapta varlıkların tesbihi konusunda âlimlerin iki görüşü aktarılmıştır. Birinci görüşe göre varlıklar kendilerine mahsus bir hayat ve şuurla tesbih ederler. İkinci görüşe göre ise lisan-ı hal ile, yani yaptıkları fiillerle Allah'ın yüceliğini ifade ederler.\n\nKitapta bu iki görüşün birleştirilmesinin en güzel yol olduğu söylenmiş ve delil olarak bir ayet parçası gösterilmiştir. Bu delil aşağıdakilerden hangisidir?", "options": ["\"Her şey O'nu hamd ile tesbih eder\" — varlıkların aktif tesbihi", "\"Göklerde bulunanlar Allah'a secde ederler\" — evrensel secde", "\"Fakat siz onların tesbihini anlamazsınız\" — insanın kavrayış sınırı", "\"Hepsi duasını ve tesbihini bilmektedir\" — bilinçli tesbih", "\"Bitkiler ve ağaçlar secde ederler\" — bitkilerin boyun eğmesi"], "answer": "C", "sinav": 4}, {"no": "4", "body": "Kitapta kâinatın \"şükür üreten bir fabrika\"ya benzetildiği bölümde iç içe daireler modeli sunulmuştur. Cansız varlıklar bir daire oluşturmuş ve merkezine hayat konulmuştur. Bitkiler bir daire oluşturmuş ve merkezine hayvanlar ve insanlar konulmuştur.\n\nBu modelde hayvanlar ve insanların oluşturduğu dairenin merkezine konulan kavram ve onun etrafında dönen nihai ürün aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Merkez: Rızık — Nihai ürün: Şükür", "Merkez: İlim — Nihai ürün: Hikmet", "Merkez: İman — Nihai ürün: İbadet", "Merkez: Hayat — Nihai ürün: Tefekkür", "Merkez: İnsan — Nihai ürün: Medeniyet"], "answer": "A", "sinav": 4}, {"no": "5", "body": "Hz. İbrahim'e meleklerin misafir olarak geldiği kıssada, melekler \"Fiyatını ödemediğimiz yemeği yemeyiz\" demişlerdir. Hz. İbrahim'in açıkladığı fiyatı işiten Hz. Cebrâil, Hz. Mikâil'e dönerek Hz. İbrahim hakkında bir söz söylemiştir.\n\nHz. Cebrâil'in bu sözü ve Hz. İbrahim'in açıkladığı fiyat aşağıdakilerden hangisinde doğru eşleştirilmiştir?", "options": ["Fiyat: Her nimete şükretmek — Söz: \"Bu zat şükreden bir kuldur\"", "Fiyat: Her lokma için dua etmek — Söz: \"Bu zat Allah'ın sevdiği bir kimsedir\"", "Fiyat: Nimeti paylaşmak — Söz: \"Bu zat cömertlerin en cömertidir\"", "Fiyat: Başta Bismillah, sonda Elhamdülillâh — Söz: \"Bu zat Allah'ın dost edinmeye layık gördüğü kişidir\"", "Fiyat: Sadaka vermek — Söz: \"Bu zat insanların en hayırlısıdır\""], "answer": "D", "sinav": 4}, {"no": "6", "body": "Kitapta şükrün beş farklı tanımı verilmiştir. Bunlardan dördü: iyilik yapana övgüde bulunmak, nimetin karşılığında dil/el/kalple mukabele, Allah'a isyanı terk etmek ve nimeti O'nun rızasına uygun kullanmak şeklindedir.\n\nBeşinci ve \"hakiki şükür\" olarak nitelendirilen tanım aşağıdakilerden hangisidir?", "options": ["Allah'ın nimetlerini başkalarıyla paylaşmak", "Her nimete ayrı ayrı hamd etmek", "İnsanın şükürden aciz olduğunu bilmesi", "Nimetleri saymaya çalışmak", "Her gün belirli sayıda tesbih çekmek"], "answer": "C", "sinav": 4}, {"no": "7", "body": "Kitapta Peygamberimizin sahâbe ile birlikte yaşadığı mütevazı hayat anlatılırken Hz. Âişe'nin birden fazla rivayeti aktarılmıştır. Bunlardan birinde Peygamberimizin ailesinin bazen iki ay boyunca evde ateş yakmadığı söylenmiştir.\n\n\"Ne yer, ne içerdiniz?\" sorusuna Hz. Âişe'nin verdiği cevap ve ek bilgi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["\"Ekmek ve su\" — Komşular bazen yağ getirirdi", "\"Hurma ve süt\" — Bedir ganimetlerinden paylaşılırdı", "\"Kuru ekmek ve peynir\" — Sahâbe bazen hediye getirirdi", "\"Arpa ekmeği ve zeytin\" — Medine pazarından alınırdı", "\"Hurma ve su\" — Ensâr'dan komşular bazen develerinin sütünden verirlerdi"], "answer": "E", "sinav": 4}, {"no": "8", "body": "Kitapta \"Eğer şükrederseniz elbette size nimetimi artırırım. Eğer nankörlük ederseniz hiç şüphesiz azabım çok şiddetlidir\" (İbrahîm, 14/7) ayeti ele alınırken önemli bir tefsir inceliğine dikkat çekilmiştir.\n\nBu incelik aşağıdakilerden hangisidir?", "options": ["Ayetteki \"artırırım\" ifadesi yalnızca maddi nimetleri kapsar", "Ayetteki azap mutlaka cehennem azabıdır ve dünyevi azap ihtimali yoktur", "Ayet yalnızca İsrailoğulları'na hitap etmektedir", "Ayetteki azabın türü açıkça belirtilmemiştir; bolluk içindeki huzursuzluk gibi dünyevi azap da ihtimal dahilindedir", "Ayetteki şükür yalnızca namaz kılmakla gerçekleşir"], "answer": "D", "sinav": 4}, {"no": "9", "body": "Kitapta 500 yıl adada ibadet eden kulun kıssası anlatılmıştır. Bu kul kıyamette \"Beni amelimle cennete koy\" demiş, Allah meleklere nimetleri ile ameli karşılaştırmalarını emretmiştir. Yalnızca göz nimeti 500 yıllık ibadeti kuşatmıştır.\n\nAllah'ın bu kulun cennete girmesi için kullandığı gerekçe aşağıdakilerden hangisidir?", "options": ["Kulun 500 yıl boyunca hiç günah işlememesi", "Kulun amellerinin nimetleri fazlasıyla karşılaması", "Kulun secdede iken ruhunun kabzedilmiş olması", "Allah'ın rahmetiyle — çünkü nimetlerin gerçek karşılığı amelle ödenemez", "Kulun denizin ortasındaki adada yaşamış olması"], "answer": "D", "sinav": 4}, {"no": "10", "body": "Kitapta Kur'ân-ı Kerîm'in insanın temel sorularına verdiği cevaplar dört esas altında toplanmıştır.\n\nAşağıdaki soru-hakikat eşleştirmelerinden hangisi yanlıştır?", "options": ["\"Bizi buraya kim getirdi?\" → Tevhid hakikati", "\"Niçin getirdi?\" → İbadet ve adalet hakikati", "\"Nereye gidiyoruz?\" → Haşir hakikati", "\"Kimden öğreneceğiz?\" → Nübüvvet hakikati", "\"Niçin getirdi?\" → Nübüvvet hakikati"], "answer": "E", "sinav": 4}, {"no": "11", "body": "Kitapta mutasavvıfların insanı \"kâinatın küçültülmüş şekli\" (misal-i musaggarı) olarak kabul ettiği ve insandaki unsurların farklı varlıkları temsil ettiği anlatılmıştır: kemikler cansız varlıkları, hücreler bitkileri, nefsanî arzular hayvanları, güzel hasletler melekleri temsil eder.\n\nBu modelde gurur ve kibir gibi hasletlerin temsil ettiği varlık aşağıdakilerden hangisidir?", "options": ["Şeytan — çünkü kibir İblisin isyanının temelidir", "Hayvanlar — çünkü nefsanî arzular hayvani özelliklerdir", "Cansız varlıklar — çünkü kibir insanı katılaştırır", "Melekler — çünkü kibir güç işaretidir", "Bitkiler — çünkü kibir büyümeyi simgeler"], "answer": "A", "sinav": 4}, {"no": "12", "body": "Kitapta modern verimlilik yaklaşımlarının iki-üç saatte bir kısa molalar (mikro-aralar) önerdiği belirtilmiş ve İslam'ın bu ritmi asırlardır beş vakit namazla sunduğu vurgulanmıştır. Nörobilimsel araştırmalara atıfla namazın stres hormonu kortizolü düşürdüğü, şükür temelli duaların serotonin ve dopamin salınımını artırdığı aktarılmıştır.\n\nBu bilgiler ışığında kitapta namazın aynı anda yerine getirdiği üç işlev aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Tüccar ve hırsız kıssası — dört rekât namaz ve Ya Vedûd duası", "Hz. İbrahim'in ateşe atılması — namaz kılarak ateşin serin olması", "Hz. Musa'nın denizi yarması — namazla denizin ikiye ayrılması", "Hz. Yunus'un balığın karnı — tesbih ile balıktan kurtulma", "Hz. Peygamber'in hicreti — mağarada namaz kılarak korunma"], "answer": "D", "sinav": 4}, {"no": "13", "body": "Kitapta \"Namaz kılmıyorum ama kalbim temiz\" söylemi psikolojik açıdan analiz edilmiştir. Namaz kılan ve kılmayan iki kişi bir araya geldiğinde psikolojik denge bozulur. Namaz kılmayan kişi \"kalbim temiz\" diyerek veya dindarları aşağılayarak dengeyi korumaya çalışır.\n\nBu durum psikolojideki hangi savunma mekanizmasına örnektir ve bu mekanizmanın tanımı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Bastırma — istenmeyen düşünceleri bilinçaltına iterek rahatlamaya çalışmak", "Yüceltme — olumsuz bir durumu toplumsal olarak kabul gören bir davranışa dönüştürmek", "Yansıtma — kişinin kendi kusurlarını başkalarında görme ve onları suçlayarak kendini mazur gösterme davranışı", "İnkâr — rahatsız edici bir gerçeği kabul etmeyi reddetmek", "Yer değiştirme — duyguları tehdit edici olmayan bir hedefe yönlendirmek"], "answer": "C", "sinav": 4}, {"no": "14", "body": "Kitapta namazda kıraat konusunda İmam-ı A'zam ve talebelerinin görüşleri aktarılmıştır. İmam-ı A'zam en az bir ayet okunmasını yeterli görmüş, talebeleri ise bunu az bulmuştur.\n\nİmam-ı A'zam'ın dayandığı ayet, talebelerinin görüşü ve Kur'ân'dan hiçbir şey ezberleyemeyenlere Peygamberimizin öğrettiği alternatif aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ayet: Bakara 2/45 — Talebe: En az beş ayet — Alternatif: Yalnızca Bismillah", "Ayet: Fatiha 1/1 — Talebe: En az bir sûre — Alternatif: Yalnızca Allâh-u ekber", "Ayet: Müzzemmil 73/20 — Talebe: Ya üç ayet ya da üç ayet uzunluğunda bir ayet — Alternatif: Sübhânallah, Elhamdülillâh, Lâ ilâhe illallâhu Allâh-u ekber...", "Ayet: Ankebût 29/45 — Talebe: En az iki ayet — Alternatif: Yalnızca Lâ ilâhe illallâh", "Ayet: Nisâ 4/103 — Talebe: En az dört ayet — Alternatif: Herhangi bir dua"], "answer": "C", "sinav": 4}, {"no": "15", "body": "Kitapta ezanın ortaya çıkışı anlatılırken istişare toplantısında reddedilen yöntemler ve sebepleri aktarılmıştır. Çan, boru ve ateş yakma teklif edilmiş, Peygamberimiz bunları reddetmiştir.\n\nBu yöntemlerin reddi, Hz. Ömer'in teklifi ve nihai çözüm aşağıdakilerden hangisinde doğru kronolojik sırayla verilmiştir?", "options": ["Parmağını denize batırıp çıkar, dünya ahirete göre o kadardır", "Dünya bir damla su, ahiret uçsuz bucaksız bir okyanustur", "Dünya bir gölge gibidir, güneş battığında hiçbir şey kalmaz", "Dünya bir rüya gibidir, uyandığında her şey yok olup gider", "Dünya bir köprüdür, üzerinde durma, bir an önce geçip git"], "answer": "E", "sinav": 4}, {"no": "16", "body": "Kitapta İmam Gazali'nin namaz için taharete ilişkin üç temizlik katmanı sıralanmıştır. Bu katmanlar dıştan içe birbirini kuşatmaktadır. Ayrıca abdestin \"şirk fiil ve sıfat günahlarından temizlenmenin sembolü\" olduğu ifade edilmiştir.\n\nÜç temizlik katmanının dıştan içe doğru sıralaması ve kitaptaki \"Ezan İslam'ın şiârı olduğu gibi abdest de namazın şiârıdır\" ifadesindeki şiâr tanımı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kalp-Beden-Elbise — Şiâr: Allah'ın emri olan farz", "Beden-Elbise-Kalp — Şiâr: İslam'ın temel ibadeti", "Kalp-Elbise-Beden — Şiâr: Peygamberimizin sünneti olan uygulama", "Elbise-Kalp-Beden — Şiâr: Toplumu birleştiren sembol", "Elbise-Beden-Kalp — Şiâr: Kulu şuur ve tefekküre yönlendiren, bilinç sıçramasına vesile olan simge"], "answer": "E", "sinav": 4}, {"no": "17", "body": "Kitapta namazdaki iki secdenin farklı anlamları açıklanmıştır. İlk secde ile ikinci secde arasında derin bir fark olduğu belirtilmiş ve secdeden kalkış \"ölümün ardından diriliş\" olarak tanımlanmıştır.\n\nBirinci secde ve ikinci secdenin anlamları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Cennet dolmuş sanacak, üç kez dönecek; dünya kadar ve on misli yer verilecek", "Cennetin kapısında melekler karşılayacak ve doğruca makamına götürülecek", "Cennetteki en küçük yer bile dünya kadar geniş ve güzel olacak", "Son girecek kişi bin yıl bekledikten sonra cennete alınacak", "Cennetin en alt tabakasına yerleşecek ama yine de mutlu olacak"], "answer": "D", "sinav": 4}, {"no": "18", "body": "Kitapta İblisin isyanının temeli kibir olarak açıklanmış ve insanı da aynı tuzağa düşürmeye çalıştığı anlatılmıştır. Hz. Yusuf \"Nefsimi tebrie etmem\" demiş, Hz. Yunus \"Seni tesbih ederim, ben zalimlerden oldum\" demiştir.\n\nBu iki peygamberin ortak tavrı ve Peygamberimizin bu konudaki duası aşağıdakilerden hangisinde doğru eşleştirilmiştir?", "options": ["Ortak tavır: Nefsini kusursuz görmeyip Allah'a sığınmaları — Dua: \"Allah'ım beni bir an nefsimle başbaşa bırakma\"", "Ortak tavır: Mucize göstermeleri — Dua: \"Allah'ım bana güç ver\"", "Ortak tavır: Kavimlerinden kaçmaları — Dua: \"Allah'ım beni affet\"", "Ortak tavır: Sabırla beklemeleri — Dua: \"Allah'ım bana sabır ver\"", "Ortak tavır: Tövbe etmeleri — Dua: \"Allah'ım tövbemi kabul et\""], "answer": "A", "sinav": 4}, {"no": "19", "body": "Kitapta namazdaki \"Allâh-u ekber\" ifadesinin tekrar sayısı verilmiştir: iki rekâtlık namazda 11, dört rekâtlık namazda 22 defa söylenir. Ayrıca \"Her Allâh-u ekber, iblisin düştüğü kibir zindanına karşı bir özgürlük fermanı gibidir\" denilmiştir.\n\nKitaba göre her \"Allâh-u ekber\" ifadesinin insana kazandırdığı şey aşağıdakilerden hangisidir?", "options": ["Ölüm koç sûretinde kesilecek; cennetliklerin sevinci cehennemliklerin üzüntüsü artar", "Ölüm bir melek olarak görünecek ve herkesin gözü önünde yok edilecek", "Ölüm bir bulut olarak dağılacak ve bir daha kimse ölmeyecek", "Ölüm bir ateş olarak yanacak ve cennetlikler onu seyredecek", "Ölüm bir ses olarak duyulacak ve o andan itibaren ebediyet başlar"], "answer": "B", "sinav": 4}, {"no": "20", "body": "Kitapta Şuayb (as)'ın kavmini ölçü ve tartıda doğruluğa çağırdığı, kavminin ise \"Sana namazın mı emrediyor bunları?\" diye itiraz ettiği anlatılmıştır. Ardından Hûd sûresinin 114. ayeti aktarılmıştır: \"Gündüzün iki tarafında ve gecenin gündüze yakın saatlerinde namaz kıl! Çünkü iyilikler, kötülükleri giderir.\"\n\nBu kıssa ve ayet birlikte kitapta hangi sonuca varmak için kullanılmıştır?", "options": ["Cennetin anahtarıdır; ahirette ilk sorulacak ameldir (Tirmizî)", "Günahların kefâretidir; ahirette son sorulacak amel olarak geçer", "Cennet nimetlerinden biridir; dünyada karşılığı yoktur", "İmanın en büyük göstergesidir; terk eden kâfir olur", "Müminin kalkanıdır; dünyada her beladan korur"], "answer": "C", "sinav": 4}, {"no": "21", "body": "Miraç hadisinde Peygamberimize başlangıçta 50 vakit namaz farz kılınmış, ardından Hz. Musa'nın tavsiyeleriyle gidip gelmeler sonucunda 5 vakte indirilmiştir. Hz. Musa'nın hafifletme istemesinin gerekçesi \"İsrailoğulları'na iki vakit farz kılındı, onu bile yapmadılar\" şeklinde aktarılmıştır.\n\nPeygamberimizin daha fazla hafifletme istemekten vazgeçme gerekçesi ve 5 vaktin 50 vakte bedel olduğunu bildiren ifade aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Gerekçe: Bu Rabbimden verilmiş bir azimettir — İfade: \"50'ye karşılık beş vakit; katımda söz değiştirilmez\"", "Gerekçe: Cebrâil uyardı — İfade: \"Bu son karardır\"", "Gerekçe: Hz. Musa artık gerek yok dedi — İfade: \"Elli vakte denk gelir\"", "Gerekçe: Ümmeti beş vakte razı oldu — İfade: \"Beş vakit yeterlidir\"", "Gerekçe: Hz. İbrahim tavsiye etti — İfade: \"Daha azı mümkün değildir\""], "answer": "A", "sinav": 4}, {"no": "22", "body": "Kitapta ibadetlerin semereleri (meyveleri) karşılaştırılmıştır. Her ibadetin kendine özgü bir semeresi vardır: oruç nefsi temizler, zekât malı temizler, hac bağışlanmayı gerekli kılar, cihat cenneti gerekli kılar.\n\nNamezin semeresi ve diğer ibadetlerden farkı aşağıdakilerden hangisinde doğru ifade edilmiştir?", "options": ["Namazın semeresi Allah'ın kuluna yönelmesidir; bu yönelişte diğer tüm ibadetlerin semereleri de mevcuttur", "Namazın semeresi cennettir; diğer ibadetlerden bağımsız bir yeri vardır", "Namazın semeresi günahlardan arınmadır; diğer ibadetlerle aynı düzeydedir", "Namazın semeresi nefsin temizlenmesidir; oruçla aynı düzeydedir", "Namazın semeresi malın temizlenmesidir; zekâtla aynı düzeydedir"], "answer": "A", "sinav": 4}, {"no": "23", "body": "Kitapta \"Allah gözlerimin nurunu namazda kıldı\" hadisinde önemli bir dilbilimsel inceliğe dikkat çekilmiştir. Benzer şekilde \"Kamet getir ya Bilal, bizi onunla rahata erdir\" hadisinde de yanlış yorumlanmasına karşı uyarı yapılmıştır.\n\nBu iki hadisteki dilbilimsel incelikler aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Günün %4'ü — abdest dahil yaklaşık bir saat — sınırsız karşılık", "Günün %10'u — günde iki buçuk saat — sevap karşılığı alınır", "Günün %25'i — günde altı saat — cennet ümidi kazanılır", "Günün %1'i — günde on beş dakika — manevi huzur elde edilir", "Günün %50'si — günde on iki saat — tam teslimiyet sağlanır"], "answer": "B", "sinav": 4}, {"no": "24", "body": "Kitapta 7 semanın meleklerinin her birinin farklı bir ibadet halinde olduğu anlatılmıştır: Dünya seması ehli secde, ikinci sema rükû, üçüncü sema kıyam halindedir. Yedinci sema ehli ise Arş etrafında tavaf edip kanat çırpmaktadır.\n\nKitapta \"Tüm semavat ehlinin ibadetleri tek bir namazda mümin için bir araya getirilmiştir\" ifadesinin gerekçesi aşağıdakilerden hangisidir?", "options": ["Düzenli ibadet kortizolü düşürür; şükür duaları serotonin-dopamini artırır", "Düzenli ibadet kan basıncını yükseltir; şükür duaları adrenalini artırır", "Düzenli ibadet metabolizmayı hızlandırır; namaz kalori yakımını artırır", "Düzenli ibadet uyku kalitesini bozar; gece namazı insomniaya yol açar", "Düzenli ibadet kas gelişimini sağlar; secde boyun kaslarını güçlendirir"], "answer": "B", "sinav": 4}, {"no": "25", "body": "Kitapta namazın kabulü iki şekilde açıklanmıştır. Birincisi mukarrebîn ameli: kalbi sürekli zikirle Allah'a bağlı olan kulun ameli doğrudan kabul edilir. İkincisi: adet üzere, öneminin tam farkında olmadan kılınan namaz.\n\nCennete girme açısından kitapta sıralanan üç grup ve bunların dışında kalan dördüncü grubun durumu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Bedensel egzersiz + zihinsel farkındalık + duygusal denge boyutu birlikte", "Yalnızca bedensel egzersiz boyutu — namaz bir spor olarak değerlendirilir", "Yalnızca zihinsel farkındalık boyutu — namaz meditasyon olarak değerlendirilir", "Yalnızca duygusal denge boyutu — namaz bir terapi olarak değerlendirilir", "Yalnızca sosyal boyutu vardır — namaz toplumsal dayanışma olarak değerlendirilir"], "answer": "E", "sinav": 4}, {"no": "26", "body": "Kitapta namazın dışındaki farzlar (şartlar) altı madde olarak, içindeki farzlar (rükünler) da altı madde olarak sıralanmıştır. \"Niyet\" dışarıdaki farzlardan, \"kıraat\" ise içerideki farzlardandır.\n\nAşağıdakilerden hangisinde bir dışarıdaki farz ile bir içerideki farz doğru olarak eşleştirilmiştir?", "options": ["Dışarıdaki: İftitah tekbiri — İçerideki: Niyet", "Dışarıdaki: Ka'de-i ahire — İçerideki: Hadesten taharet", "Dışarıdaki: Kıraat — İçerideki: Vakit", "Dışarıdaki: Rükû — İçerideki: İstikbâl-i kıble", "Dışarıdaki: Setr-i avret — İçerideki: Kıyam"], "answer": "E", "sinav": 4}, {"no": "27", "body": "Kitapta cenaze namazının diğer namazlardan farklı olarak secdesiz ve rükûsuz, dört tekbirle kılındığı anlatılmıştır. Her tekbirde farklı dualar okunur.\n\nDört tekbirde okunan duaların doğru sıralaması aşağıdakilerden hangisinde verilmiştir?", "options": ["1. Fatiha — 2. Salli-Bârik — 3. Cenaze duası — 4. Selam", "1. Salli-Bârik — 2. Sübhâneke — 3. Fatiha — 4. Selam", "2. Sübhâneke (+ve celle senâük) — 2. Salli-Bârik — 3. Cenaze duası — 4. Selam", "1. Cenaze duası — 2. Sübhâneke — 3. Salli-Bârik — 4. Selam", "1. Sübhâneke (+ve celle senâük) — 2. Cenaze duası — 3. Salli-Bârik — 4. Selam"], "answer": "C", "sinav": 4}, {"no": "28", "body": "Kitapta sabah ezanında \"Hayye ale'l-felâh\" cümlesinden sonra eklenen ilave cümle ve bu ilavenin kametteki durumu açıklanmıştır.\n\nBu ilave cümle, kametteki durumu ve ezan dinlerken bu cümleye karşılık söylenmesi gereken ifade aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İlave: \"es-Salâtü hayrun mine'n-nevm\" — Kamette okunmaz — Karşılık: \"Sadakte ve berirte\"", "İlave: \"Kad kâmeti's-salâh\" — Kamette okunur — Karşılık: \"Allâh-u ekber\"", "İlave: \"Lâ ilâhe illallâh\" — Kamette de okunur — Karşılık: \"Sübhânallah\"", "İlave: \"Allâh-u ekber\" — Kamette okunur — Karşılık: \"Elhamdülillâh\"", "İlave: \"es-Salâtü hayrun mine'n-nevm\" — Kamette de okunur — Karşılık: \"Lâ havle velâ kuvvete illâ billâh\""], "answer": "A", "sinav": 4}, {"no": "29", "body": "Kitapta Kur'ân'a bakarak namaz kılmanın hükmü konusunda Hanefî mezhebindeki görüş farklılığı aktarılmıştır.\n\nEbû Hanîfe'nin ve Ebû Yûsuf ile Muhammed'in görüşleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ruha takılan güvenlik kemeri — namazı terk eden korumasız kalır", "Kalbe vurulan aşı — namaz hastalıklara karşı bağışıklık kazandırır", "Bedene giyilen zırh — namaz fiziksel tehlikelerden de korur", "Akla takılan filtre — namaz olumsuz düşünceleri süzer ve temizler", "Nefse konan kilit — namaz her türlü arzuyu tamamen yok eder"], "answer": "C", "sinav": 4}, {"no": "30", "body": "Kitapta namazda sûrelerin Kur'ân'daki sıraya göre okunması konusu ele alınmıştır. Aradaki sûreler atlanacaksa belirli bir kurala uyulması gerektiği belirtilmiştir.\n\nBu kural ve sıranın terk edilmesinin namazı bozup bozmadığı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Hiç atlama yapılamaz — Sırayı terk etmek namazı bozar", "En az iki sûre atlanarak devam edilmeli — Sırayı terk etmek namazı bozmaz", "En az bir sûre atlanarak devam edilmeli — Sırayı terk etmek mekruhtur", "En az üç sûre atlanmalı — Sırayı terk etmek günahtır", "Herhangi bir kural yoktur — Sıra tamamen serbesttir"], "answer": "B", "sinav": 4}, {"no": "31", "body": "Kitapta \"tertip sahibi\" kavramı kaza namazları bağlamında açıklanmıştır. Tertip sahibi olan kişinin kaza namazı ile vakit namazı arasında sıraya uyması vaciptir.\n\nTertip sahibinin tanımı ve tertibin düşme şartı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["1 vakitten az kazası olan kişi — Kazayı kılarsa düşer", "Hiç kazası olmayan kişi — Bir vakit kazaya kalırsa düşer", "6 vakitten az namazı kazaya kalmamış kişi — Kazaya kalan namazlar 6 vakit veya daha fazla olursa düşer", "10 vakitten az kazası olan kişi — İmamın izniyle düşer", "3 vakitten az kazası olan kişi — Yolculukta düşer"], "answer": "C", "sinav": 4}, {"no": "32", "body": "Kitapta Hendek Savaşı sırasında harbin şiddetinden dolayı bir vakit namazı kılınamamış ve daha sonra kaza edilmiştir. Ayrıca yolculuk esnasında bir sabah namazı uyuyakalınarak kaçırılmıştır.\n\nHendek Savaşı'nda kılınamayan namaz, ne zaman kaza edildiği ve mazeretsiz kazaya bırakma hakkındaki hüküm aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Öğle namazı — Akşam namazından önce kaza edilmiş — Mazeretsiz kazaya bırakmak mekruhtur", "Cuma namazı — Ertesi gün kaza edilmiş — Mazeretsiz kazaya bırakmak haramdır ama tövbe gerekmez", "Sabah namazı — Öğle namazından önce kaza edilmiş — Mazeretsiz kazaya bırakmak caizdir", "Akşam namazı — Yatsıdan sonra kaza edilmiş — Mazeretsiz kazaya bırakmak küçük günahtır", "İkindi namazı — Akşam ile yatsı arasında kaza edilmiş — Mazeretsiz kazaya bırakmak büyük günahtır ve ayrıca tövbe gerekir"], "answer": "E", "sinav": 4}, {"no": "33", "body": "Kitapta namazın psikolojisi bölümünde namazın şekli yönünün anlamları açıklanmıştır: Kıyam Allah'ın huzurunda saygıyla durmayı, rükû saygının ileri aşamasını, secde saygının son noktasını ifade eder.\n\nNamezda Allah'ın en çok tekrar ettirdiği söz (2 rekâtta 11 kez) ve bunun hayata yansıtılması gereken anlamı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Allâh-u Ekber — Dünyevi ilişkilerde Allah'tan başka hiçbir ilaha göre hareket etmeme prensibini edinmek", "Elhamdülillâh — Her nimete sürekli şükretme alışkanlığı edinmek", "Sübhânallah — Allah'ın eksikliklerden münezzeh olduğunu her daim hatırlamak", "Lâ ilâhe illallâh — Tevhid bilincini günlük hayatın her anına taşımak", "Estağfirullah — Sürekli tövbe halinde olmak"], "answer": "A", "sinav": 4}, {"no": "34", "body": "Kitapta namazın duygusal yönünde sevgi, saygı ve korku duygularının birlikte bulunduğu belirtilmiştir. Ancak buradaki korkunun niteliği özel olarak vurgulanmıştır.\n\nBu korkunun niteliği ve namazda Fatiha'daki \"Rahmân\" ve \"Rahîm\" kelimelerinin canlı tuttuğu duygu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Korku: Cehennem ateşi dehşeti — Canlı tutulan duygu: Endişe", "Korku: Ölüm korkusu — Canlı tutulan duygu: Üzüntü", "Korku: Allah'ın sevgisini ve rızasını kaybetme endişesi — Canlı tutulan duygu: Merhamet", "Korku: Toplumsal dışlanma — Canlı tutulan duygu: Aidiyet", "Korku: Ahiret azabı paniği — Canlı tutulan duygu: Korku"], "answer": "C", "sinav": 4}, {"no": "35", "body": "Kitapta namazın günahkârlık ve suçluluk duygusunu önlediği anlatılmıştır. Mümin namazda okuduğu ayet ve dualarla, namazdan sonra tövbe ve bağışlanma dileyerek Allah'ın kendisini bağışlayacağına inanır.\n\nAynı bölümde camide farklı toplumsal kesimlerin aynı safta namaz kılmasının psikolojik etkisi de açıklanmıştır. Bu etki aşağıdakilerden hangisidir?", "options": ["Kavanoz temsili: önce büyük taşlar (namaz), sonra çakıl-kum-su sığar", "Bardak temsili: önce suyu doldur (namaz), sonra buz eklenebilir", "Çanta temsili: önce kitapları koy (ilim), sonra kalem-defter sığar", "Bahçe temsili: önce ağaçları dik (iman), sonra çiçekler açar", "Sofra temsili: önce ekmeği koy (rızık), sonra diğer yemekler sığar"], "answer": "D", "sinav": 4}, {"no": "36", "body": "Kitapta \"Beni nasıl namaz kılarken gördüyseniz öyle kılın\" hadisi aktarılmış ve Kur'ân ile sünnetin namaz konusundaki rolleri açıklanmıştır.\n\nKur'ân'ın ve sünnetin namaz konusundaki rolleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namaz — Namaz — Namaz — Cihat sırasıyla sorulmuştur (İbn Hibbân)", "Cihat — Namaz — Oruç — Hac sırasıyla en faziletli ibadetler", "İlim — Namaz — Zekât — Oruç sırasıyla en faziletli ameller", "Oruç — Namaz — Hac — Sadaka sırasıyla en sevaplı ameller", "Namaz — Oruç — Hac — Zekât olarak İslam'ın beş şartı sırasıyla"], "answer": "E", "sinav": 4}, {"no": "37", "body": "Kitapta namaz kılmayan kişinin dini durumu hakkında açık bir hüküm verilmiştir. \"Ameller imanın bir parçası değildir. İman esaslarını inkâr etmedikçe, amel eksikliğinden dolayı dinden çıkmaz.\"\n\nBu hükme göre namaz kılmayan kişinin durumu ve namazla imanın ilişkisi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["24 milyar borç temsili: 24 saat sermaye, 1 saatini bile vermemek", "Ayna temsili: Kalp bir ayna, namaz kılmadan parlatılamaz", "Terazi temsili: Kıyamette ameller tartılır, kalp temizliği yetmez", "Bahçe temsili: Kalp bir bahçe, namaz suyu, susuz bahçe kurur", "Deniz temsili: Kalp bir gemi, namaz dümeni, dümensiz gemi batar"], "answer": "A", "sinav": 4}, {"no": "38", "body": "Kitapta namazda Kur'ân'ın Türkçe tercümesiyle kıraat yapılıp yapılamayacağı konusu ele alınmıştır. \"Kur'an lafzı ve manasıyla Allah kelamıdır; tercüme ise mütercimin sözüdür\" denilmiştir.\n\nNamezda tercüme ile kıraat yapmanın hükmü ve gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Yansıtma mekanizması: kendi kusurlarını başkalarında görmek", "Genelleme mekanizması: tek bir olaydan genel sonuç çıkarmak", "Bastırma mekanizması: rahatsız edici düşünceleri bilinçaltına itmek", "Kompansasyon mekanizması: bir alandaki eksikliği başka alanda kapatmak", "Rasyonalizasyon mekanizması: mantık dışı davranışa gerekçe üretmek"], "answer": "D", "sinav": 4}, {"no": "39", "body": "Kitapta namazda dua ve sûreleri okurken sesin asgari seviyesi hakkında açık bir hüküm verilmiştir: \"Dil ve dudak kıpırdatmadan sadece zihinden geçirmek geçerli değildir.\"\n\nNamezda kıraatin geçerli olması için gereken asgari ses seviyesi ve bunun gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sûi misal emsal olmaz — dindarların hatası mazeret sayılmaz", "Her koyun kendi bacağından asılır — herkes kendi amelinden sorumlu", "Bir mıhla nalı kaybedersin — küçük ihmaller büyük sonuç doğurur", "Ağaç yaşken eğilir — ibadet alışkanlığı çocuklukta kazanılır", "Damlaya damlaya göl olur — küçük ibadetler büyük sevaba dönüşür"], "answer": "C", "sinav": 4}, {"no": "40", "body": "Kitapta oje, ruj gibi maddelerin abdeste etkisi açıklanmıştır. Mesleğini icra ederken tırnaklarına boya yapışan boyacı ve çiftçi gibi meslek sahipleri için özel bir ruhsat tanınmıştır.\n\nBu ruhsatın kapsamı ve isteğe bağlı olarak sürülen oje/ruj gibi maddelerin durumu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sübhânallah + Elhamdülillâh + Lâ ilâhe illallah + Allâhu ekber okuması yeterlidir", "Sadece Âyetü'l-kürsî okur ve bu yeterli sayılır", "Sessizce kıyamda durur ve hiçbir şey okuması gerekmez", "Türkçe dua okur ve bu kabul edilir", "Yalnızca tekbirleri söyler ve bu yeterli sayılır"], "answer": "B", "sinav": 4}, {"no": "41", "body": "Kitapta müekked sünnet ve gayrimüekked sünnet ayrımı yapılmıştır. Hz. Peygamber müekked sünneti sürekli kılmış ancak bağlayıcı olmadığını göstermek için bazen terk etmiştir.\n\nMüekked sünneti mazeret olmadan terk etmenin hükmü ve gayrimüekked sünnetin alternatif adı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Hüküm: İsâet (yanlış ve kusurlu davranış) olur ama azap gerektirmez — Alternatif ad: Müstehap", "Hüküm: Günahtır ve azap gerektirir — Alternatif ad: Farz", "Hüküm: Namazı bozar — Alternatif ad: Vacip", "Hüküm: Mekruhtur — Alternatif ad: Mubah", "Hüküm: Hiçbir sakıncası yoktur — Alternatif ad: Mendub"], "answer": "A", "sinav": 4}, {"no": "42", "body": "Kitapta vakitlerin oluşmadığı kutup bölgelerinde yaşayan Müslümanların namaz vakitlerini nasıl belirleyeceği açıklanmıştır.\n\nBu konuda verilen hüküm ve gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namaz yükümlülüğü düşer — Çünkü vakit oluşmamaktadır", "En yakın bölgenin namaz vakitleri esas alınır — Çünkü namaz emri Kur'ân'da olduğu için her Müslüman yükümlüdür", "Günde tek vakit namaz kılınır — Çünkü güneş bir kez doğar", "Güneşin konumuna göre serbestçe kılarlar — Çünkü kesin bir hüküm yoktur", "İmamın belirlediği vakitlerde kılarlar — Çünkü cemaat esastır"], "answer": "B", "sinav": 4}, {"no": "43", "body": "Kitapta sehiv secdesinin yapılma sebepleri ve şekli açıklanmıştır.\n\nAşağıdakilerden hangisi sehiv secdesinin yapılma sebeplerinden biri değildir?", "options": ["Unutma veya yanılmayla bir rüknün geciktirilmesi", "Bir rüknün öne alınması", "Vacibin terk edilmesi", "Namazda hangi rekâtta olduğunu karıştırmak", "Namazda sûreyi çok güzel ve hatasız okumak"], "answer": "E", "sinav": 4}, {"no": "44", "body": "Kitapta tilavet secdesinin Kur'ân'daki secde ayetleriyle ilişkili olduğu belirtilmiştir. Secde ayetini bilerek okuyan veya işiten herkesin tilavet secdesi yapması gerekir.\n\nKur'ân'da toplam kaç secde ayeti bulunmaktadır ve namazda secde ayeti sûrenin sonuna denk gelirse ne olur?", "options": ["7 ayet — Ayrıca tilavet secdesi yapılır", "10 ayet — Namaz bozulur", "15 ayet — Namazdan sonra ayrıca yapılır", "14 ayet — Namaz secdeleri tilavet secdesi yerine geçer", "21 ayet — İmamın kararına bağlıdır"], "answer": "D", "sinav": 4}, {"no": "45", "body": "Kitapta intihar eden kişinin cenaze namazının durumu açıklanmıştır. İslam'da hayat Allah'ın emaneti olup kendi hayatına son vermek büyük günahtır.\n\nİntihar eden kişinin cenaze namazı hakkındaki hüküm ve gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Cenaze namazı kılınmaz — Çünkü büyük günah işlemiştir ve tövbe edememiştir", "Yalnızca ailesi kılar — Çünkü topluma kötü örnek olmuştur", "İmamın takdirine bağlıdır — Çünkü kesin bir hüküm yoktur", "Cenaze namazı kılınır — Çünkü büyük günah işleyen dinden çıkmış sayılmaz ve akıl-ruh sağlığı kesin bilinemez", "Yalnızca tövbe etmişse kılınır — Çünkü tövbesiz bağışlanma olmaz"], "answer": "D", "sinav": 4}, {"no": "46", "body": "Kitapta \"Vaktin Çağrısı\" bölümünde ikindi namazı vakti şöyle tasvir edilmiştir: \"İhtiyarlığın yükünü omuzlayan insan da büktü boynunu. Saçlarına düşen aklarla kızıl ufukları seyreden insan, fâniliğin şuuruna varıyor. İşte tam bu an, anlıyor Rabbinin neden 'asr'ın üzerine yemin ettiğini.\"\n\nBu tasvirde ikindi namazının insana hatırlattığı hakikat aşağıdakilerden hangisidir?", "options": ["Arapça olmalıdır — tercüme mütercimin sözüdür, Allah kelamı değildir", "Herhangi bir dilde olabilir — önemli olan anlamı bilmektir", "Farsça da olabilir — İmam-ı A'zam buna cevaz vermiştir", "Kıraat zorunlu değildir — sadece dua etmek de yeterlidir", "Yalnızca imam için gereklidir — cemaat sessiz durabilir"], "answer": "A", "sinav": 4}, {"no": "47", "body": "Kitapta \"Zamana Hükmeden Namaz\" bölümünde merhum Elmalılı Hamdi Yazır'ın \"Öyle ise akşama girdiğinizde, sabaha kavuştuğunuzda Allah'ı tesbih edin\" (Rûm, 30/17-18) ayetini tefsir ederken zamanın ahirete doğru akışından bahsettiği aktarılmıştır.\n\nElmalılı'nın bu tefsirinde akşam ve yatsı ile ilgili vurguladığı husus aşağıdakilerden hangisidir?", "options": ["Ebû Hanîfe: bozulur; Ebû Yûsuf ve Muhammed: mekruh ama geçerlidir", "Tüm Hanefî imamlarına göre namaz kesinlikle bozulur", "Tüm Hanefî imamlarına göre caizdir ve kerahet yoktur", "Ebû Hanîfe: caizdir; talebeleri ise bozulur demiştir", "Yalnızca nafile namazlarda caizdir; farz namazlarda bozulur"], "answer": "B", "sinav": 4}, {"no": "48", "body": "Kitapta Hz. Peygamber'in Medine'ye geldiğinde henüz devesinden inmeden yaptığı ilk iş anlatılmıştır. Bu, tarih boyunca İslam medeniyetinin şehir kurma geleneğine de temel oluşturmuştur.\n\nBu ilk iş ve onun İslam şehirciliğindeki yansıması aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Pazar yeri kurması — Şehirlerde merkeze çarşı inşa edilmesi", "Tarım alanı belirlemesi — Şehirlerin tarım bölgeleri oluşturması", "Ev taksimi — Şehirlerde mahallelerin düzenlenmesi", "Savunma hattı oluşturması — Şehirlere sur yapılması", "Mescid yeri tespiti — Yeni kurulan veya fethedilen şehirlerde merkeze cami inşa edilmesi"], "answer": "E", "sinav": 4}, {"no": "49", "body": "Kitapta Peygamberimizin son hastalığında bile namaza olan düşkünlüğü anlatılmıştır. Kendisi kıldıramayacak durumda olduğunda bir sahâbîyi imam tayin etmiş, kendisi oturarak kılmıştır.\n\nİmam tayin edilen sahâbî ve Peygamberimizin vefatından hemen önce ısrarla tekrarladığı son sözler aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İmam: Hz. Ömer — Son söz: \"Ümmetim, ümmetim!\"", "İmam: Hz. Ebu Bekir — Son söz: \"Namaza devam edin! Namaza, namaza!\"", "İmam: Hz. Ali — Son söz: \"Kur'ân'a sarılın!\"", "İmam: Hz. Osman — Son söz: \"Birbirinizi sevin!\"", "İmam: Hz. Bilal — Son söz: \"Allah'tan korkun!\""], "answer": "B", "sinav": 4}, {"no": "50", "body": "Kitapta \"Şüphesiz namaz kulun zimmetinde bir borç olmaktan çok daha fazlasıdır\" ifadesinin ardından namazın gerçek tanımı verilmiştir.\n\nKitaba göre namazın bu tanımı aşağıdakilerden hangisidir?", "options": ["Farz bir ibadetin yerine getirilmesi", "Toplumsal bir görevin ifası", "Maşuka aşk ve muhabbeti ilan etmek", "Günlük rutinin bir parçası", "Disiplin kazandıran bir alışkanlık"], "answer": "C", "sinav": 4}, {"no": "51", "body": "Kitapta Niyazi Mısrî'nin \"Savm u salât u hac ile sanma biter zahit işin / İnsan-ı kamil olmaya lazım olan irfan imiş\" beyti aktarılmıştır.\n\nBu beyit kitapta hangi bağlamda ve hangi mesajı vermek için kullanılmıştır?", "options": ["Yalnızca öğle-ikindi veya akşam-yatsı birleştirilebilir; sabah asla cem edilmez", "Beş vakit namazın tamamı birleştirilebilir; yolculukta herhangi ikisi cem edilir", "Yalnızca sabah-öğle veya ikindi-akşam birleştirilebilir; yatsı ayrıdır", "Cem yalnızca hac ibadetinde geçerlidir; başka durumda yapılamaz", "Yalnızca akşam-yatsı birleştirilebilir; diğer vakitler asla cem edilmez"], "answer": "C", "sinav": 4}, {"no": "52", "body": "Kitapta özenli kılınan namaz ile baştan savma kılınan namazın akıbeti birbirine zıt şekilde anlatılmıştır.\n\nÖzenli kılınan namazın ve baştan savma kılınan namazın akıbetleri aşağıdakilerden hangisinde doğru karşılaştırılmıştır?", "options": ["Özenli: Sevap yazılır — Baştan savma: Sevap yazılmaz ama günahı da yoktur", "Özenli: İki kat sevap — Baştan savma: Yarım sevap", "Özenli: Cennete götürür — Baştan savma: Cehenneme götürür", "Özenli: Melekler sevinir — Baştan savma: Melekler üzülür", "Özenli: Nurlu ve aydınlık yükseltilir — Baştan savma: Kapkara dürülüp sahibinin yüzüne fırlatılır"], "answer": "E", "sinav": 4}, {"no": "53", "body": "Kitapta okçu benzetmesiyle kalbin samimiyetinin namaza etkisi anlatılmıştır: \"Nice ok vardır ki sahibi tarafından atılır ama hedefe varmadan düşer. Yine nice ok vardır ki kuvvetle atılmış, karşısına kaya çıksa da hedefine varır.\"\n\nKitaba göre kalbin hedefe (vuslata) ulaşmasını belirleyen ölçü ve zulmet (perdeleme) durumunda gerekli olan şey aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ölçü: İbadet miktarı — Gereken: Daha fazla ibadet", "Ölçü: İlim seviyesi — Gereken: Daha fazla kitap okumak", "Ölçü: Cemaatle namaz sıklığı — Gereken: Her namazı cemaatle kılmak", "Ölçü: İman, yakîn ve niyet samimiyeti — Gereken: Zulmeti bertaraf edecek nur", "Ölçü: Nafile namazların sayısı — Gereken: Daha fazla nafile kılmak"], "answer": "D", "sinav": 4}, {"no": "54", "body": "Kitapta Hz. Ömer'in namazda ordu ve cizye hesabı yapması aktarılmış ve bu durumun namazına zarar verip vermediği açıklanmıştır.\n\nKitabın bu konudaki açıklaması ve Hz. Ömer'in tutumunun hangi gruba dahil edildiği aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namazı bozmuştur — Gaflet ehli grubuna dahildir", "Mekruh işlemiştir — Adet üzere kılanlar grubuna dahildir", "Namazı kabul olmamıştır — Zayi eden ehli grubuna dahildir", "Allah ile birlikte düşündüğü için faziletine değer katmıştır — Kuvvetlilerin tutumuna dahildir", "Sehiv secdesi yapması gerekirdi — Yanılanlar grubuna dahildir"], "answer": "D", "sinav": 4}, {"no": "55", "body": "Kitapta \"Kişinin namazı eğer kendisini fuhşiyattan ve kötülüklerden alıkoymuyorsa, onu Allah'tan daha fazla uzaklaştırmaktan başka bir işe yaramamıştır\" hadisi aktarılmıştır.\n\nBu durumun sebebi olarak gösterilen üç özellik aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kalbi bozuk olması, göğsünün karanlık olması ve nefsinin etrafına düşkün ve meşgul olması", "Abdestinin eksik olması, kıbleden sapması ve vaktini geçirmesi", "İlminin yetersiz olması, niyetinin bozuk olması ve kibir taşıması", "Cemaatle kılmaması, sünnetleri terk etmesi ve tesbih çekmemesi", "Namazı aceleyle kılması, rükûyu kısa tutması ve secdeyi hızlı yapması"], "answer": "A", "sinav": 4}, {"no": "56", "body": "Kitapta ezan \"sadece bir ses değildir\" denilmiş ve kapsamlı bir tanım yapılmıştır. Ezanın namaz, cami ve cemaat üçlüsüyle olan ayrılmaz bağı vurgulanmıştır.\n\nKitapta ezana verilen tanım aşağıdakilerden hangisidir?", "options": ["En yakın normal bölgenin vakitleri esas alınır; bir gün 24 saat kabul edilir", "Güneş hiç batmıyorsa namaz kılınmaz; kaza olarak sonra kılınır", "Yalnızca üç vakit namaz kılınır; sabah ve yatsı düşer", "Mekke saatine göre namaz kılınır; yerel saat dikkate alınmaz", "Namaz vakitleri kişinin takdirine bırakılır; istediği zaman kılar"], "answer": "E", "sinav": 4}, {"no": "57", "body": "Kitapta \"Kurtuluşa erer ancak arınan; Rabbinin adını anan, sonra namaz kılan!\" (A'lâ, 87/14-15) ayeti aktarılmıştır.\n\nBu ayet, ezandaki hangi cümlenin Kur'ânî temelini oluşturmak amacıyla kullanılmıştır?", "options": ["Allâhü Ekber — Allah'ın büyüklüğünü ilan", "Hayye ale'l-felâh — Kurtuluşa çağrı", "Hayye ale's-salâh — Namaza çağrı", "Eşhedü en lâ ilâhe illallâh — Tevhid şehadeti", "Lâ ilâhe illallâh — Son tevhid ilanı"], "answer": "B", "sinav": 4}, {"no": "58", "body": "Kitapta Hollanda'da parkta namaz kılan Müslümanın hikâyesi anlatılmıştır. Hollandalı bir kişi onu izleyip kâmeti merak etmiş, Müslüman zat ezanın \"Hayye ale's-salah\" ve \"Hayye ale'l-felah\" cümlelerini açıklamıştır.\n\nHollandalı kişinin bu açıklamadan sonraki tepkisi ve bu hikâyenin kitaptaki mesajı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İkindi namazı kılınamamış; akşam-yatsı arasında kaza edilmiş — savaş sebebiyle", "Öğle namazı kılınamamış; ikindi vaktinde kaza edilmiş — kuşatma sebebiyle", "Sabah namazı kılınamamış; öğle vaktinde kaza edilmiş — görev sebebiyle", "Akşam namazı kılınamamış; yatsı vaktinde kaza edilmiş — savaş sebebiyle", "Yatsı namazı kılınamamış; sabah vaktinde kaza edilmiş — gece baskını sebebiyle"], "answer": "D", "sinav": 4}, {"no": "59", "body": "Kitapta cemaatle namazın fazileti vurgulanırken hem Peygamberimizin hadisi hem de tarihsel bir rivayet aktarılmıştır.\n\nCemaatle namazın tek başına kılınan namazdan kaç kat faziletli olduğu ve \"5 vakit namazı cemaatle kılan\" hakkındaki rivayet aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["7 kat — \"Günahları silinir\"", "27 kat — \"Yeri ve denizi ibadetle doldurmuş olur\"", "25 kat — \"Cennete girer\"", "10 kat — \"Allah onu sever\"", "70 kat — \"Melekler ona dua eder\""], "answer": "B", "sinav": 4}, {"no": "60", "body": "Kitabın bütünü değerlendirildiğinde namaz ibadeti beş farklı kavram etrafında çok boyutlu olarak ele alınmıştır: şükür, zaman, kulluk, özgürlük ve diriliş. Peygamberimiz bu ibadeti \"gözümün nuru\" olarak nitelemiş, Mi'rac gecesinde farz kılınan namazı \"cennetin anahtarı\" olarak tanımlamıştır.\n\nKitabın ana tezlerinden biri olarak kabul edilemeyecek ifade aşağıdakilerden hangisidir?", "options": ["Namaz, yalnızca bireysel bir ibadet olup toplumsal ve kozmik hiçbir boyutu yoktur", "Namaz, insanı zamana hükmettiren bir disiplin kaynağıdır", "Namaz, insanı nefsinin ve mâsivânın köleliğinden özgürleştiren bir davettir", "Namaz, Allah'ın nimetlerine karşı şükrün en güzel ifadesidir", "Namaz, cennetin anahtarı ve ahirette ilk sorulacak ameldir"], "answer": "A", "sinav": 4}];

function gr(q){const b=(q.body||"").toLowerCase();const m=[["tolstoy","tolstoy"],["hasir","haşir|hasir|diriliş|berzah"],["nubuvvet","nübüvvet|nubuvvet|kimden öğren"],["tevhid","tevhid haki"],["ibrahim","ibrahim.*melek|fiyat.*ödeme"],["sukur","şükür|şükr|nimet.*artır|nankörlük"],["fabrika","fabrika|daire.*merkez|otomobil"],["nimet","nimet.*sayma|nefes.*fayda|christy|sol ayağ|başparmak|demir|ağrı.*nimet|kanser"],["sihat","sıhhat.*boş vakit"],["kanuni","kanunî"],["namaz","salât.*dua|namazın.*yer|mi.rac.*farz|doksandan"],["halife","halife|misal-i musaggar"],["fatiha","fatiha.*104|fatiha.*kur"],["sermaye","yüzde dört|güvenlik kemeri|nörobilim|kortizol|katalizör"],["kavanoz","kavanoz"],["kalbim","kalbim temiz|yansıtma|psikolojik denge|24 milyar"],["kiraat","imam-ı a.zam|kıraat|kolayınıza|arapça.*kılın|tercüme.*namaz"],["dua","vedûd|tüccar.*hırsız|laurence|brown"],["cennet","cennet.*anahtar|koç.*sûret|ölüm.*öldür|parmağını denize|akvaryum"],["hesap","dört şey.*sorgul|vaiz.*ölüm|kum saati|gölge.*nalin|lezzet.*acılaş"],["zaman","zamana hükm|vakit.*zaman|izafi|ahmet haşim|ikame|muvakkithane"],["vakit","sabah.*bahar|öğle.*zirve|ikindi.*hazan|akşam.*ölüm|yatsı.*karanlık|vaktin çağrı"],["ezan","ezan|müezzin|abdullah.*zeyd|bilal.*ezan|çan.*boru|kamet|es-salâtü hayrun|kad kâmet|sadakte"],["hayye","hayye|iblis.*kibir|yusuf.*tebrie|yunus.*tesbih|nefsimle.*başbaş|şuayb|ikbal.*secde|allâh-u ekber.*11|sübhâneke|özgürlük.*ferman"],["cami","cami.*cemaat|mescid.*alâka|27.*kat|cemaat.*fazilet|teravih"],["kaza","hendek|tertip sahibi|kazaya|kaza.*namaz"],["kulluk","7.*aza.*koyun|semere|gözlerimin nuru.*namazda|bilal.*rahata|cesedi.*ruhu|fuhşiyat|nurlu.*yüksel|kapkara.*dürül"],["mirac","50 vakit|musa.*6.*sema|sema.*kalem sesi|semavat.*ibadet|azimet"],["kabul","mukarrebîn|okçu|ömer.*ordu|niyazi mısrî|zayi eden|mücâhede"],["fikih","dışındaki farz|rükün|cenaze namaz|kerâhet|avret|oje|ruj|pijama|resim.*kıyafet|sehiv|tilavet|intihar|kutup|cem |tertip|müekked|bakarak namaz|tuvalet"],["psikoloji","psikoloj|şekli yön|zihinsel yön|duygusal yön|üstünlük.*aşağılık|merhamet.*rahmân|günahkârlık.*suçluluk"],["peygamber","nasıl.*namaz.*gördüyseniz|son hastalığ|ebu bekir.*imam"]];for(const[k,v]of m)for(const p of v.split("|")){try{if(new RegExp(p,"i").test(b))return R[k]||"";}catch(e){}}return"Kitabin ilgili bolumune bakiniz.";}

let cQ=[],cI=0,cC=0,cW=0,dn=false,wl=[],cE=0;const L=['A','B','C','D','E'];
function sh(id){document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));document.getElementById(id).classList.add('a')}
function hm(){sh('home');uh()}
function uh(){const s=JSON.parse(localStorage.getItem('ns')||'{}');let h='';for(let i=1;i<=4;i++){const d=s[`s${i}`];if(d)h+=`<div class="hc2">Sinav ${i}: <b>%${d.p}</b> (${d.c}D/${d.w}Y)</div>`;}document.getElementById('hst').innerHTML=h||'<div class="hc2">Henuz sinav cozulmedi</div>';}

function go(n){cE=n;cQ=n===0?[...Q].sort(()=>Math.random()-.5):Q.filter(q=>q.sinav===n);cI=0;cC=0;cW=0;dn=false;wl=[];document.getElementById('qT').textContent=n===0?'Tum Sorular':`${n}. Sinav`;sh('quiz');rd();}

function rd(){const q=cQ[cI],t=cQ.length;document.getElementById('qU').textContent=`Soru ${cI+1} / ${t}`;document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('pF').style.width=`${(cI/t)*100}%`;
let h=`<div class="qb">Soru ${cI+1} / ${t}</div><div class="qt2">${q.body}</div><div class="os">`;
q.options.forEach((o,i)=>{h+=`<div class="o" onclick="pk(this,${i})"><div class="lt">${L[i]}</div><div class="tx">${o}</div></div>`;});
h+=`</div><div class="ex" id="ex"></div>`;document.getElementById('cI').innerHTML=h;document.getElementById('nB').disabled=true;document.getElementById('nB').textContent=cI<t-1?'Sonraki \u2192':'Sonuclari Gor';dn=false;
const c=document.getElementById('qC');c.classList.remove('ol');c.classList.add('en');requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.remove('en')));}

function pk(el,i){if(dn)return;dn=true;const q=cQ[cI],ci=q.answer.charCodeAt(0)-65;document.querySelectorAll('.o').forEach(o=>o.classList.add('dm'));el.classList.remove('dm');
if(i===ci){el.classList.add('rt');cC++;}else{el.classList.add('fl');const ce=document.querySelectorAll('.o')[ci];ce.classList.remove('dm');ce.classList.add('ht');cW++;const ref=gr(q);const ex=document.getElementById('ex');ex.innerHTML=`<b>Dogru cevap: ${L[ci]})</b> ${q.options[ci]}<br><br><b>Kitaptaki yeri:</b> ${ref}`;ex.classList.add('on');wl.push({q,y:L[i],c:L[ci],ref});}
document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('nB').disabled=false;}

function nx(){document.getElementById('qC').classList.add('ol');setTimeout(()=>{cI++;if(cI>=cQ.length){srs();return;}rd();},280);}

function srs(){sh('result');const t=cQ.length,p=Math.round((cC/t)*100);document.getElementById('rP').textContent=p;document.getElementById('rC').textContent=cC;document.getElementById('rW').textContent=cW;
document.getElementById('rR').className='rr '+(p>=70?'gd':p>=50?'md':'bd');
document.getElementById('rE').textContent=p>=90?'\uD83C\uDF1F':p>=70?'\uD83D\uDE0A':p>=50?'\uD83D\uDE10':'\uD83D\uDE1E';
document.getElementById('rT').textContent=p>=90?'Mukemmel!':p>=70?'Basarili!':p>=50?'Gelistirilmeli':'Calismaniz Gerekiyor';
document.getElementById('rS').textContent=`${t} sorudan ${cC} dogru, ${cW} yanlis`;
if(cE>0){const s=JSON.parse(localStorage.getItem('ns')||'{}');const pr=s[`s${cE}`];if(!pr||p>pr.p)s[`s${cE}`]={c:cC,w:cW,p};localStorage.setItem('ns',JSON.stringify(s));}}

function sr(){sh('review');if(!wl.length){document.getElementById('rL').innerHTML='<div class="rvem">Tebrikler! Hic yanlis yok! \uD83C\uDF89</div>';return;}
let h='';wl.forEach((w,i)=>{h+=`<div class="rc"><div class="rn">Yanlis #${i+1}</div><div class="rb2">${w.q.body.replace(/\n/g,'<br>')}</div><div class="ar2"><span class="yr">\u2717 ${w.y})</span><span class="cr">\u2713 ${w.c}) ${w.q.options[w.c.charCodeAt(0)-65]}</span></div><div class="rf"><b>Kitaptaki Yeri:</b>${w.ref}</div></div>`;});
document.getElementById('rL').innerHTML=h;}

uh();
</script>
