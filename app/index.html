options": ["29", "25", "31", "33", "21"], "answer": "C", "sinav": 1}, {"no": "5", "body": "Kitapta Tolstoy'un hayatının anlamını sorgulamasına vesile olan iki olay anlatılmıştır. Bu olayların ardından felsefe ve bilime başvurmuş, cevap bulamayınca depresyona girmiştir.\n\nTolstoy'un bu depresyon dönemi ne kadar sürmüştür?", "options": ["1 yıl", "2 yıl", "7 yıl", "5 yıl", "3 yıl"], "answer": "E", "sinav": 1}, {"no": "6", "body": "Kitapta kâinatın \"şükür üreten bir fabrika\"ya benzetildiği bölümde iç içe geçmiş daireler modeli sunulmuştur. Cansız varlıkların merkezine hayat, bitkilerin merkezine hayvanlar ve insanlar, hayvanlar ve insanların merkezine rızık konulmuştur.\n\nBu modele göre rızkın merkezine konulan ve tüm kâinatın nihai ürünü olan kavram aşağıdakilerden hangisidir?", "options": ["Şükür", "İman", "Tefekkür", "İbadet", "Tevhid"], "answer": "A", "sinav": 1}, {"no": "7", "body": "Hz. İbrahim'e melekler insan kılığında misafir olarak gelmiş ve \"Fiyatını ödemediğimiz yemeği yemeyiz\" demişlerdir. Hz. İbrahim yemeğin fiyatını açıkladığında Hz. Cebrâil, Hz. Mikâil'e dönerek bir söz söylemiştir.\n\nHz. İbrahim'in açıkladığı fiyat ve Hz. Cebrâil'in sözü aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Fiyat: Namaz kılmak / Söz: \"Bu zat Allah'ın sevgili kuludur.\"", "Fiyat: Dua etmek / Söz: \"Bu zat Allah'a yakın bir kişidir.\"", "Fiyat: Bismillah + Elhamdülillâh / Söz: \"Bu zat Allah'ın dost edinmeye layık gördüğü kişidir.\"", "Fiyat: Şükretmek / Söz: \"Bu zat şükreden bir kuldur.\"", "Fiyat: Sadaka vermek / Söz: \"Bu zat cömert bir insandır.\""], "answer": "C", "sinav": 1}, {"no": "8", "body": "Kitaba göre Allah, kullarından sunduğu nimetler karşılığında üç şey beklemektedir.\n\nAşağıdakilerden hangisi bu üç şeyden biri değildir?", "options": ["Zikir (Bismillah demek)", "Fikir (Nimetlerin Allah'ın eseri olduğunu düşünmek)", "Şükür (Elhamdülillâh demek)", "Sabır (Musibetlere katlanmak)", "Hepsi bu üç şeydendir"], "answer": "D", "sinav": 1}, {"no": "9", "body": "Kitapta Hacivat-Karagöz gölge oyunu temsili kullanılarak bir hakikat anlatılmıştır. Seyirciler \"Hacivat şöyle söyledi, Karagöz böyle cevap verdi\" derler; hâlbuki arkada duran biri onlar namına konuşmuş ve hareket ettirmiştir.\n\nBu temsil ile anlatılmak istenen aşağıdakilerden hangisidir?", "options": ["Tiyatronun İslam kültüründeki yeri", "Sanatın önemli bir ibadet olduğu", "Sebeplerin arkasındaki hakiki failin Allah olduğu", "İnsanların birbirini taklit ettiği", "Gölge oyununun eğitici değeri"], "answer": "C", "sinav": 1}, {"no": "10", "body": "Kitapta \"İki nimet vardır ki, insanların çoğu bu yönden aldanmış bir durumdadırlar\" hadisi aktarılmıştır.\n\nBu hadiste bahsedilen iki nimet aşağıdakilerden hangisidir?", "options": ["Sıhhat ve boş vakit", "Zenginlik ve güzellik", "Akıl ve gençlik", "İman ve amel", "İlim ve hikmet"], "answer": "A", "sinav": 1}, {"no": "11", "body": "Sahâbeden Câbir (ra)'ın rivayetinde, bir adanın dağında 500 sene ibadet eden bir kulun kıssası anlatılmıştır. Kıyamette bu kul \"Beni amelimle cennete koy\" demiş, melekler nimetlerle amelini karşılaştırmıştır.\n\nMeleklerin yaptığı karşılaştırmada ortaya çıkan sonuç aşağıdakilerden hangisidir?", "options": ["500 yıllık ibadet tüm nimetleri karşılamıştır", "Yalnızca kulak nimeti 500 yıllık ibadeti kuşatmıştır", "Yalnızca akıl nimeti 500 yıllık ibadeti kuşatmıştır", "Yalnızca göz nimeti 500 yıllık ibadeti kuşatmıştır", "Tüm nimetler eşit ağırlıkta değerlendirilmiştir"], "answer": "D", "sinav": 1}, {"no": "12", "body": "Kanunî Sultan Süleyman'ın meşhur beyti kitapta şükür ve sıhhat bağlamında zikredilmiştir.\n\nAşağıdakilerden hangisi bu beyittir?", "options": ["\"Ne ararsan bulunur derde devâ, elde var iken kerem kânı Hüdâ\"", "\"Kanaat gibi devlet, sıhhat gibi nimet yoktur\"", "\"Halk içinde muteber bir nesne yok devlet gibi, Olmaya devlet cihanda bir nefes sıhhat gibi\"", "\"Süleyman'ın saltanatı belki bir rüyâ imiş, Ömr geçmiş bir hayâl olmuş cihân\"", "\"Padişah-ı âlem olmak bir kuru kavga imiş\""], "answer": "C", "sinav": 1}, {"no": "13", "body": "Kitapta \"Eğer şükrederseniz elbette size nimetimi artırırım. Eğer nankörlük ederseniz hiç şüphesiz azabım çok şiddetlidir.\" (İbrahîm, 14/7) âyeti hakkında önemli bir nokta vurgulanmıştır.\n\nBu vurgulanan nokta aşağıdakilerden hangisidir?", "options": ["Şükür yalnızca dil ile yapılır; fiilî şükür bu âyetin kapsamı dışındadır", "Âyette azabın türü açıkça belirtilmemiştir; dünyevi azap da ihtimal dahilindedir", "Azabın mutlaka cehennem azabı olduğu vurgulanmış, dünya hariç tutulmuştur", "Yalnızca namaz kılanlar şükretmiş sayılır; diğer ibadetler yetersiz kalır", "Nankörlük eden toplumlar tarih boyunca mutlaka helak edilmiştir"], "answer": "B", "sinav": 1}, {"no": "14", "body": "Kitapta Peygamberimizin ve sahâbelerin mütevazı hayatı anlatılırken Hz. Âişe'nin rivayetleri aktarılmıştır. \"Medine'ye gelişinden vefatına kadar Hz. Muhammed'in ailesi üç gün arka arkaya buğday ekmeğinden karnını doyurmadı\" ve \"Bazen iki ay boyunca evimizde yemek yapmak için bir ateş yakılmazdı\" denilmiştir.\n\n\"Ne yer, ne içerdiniz?\" sorusuna Hz. Âişe'nin cevabı ve ek bilgisi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["\"Ekmek ve su\" — Komşular bazen yağ getirirdi", "\"Hurma ve su\" — Ensâr'dan komşular bazen develerinin sütünden verirlerdi", "\"Arpa ekmeği ve zeytin\" — Medine pazarından alınırdı", "\"Hurma ve süt\" — Bedir ganimetlerinden paylaşılırdı", "\"Kuru ekmek ve peynir\" — Sahâbe bazen hediye getirirdi"], "answer": "B", "sinav": 1}, {"no": "15", "body": "Kitapta kıyamette insanların dört şeyden sorgulanacağı hadisi aktarılmıştır.\n\nAşağıdakilerden hangisi bu dört sorgulamadan biri değildir?", "options": ["Ömründen; onu ne ile yok ettiğinden", "Gençliğinden; onu nerede çürüttüğünden", "Malından; onu nereden kazandığı ve nereye harcadığından", "İlminden; onunla ne yaptığından", "Namazından; onu nasıl kıldığından"], "answer": "E", "sinav": 1}, {"no": "16", "body": "\"O gün bütün nimetlerden sorulacaksınız\" âyeti nazil olduğunda fakir bir sahâbî ayağa kalkıp \"Benim üzerimde nimetten bir şey var mı?\" diye sormuştur.\n\nPeygamberimizin bu sahâbîye saydığı nimetler aşağıdakilerden hangisidir?", "options": ["İman, akıl ve sıhhat", "Göz, kulak ve kalp", "Gölge, iki nalin ve soğuk su", "Güneş, ay ve yıldızlar", "Ekmek, su ve hava"], "answer": "C", "sinav": 1}, {"no": "17", "body": "Kitapta namazın Arapçası olan \"Salât\" kelimesinin bir manasının dua olduğu belirtilmiş ve namazın üç çekirdeği açıklanmıştır: İnsanın fakirliğine karşı \"Elhamdülillâh\", âcizliğine karşı \"Allâh-u ekber\", kusurluluna karşı \"Sübhânallah\".\n\nPeygamberimiz namazdan sonra bu üç kelimenin kaçar defa tekrar edilmesini söylemiştir?", "options": ["33'er defa", "10'ar defa", "7'şer defa", "99'ar defa", "11'er defa"], "answer": "A", "sinav": 1}, {"no": "18", "body": "Kitapta namaz, insanın Allah'ın yeryüzündeki halifesi oluşunu sembolize ettiği belirtilmiştir. Bütün varlıklar ya kıyamda, ya rükûda ya da secde halindedir. Hayvanların iki ayaklı olanları kıyamda, dört ayaklı olanları rükûda, sürünenleri secdededir. Bitkilerden kavak ağacı gibi dimdik duranlar kıyamda, dallarını eğenler rükûda, otlar ise secdededir.\n\nBu modele göre bir mümin namazdaki kıyam, rükû ve secdesiyle neyi bir araya getirmiş olur?", "options": ["Yalnızca hayvanların ibadet şekillerini kendi namazında birleştirir", "Yalnızca meleklerin ibadet şekillerini kendi namazında birleştirir", "Yalnızca bitkilerin ibadet şekillerini kendi namazında birleştirir", "Bitkilerin, hayvanların ve meleklerin ibadetlerini kendi namazında birleştirir", "Yalnızca cansız varlıkların tesbih şekillerini kendi namazında birleştirir"], "answer": "D", "sinav": 1}, {"no": "19", "body": "Hasan-ı Basrî'ye göre Allah 104 kitap indirmiştir. Bu kitapların ilmi belirli bir sırayla daraltılmıştır.\n\nBu sıralama aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["104 kitap → Kur'ân → Fatiha", "104 kitap → 4 kitap → Kur'ân'ın büyük sûreleri → Fatiha", "104 kitap → 4 kitap → Fatiha", "104 kitap → Kur'ân'ın büyük sûreleri → Fatiha → İhlas", "104 kitap → Zebur → Kur'ân → Fatiha"], "answer": "B", "sinav": 1}, {"no": "20", "body": "Kitapta namazın günlük hayattan talep ettiği süre hesaplanmıştır.\n\nAbdest dahil namazın günden talep ettiği pay ve oran aşağıdakilerden hangisidir?", "options": ["Yaklaşık yarım saat — %2", "Yaklaşık bir saat — %4", "Yaklaşık bir buçuk saat — %6", "Yaklaşık 45 dakika — %3", "Yaklaşık iki saat — %8"], "answer": "B", "sinav": 1}, {"no": "21", "body": "Kitapta \"Kavanoz\" temsili anlatılmıştır. Öğretmen sırasıyla büyük taşlar, çakıl taşları, kum ve su koyarak kavanozu doldurmuştur.\n\nÖğrencilerin çıkardığı ders ile öğretmenin vermek istediği ders arasındaki fark aşağıdakilerden hangisidir?", "options": ["Öğrenciler: Boş vakit bulunabilir / Öğretmen: En önemlisinden başla", "Öğrenciler: Planlama önemlidir / Öğretmen: Disiplin şarttır", "Öğrenciler: Küçükler önemlidir / Öğretmen: Büyükler önemlidir", "Öğrenciler: Her şeye yer var / Öğretmen: Sıralama önemli değil", "Öğrenciler: Kavanoz küçüktür / Öğretmen: Kavanoz büyüktür"], "answer": "A", "sinav": 1}, {"no": "22", "body": "Bir adam Peygamberimize gelip amellerin en faziletlisini sormuştur. Peygamberimiz üç defa aynı cevabı vermiş, dördüncüde farklı bir cevap vermiştir.\n\nBu sıralama aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namaz — Namaz — Namaz — Allah yolunda cihat", "Namaz — Oruç — Zekât — Hac", "Namaz — Namaz — Namaz — Hac", "Namaz — Namaz — Namaz — Sadaka", "İman — İman — İman — Namaz"], "answer": "A", "sinav": 1}, {"no": "23", "body": "Kitapta \"Namaz kılmıyorum ama kalbim temiz\" söyleminin psikolojik analizi yapılmış ve bu durum psikolojideki bir savunma mekanizmasıyla açıklanmıştır.\n\nBu savunma mekanizması ve tanımı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Bastırma — İstenmeyen duyguları bilinçaltına itmek", "Yüceltme — Olumsuz durumu olumluya çevirmek", "İnkâr — Gerçeği kabul etmemek", "Yer değiştirme — Duyguları başka hedefe yöneltmek", "Yansıtma — Kişinin kendi kusurlarını başkalarında görme davranışı"], "answer": "E", "sinav": 1}, {"no": "24", "body": "İmam-ı A'zam, namazda kıraat konusunda \"(Namazda) Kur'ân'dan kolayınıza geleni okuyun!\" (el-Müzzemmil, 73/20) âyetine dayanarak en az bir ayet okunmasını yeterli görmüştür.\n\nTalebeleri ise bunu az bulmuştur. Talebelerin görüşü aşağıdakilerden hangisidir?", "options": ["En az Fâtiha sûresi ve ardından bir sûre daha okunmalıdır", "Ya üç âyet ya da üç âyet uzunluğunda bir âyet okunmalıdır", "En az iki âyet okunmalıdır, ancak kısa âyetler hariç tutulur", "En az bir sûre okunmalıdır, tek bir âyet hiçbir hâlde yetmez", "En az beş âyet okunmalıdır, böylece rükû ile dengeli olur"], "answer": "B", "sinav": 1}, {"no": "25", "body": "Peygamberimiz (sav) geçmiş ve gelecek bütün günahları affedildiği halde sabahlara kadar namaz kılmıştır.\n\n\"Niçin böyle yapıyorsun?\" diyenlere verdiği cevap aşağıdakilerden hangisidir?", "options": ["\"Ümmetim için şefaat diliyorum.\"", "\"Şükreden bir kul olmayayım mı?\"", "\"Cennetin en yüksek derecesini istiyorum.\"", "\"Günahlarımdan korkuyorum.\"", "\"Allah'ın emrini yerine getiriyorum.\""], "answer": "B", "sinav": 1}, {"no": "26", "body": "Kitapta Peygamberimizin darlıkta ve bollukta söylediği hamd ifadeleri aktarılmıştır.\n\nSevindiğinde ve hoşuna gitmeyen bir şey olduğunda söylediği ifadeler aşağıdakilerden hangisinde doğru eşleştirilmiştir?", "options": ["Sevinçte: \"Elhamdülillâh\" / Kederde: \"İnnâ lillâhi ve innâ ileyhi râciûn\"", "Sevinçte: \"Sübhânallah\" / Kederde: \"Lâ havle velâ kuvvete illâ billâh\"", "Sevinçte: \"Salih amellerin nimetiyle tamamlandığı Allah'a hamd ederim\" / Kederde: \"Her hal üzere Allah'a hamd olsun\"", "Sevinçte: \"Allâh-u ekber\" / Kederde: \"Hasbunallahu ve ni'mel vekîl\"", "Sevinçte: \"Mâşâallah\" / Kederde: \"Allah sabredenlerin yanındadır\""], "answer": "C", "sinav": 1}, {"no": "27", "body": "Kitapta Peygamberimizin ahiretteki hesaba ilişkin şu hadisi aktarılmıştır: \"Allah'ın insanlara dinlerinden ilk farz kıldığı şey namazdır, geriye en son kalacak olan namazdır, kıyamette ilk hesaba çekilecekleri de namazdır.\"\n\nFarz namazlarda eksiklik çıkması durumunda Allah'ın meleklere vereceği emir aşağıdakilerden hangisidir?", "options": ["Kulumun imanının gücüne bakın, onu temize çıkarın", "Kulumun tövbelerine bakın, affına vesile kılın", "Kulumun nafile namazı var mı? Farzları nafile ile tamamlansın", "Kulumun sadakalarına bakın, onlarla dengeleyin", "Kulumun oruçlarına bakın, eksikliği onunla kapatsın"], "answer": "C", "sinav": 1}, {"no": "28", "body": "Kitapta cennet hayatı anlatılırken Peygamberimizin cennete en son girecek kişi hakkındaki hadisi aktarılmıştır. Bu kişi cenneti dolmuş sanıp üç kez geri dönecektir.\n\nAllah'ın bu kişiye vereceği mülk aşağıdakilerden hangisidir?", "options": ["Dünya kadar yer", "Dünya kadar ve dünyanın iki misli yer", "Dünya kadar ve dünyanın beş misli yer", "Dünya kadar ve dünyanın on misli yer", "Sınırsız ve ölçüsüz bir mülk"], "answer": "D", "sinav": 1}, {"no": "29", "body": "Kitapta ölümün ahirette bir koç sûretinde getirilip boğazlanacağı anlatılmıştır.\n\nPeygamberimiz bu olayın etkisi hakkında ne buyurmuştur?", "options": ["\"Bu hal cennetliklerin sevincini artırırken, cehennemliklerin üzüntüsünü artırır.\"", "\"Bu hal cennetlikleri şükre, cehennemlikleri tövbeye sevk eder.\"", "\"Bu hal herkes için bir kurtuluş müjdesidir.\"", "\"Bu hal yalnızca cennetlikleri sevindirir.\"", "\"Bu hal yalnızca cehennemlikleri üzer.\""], "answer": "A", "sinav": 1}, {"no": "30", "body": "Kitapta öldükten sonra dirilişin beş delili sıralanmıştır: Fıtrata konulan ebediyet arzusu, ilahi saltanatın mükâfat-ceza gerektirmesi, Allah'ın mutlak adaleti, her gece/mevsim/asırda dirilişin örnekleri ve bahar mevsiminin kışın ölen türleri yeniden diriltmesi.\n\nBu delillerden \"fıtrata konulan ebedi yaşama arzusu\" deliline göre, bu arzunun verilip ebedi hayatın yaratılmaması Allah'ın hangi sıfatlarına zıt olurdu?", "options": ["Kudret, celal ve azamet", "İlim, irade ve kudret", "Vahdaniyet, kıdem ve beka", "Hikmet, merhamet ve adalet", "Rahmet, kerem ve lütuf"], "answer": "A", "sinav": 1}, {"no": "31", "body": "\"Zamana Hükmeden Namaz\" bölümünde Kur'ân'ın zaman ve vakit kavramları arasında önemli bir ayrım yaptığı belirtilmiştir.\n\nKitaba göre vakit, zamandan nasıl ayrılır?", "options": ["Vakit geçmişe aittir, zaman ise geleceği ve şimdiyi kapsar", "Vakit, zamanın kayıt edilmiş, tanzim edilmiş ve belirlenmiş hâlidir", "Vakit ve zaman eş anlamlıdır ancak farklı bağlamlarda kullanılır", "Vakit kozmik ölçeği ifade eder, zaman bireysel algıya dayanır", "Vakit yalnızca namaz için kullanılan teknik bir terim olarak geçer"], "answer": "B", "sinav": 1}, {"no": "32", "body": "Kitapta Kur'ân-ı Kerîm'de namaz ibadeti için \"kılmak\" yerine sürekli başka bir fiil kullanıldığı vurgulanmıştır.\n\nBu fiil aşağıdakilerden hangisidir?", "options": ["Eda etmek", "İkame etmek", "Yerine getirmek", "İfa etmek", "Hakkını vermek"], "answer": "B", "sinav": 1}, {"no": "33", "body": "Kitapta \"Vaktin Çağrısı\" bölümünde beş vakit namaz insan ömrünün dönemleri ve tabiatın mevsimleriyle ilişkilendirilmiştir.\n\nAşağıdaki eşleştirmelerden hangisi yanlıştır?", "options": ["Sabah → Baharla diriliş, hayata merhaba", "Öğle → Güneşin zirvesi, gençliğin kemâli", "İkindi → Hazan mevsimi, ihtiyarlığın yükü", "Akşam → Ölüm ve ayrılık, son nefes", "Yatsı → Bahar, yeni başlangıç"], "answer": "E", "sinav": 1}, {"no": "34", "body": "Kitapta ezanın ortaya çıkış sürecinde namaza çağrı için çeşitli yöntemler teklif edilmiş ancak Peygamberimiz bunları reddetmiştir.\n\nAşağıdakilerden hangisi reddedilen yöntemlerden biri değildir?", "options": ["Çan çalınması", "Boru kullanılması", "Ateş yakılması", "İnsan sesiyle seslenilmesi", "Bayrak dikilmesi"], "answer": "D", "sinav": 1}, {"no": "35", "body": "Kitapta ezanın ortaya çıkış süreci detaylı anlatılmıştır. Çan, boru ve ateş yakma teklifleri başka din sembolü olarak reddedilmiş, Hz. Ömer'in teklifiyle Bilal sokaklarda seslenmiş ama bu da yeterli görülmemiştir. Nihayet bir sahâbî rüyasında yeşil elbiseli birinden ezan sözlerini öğrenmiş, Peygamberimiz bunu \"hak bir rüya\" olarak değerlendirip ezanı başka birine okutmuştur.\n\nEzanı rüyada öğrenen ve okuyan sahâbîler aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Rüya: Hz. Ömer / Okuyan: Hz. Bilal", "Rüya: Hz. Bilal / Okuyan: Abdullah b. Zeyd", "Rüya: Hz. Ebu Bekir / Okuyan: Hz. Bilal", "Rüya: Abdullah b. Zeyd / Okuyan: Hz. Ömer", "Rüya: Abdullah b. Zeyd / Okuyan: Hz. Bilal"], "answer": "E", "sinav": 1}, {"no": "36", "body": "Kitapta Peygamberimizin ezanı neden Abdullah b. Zeyd'e değil de Bilal'e okuttuğu açıklanmıştır.\n\nBu sebebin ne olduğu aşağıdakilerden hangisidir?", "options": ["Hz. Bilal rüyayı daha önce görmüştür", "Hz. Bilal Peygamberimize daha yakındır", "Hz. Bilal daha yaşlı ve tecrübelidir", "Hz. Bilal'in sesi daha gür ve güzeldir", "Hz. Bilal Mekke'den beri Müslümandır"], "answer": "D", "sinav": 1}, {"no": "37", "body": "Kitapta Hz. Peygamber'in hicret sürecinde Kubâ'ya varışı ve Medine'ye geçişi anlatılmıştır. Kubâ'da yaklaşık on dört gün kalmış ve İslam tarihindeki ilk önemli yapıyı inşa etmiştir. Ardından Medine'ye geldiğinde daha devesinden inmeden yapının yerini tespit etmiştir.\n\nKubâ'da inşa edilen yapı ve İslam tarihindeki önemi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kubâ Çarşısı — İslam'ın ilk ticaret merkezi", "Kubâ Mescidi — İslam'ın ilk mescidi", "Kubâ Medresesi — İslam'ın ilk eğitim kurumu", "Suffe — İslam'ın ilk barınma merkezi", "Kubâ Kalesi — İslam'ın ilk savunma yapısı"], "answer": "E", "sinav": 1}, {"no": "38", "body": "Kitapta İmam Gazali'nin namaz için taharete ilişkin üç temizlik katmanı zikredilmiştir. Bu katmanlar dıştan içe birbirini kuşatmaktadır.\n\nBu üç katman aşağıdakilerden hangisinde doğru sırayla verilmiştir?", "options": ["Kalp — Beden — Elbise", "Elbise — Beden — Kalp", "Beden — Kalp — Elbise", "Kalp — Elbise — Beden", "Elbise — Kalp — Beden"], "answer": "B", "sinav": 1}, {"no": "39", "body": "Kitapta İblisin isyanının temel sebebi olan hastalık ve bu hastalığın insanda tezahür biçimi açıklanmıştır.\n\nBu hastalık ve insandaki tezahürü aşağıdakilerden hangisidir?", "options": ["Cehalet — Bilgisizlikle günah işlemek ve tövbeyi ihmal etmek", "Haset — Başkalarını kıskanıp onların nimetlerini çekememek", "Nifak — İki yüzlülükle yaşayıp dışı başka içi başka olmak", "Tamah — Açgözlülükle asla doyamamak ve hep daha fazla istemek", "Kibir — Nefsine toz kondurmayıp kusuru hep dışarıda aramak"], "answer": "E", "sinav": 1}, {"no": "40", "body": "Hz. Yusuf (as) \"Ben nefsimi tebrie etmem; Rabbimin merhameti müstesna, nefis daima kötülüğü emreder\" demiştir. Hz. Yunus (as) ise \"Seni tesbih ve tenzih ederim; ben zalimlerden oldum\" demiştir.\n\nBu iki peygamberin kitapta vurgulanan ortak özelliği aşağıdakilerden hangisidir?", "options": ["Her ikisi de nefsini kusursuz görmeyip Allah'a sığınmıştır", "Her ikisi de mucize göstermiştir", "Her ikisi de kavimlerinden kaçmıştır", "Her ikisi de deniz yolculuğu yapmıştır", "Her ikisi de günahlarından dolayı cezalandırılmıştır"], "answer": "A", "sinav": 1}, {"no": "41", "body": "Kitapta nefsin \"emmâre\" özelliği anlatılırken Hz. Yusuf'un \"Nefsimi tebrie etmem, nefis kötülüğü emreder\" ve Hz. Yunus'un \"Seni tesbih ederim, ben zalimlerden oldum\" sözleri aktarılmıştır. Bu peygamberlerin ortak tavrı olan murakabe ve muhasebe bilincini Peygamberimiz de sürekli bir dua ile ifade etmiştir.\n\nBu dua ve temel mesajı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["\"Allah'ım günahlarımı affet\" — Günahlardan arınma isteği", "\"Allah'ım bana sabır ver\" — Musibetlere dayanma gücü", "\"Allah'ım beni bir an nefsimle başbaşa bırakma\" — Nefsin her an kötülüğe sevk edebileceği bilinci", "\"Allah'ım beni cennetine koy\" — Ahiret kaygısı", "\"Allah'ım düşmanlarıma karşı yardım et\" — Düşmanlara karşı güç talebi"], "answer": "E", "sinav": 1}, {"no": "42", "body": "Kitapta Şuayb (as)'ın kıssası, namazın hayatın her alanını kuşatan bir ubudiyet hali için adres gösterildiğinin delili olarak aktarılmıştır. Şuayb kavmini ölçü ve tartıda doğruluğa çağırmış, kavmi ise manidar bir cevap vermiştir.\n\nKavmin Şuayb'a verdiği cevap ve bunun gösterdiği gerçek aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["\"Atalarımızın dinine döneceğiz\" — Geleneklere bağlılık", "\"Sana namazın mı emrediyor bunları?\" — Namazın ahlâki ve ticari hayatı da kuşattığı", "\"Biz doğru tartıyoruz\" — Kavmin masum olduğu", "\"Sen zenginlerden değilsin\" — Sınıf ayrımı", "\"Biz seni yalancı görüyoruz\" — Peygambere güvensizlik"], "answer": "A", "sinav": 1}, {"no": "43", "body": "İkbal'in secde hakkındaki meşhur sözü kitapta namazın insanı nasıl özgürleştirdiğini anlatmak için kullanılmıştır.\n\nBu söz aşağıdakilerden hangisidir?", "options": ["Secde eden insanlık tahtına oturur, dünyaya hükmeden olur", "Sana ağır gelen o bir secde var ya, binlerce secdeden kurtarır seni", "Namaz müminin miracıdır, onu terk eden yükselemez asla", "Her secde bir kurtuluştur, secdeden kalkan yeni doğmuş gibidir", "Secdesiz geçen hayat, anlamsız ve yönsüz bir hayattır ancak"], "answer": "B", "sinav": 1}, {"no": "44", "body": "Kitapta Miraç hadisinde namazın 50 vakitten 5 vakte indirilme süreci anlatılmıştır. Peygamberimize hafifletme tavsiyesinde bulunan peygamber ve onun bulunduğu sema aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Hz. İbrahim — 7. sema", "Hz. İsa — 4. sema", "Hz. Musa — 6. sema", "Hz. Dâvûd — 5. sema", "Hz. İdris — 3. sema"], "answer": "C", "sinav": 1}, {"no": "45", "body": "Miraç hadisinde Hz. Musa, Peygamberimize \"Rabbine geri dön ve hafifletmesini iste\" deme gerekçesini açıklamıştır.\n\nBu gerekçe aşağıdakilerden hangisidir?", "options": ["Peygamberler bile bu kadar ağır yüke güç yetiremezler", "Gece namazı çok zordur, ümmetinin gücü buna yetişmez", "Ümmetin çok fakir, güçsüz ve sayıca az olduğu için yetişmez", "İsrailoğulları'na iki vakit farz kılındı, onlar onu bile yapmadılar", "Beş vakit bile ağırdır, hiç değilse üçe indirilmesi gerekir"], "answer": "D", "sinav": 1}, {"no": "46", "body": "Kitapta Hakîm Tirmizî'den aktarılan bölümde her ibadetin kendine özgü bir semeresi olduğu belirtilmiştir. Orucun semeresi nefsin temizlenmesi, zekâtın semeresi malın temizlenmesi, haccın semeresi bağışlanma, cihadın semeresi cennettir.\n\nNamezin diğer ibadetlerden farklı olan semeresi ve bu farkın anlamı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namazın semeresi günahlardan arınmadır; oruçla aynı düzeydedir", "Namazın semeresi cennet mükâfatıdır; cihatla aynı düzeydedir", "Namazın semeresi nefsin temizlenmesidir; diğerlerinden bağımsızdır", "Namazın semeresi Allah'ın kuluna yönelmesidir ve bu yönelişte diğer tüm ibadetlerin semereleri de mevcuttur", "Namazın semeresi yalnızca bağışlanmadır; hacla aynı düzeydedir"], "answer": "C", "sinav": 1}, {"no": "47", "body": "Kitapta \"Allah gözlerimin nurunu namazda kıldı\" hadisinde önemli bir dilbilimsel inceliğe dikkat çekilmiştir.\n\nBu incelik aşağıdakilerden hangisidir?", "options": ["\"Nuru\" kelimesinin ışık anlamına gelmesi", "\"Kıldı\" fiilinin edilgen olması", "\"Gözümün\" ifadesinin mecazi olması", "Hadiste \"namaz ile\" değil \"namazda\" denilmiş olması", "Hadisin zayıf olarak rivayet edilmesi"], "answer": "D", "sinav": 1}, {"no": "48", "body": "Kitapta Hakîm Tirmizî'nin temsili aktarılmıştır: Allah insana yedi aza bahşetmiş ve kalbi bu azalara emir tayin etmiştir. Kalbe marifet, akıl, ilim gibi hazineler yerleştirilmiştir. Bu temsilde yedi aza yedi koyuna, kalp ise çobana benzetilmiştir. Çoban koyunlarını vadilerine gönderir, gözetler, kuyuya düşeni çıkarır, kurda saldırılanı kurtarır, zehirli otlaklara gireni tedavi eder.\n\nBu temsilde çobanın (kalbin) asıl görevi aşağıdakilerden hangisidir?", "options": ["Koyunları satıp yeni sürü edinmek", "Koyunları sürekli bir arada tutmak", "Azalar üzerinde hâkim olarak onları günahlardan korumak", "Koyunları başka çobanlara teslim etmek", "Yalnızca koyunları beslemek"], "answer": "E", "sinav": 1}, {"no": "49", "body": "Kitapta Peygamberimizin namaza olan muhabbetini gösteren iki hadis aktarılmıştır. \"Allah gözlerimin nurunu namazda kıldı\" hadisinde \"namaz ile\" yerine \"namazda\" denilmesine dikkat çekilmiştir. İkinci hadiste ise Hz. Bilal'e hitaben bir söz söylenmiş ve bazı gafillerin yanlış yorumuna karşı uyarı yapılmıştır.\n\nHz. Bilal'e söylenen söz ve bu sözdeki incelik aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["\"Ezan oku ya Bilal\" — Ezanın farz olduğu vurgulanmıştır", "\"Kamet getir ya Bilal, bizi onunla rahata erdir\" — \"Ondan kurtar\" değil \"onunla rahata erdir\" denilmiştir", "\"Namaza kaldır ya Bilal\" — Namazın zorunluluğu belirtilmiştir", "\"Sesini yükselt ya Bilal\" — Ezanın gür sesle okunması emredilmiştir", "\"Acele et ya Bilal\" — Namazın vaktinde kılınması gerektiği vurgulanmıştır"], "answer": "D", "sinav": 1}, {"no": "50", "body": "Kitapta namazın zahiri ve batıni yönleri ele alınmıştır: \"Şekil şartları namazın cesedi, huşu ve huzur-u kalp ise ruhudur. Şuhuttan uzak, kalple değil sadece kalıpla kılınan namaz ile farz yerine getirilmiş olsa da vuslat başka bir vakte kalmıştır.\"\n\nBu ifadeden çıkarılabilecek sonuç aşağıdakilerden hangisidir?", "options": ["Namazda yalnızca şekil şartlarını yerine getirmek yeterlidir", "Huşu olmadan kılınan namaz geçersizdir ve yeniden kılınmalıdır", "Namazın farzı yerine getirilse de huşu olmadan gerçek vuslat (kavuşma) gerçekleşmez", "Kalple kılınan namaz şekil şartlarından muaftır", "Namazda yalnızca niyetin temiz olması yeterlidir"], "answer": "C", "sinav": 1}, {"no": "51", "body": "Kitapta namazın dışındaki farzlar (şartlar) altı madde olarak sıralanmıştır.\n\nAşağıdakilerden hangisi bu altı şarttan biri değildir?", "options": ["Hadesten taharet", "Setr-i avret", "Kıraat", "İstikbâl-i kıble", "Niyet"], "answer": "C", "sinav": 1}, {"no": "52", "body": "Kitapta cenaze namazı diğer namazlardan farklı özellikleriyle anlatılmıştır. Secdesiz ve rükûsuz olarak dört tekbirle kılınır. Her tekbirde ayrı dualar okunur. Bu namaz, Müslümanların birbirlerine karşı dini ve sosyal sorumluluklarından biridir.\n\nCenaze namazının dinî hükmü ve bu hükmün anlamı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Farz-ı aynî — Her Müslüman bizzat kılmak zorundadır, muaf değildir", "Vâcip — Kılınmazsa günah olur fakat kılmamak küfür sayılmaz", "Sünnet-i müekkede — Peygamberimiz sürekli kılmıştır ama farz değildir", "Farz-ı kifâye — Bir grup kıldığında diğerlerinden sorumluluk düşer", "Nafile — İsteğe bağlıdır, kılınması sevap, terki günah değildir"], "answer": "D", "sinav": 1}, {"no": "53", "body": "Kitapta ezan dinleme adabı anlatılmıştır. Müezzinin sözleri tekrar edilir; ancak iki cümlede farklı bir ifade söylenir. Ayrıca sabah ezanındaki özel ilavede de farklı bir karşılık verilir.\n\n\"Hayye ale's-salâh\" ve \"Hayye ale'l-felâh\" cümlelerinde söylenen ifade ile sabah ezanındaki \"es-Salâtü hayrun mine'n-nevm\" cümlesine karşılık söylenen ifade aşağıdakilerden hangisinde doğru eşleştirilmiştir?", "options": ["Hayye'lerde: Sübhânallah / Sabahta: Allâh-u ekber", "Hayye'lerde: Allâh-u ekber / Sabahta: Elhamdülillâh", "Hayye'lerde: Sadakte ve berirte / Sabahta: Lâ havle velâ kuvvete illâ billâh", "Hayye'lerde: Lâ havle velâ kuvvete illâ billâh / Sabahta: Sadakte ve berirte", "Hayye'lerde: Elhamdülillâh / Sabahta: Sübhânallah"], "answer": "D", "sinav": 1}, {"no": "54", "body": "Kitapta namaz çeşitleri dinî hükmü açısından farz, vacip ve nafile olarak üçe ayrılmıştır. Her birinin alt kategorileri vardır: Farz namazlar ayni ve kifai; vacip namazlar li-aynihî ve li-gayrihî; nafile namazlar revâtib ve regâib.\n\nAşağıdaki namaz-kategori eşleştirmelerinden hangisi yanlıştır?", "options": ["Beş vakit namaz — Farz-ı ayni", "Cenaze namazı — Farz-ı kifai", "Vitir ve bayram namazları — Vacip li-aynihî", "Teravih namazı — Nafile (revâtib)", "Adak namazı — Farz-ı ayni"], "answer": "B", "sinav": 1}, {"no": "55", "body": "Kitapta Ukbe b. Âmir el-Cühenî'den nakledilen hadise göre Peygamberimiz üç vakitte namaz kılmayı ve ölüleri defnetmeyi yasaklamıştır. Bu vakitlerde kaza, vacip ve önceden hazırlanmış cenazenin namazı kılınamaz. Süreleri mutedil bölgelere göre verilmiştir.\n\nAşağıdakilerden hangisi bu üç kerâhet vaktinden biri değildir?", "options": ["Güneşin doğmasından yükselmesine kadar (40-50 dakika)", "Güneşin gökyüzünde tam dik olduğu vakit (yaklaşık 10 dakika)", "Güneşin sararmasından batmasına kadar (40-50 dakika)", "İmsak vaktinin girmesinden güneşin doğmasına kadar", "Hepsi kerâhet vaktidir"], "answer": "A", "sinav": 1}, {"no": "56", "body": "Namazın psikolojisi bölümünde namazın dört psikolojik boyutu açıklanmıştır.\n\nAşağıdakilerden hangisi bu boyutlardan biri değildir?", "options": ["Davranışsal yön (kötülükten alıkoyma)", "Zihinsel yön (kendini sorgulama, tefekkür)", "Duygusal yön (sevgi, korku, merhamet)", "Ekonomik yön (bereket ve rızık)", "Şekli yön (kıyam, rükû, secde)"], "answer": "D", "sinav": 1}, {"no": "57", "body": "Kitapta \"Kişinin namazı eğer kendisini fuhşiyattan ve kötülüklerden alıkoymuyorsa, onu Allah'tan daha fazla uzaklaştırmaktan başka bir işe yaramamıştır\" hadisi aktarılmıştır.\n\nBu durumun kitaptaki açıklaması aşağıdakilerden hangisidir?", "options": ["Namazı vakitli kılmamak ve sonraya bırakma alışkanlığı olarak açıklanır", "Kitaptaki kaynak Taberî tefsirine aittir, sebep kalbin bozukluğudur", "Kitaptaki kaynak İbn Kesîr'e aittir, sebep niyetin zayıflığı olarak açıklanır", "Kitaptaki kaynak Kurtubî'ye aittir, sebep cehalet ve bilgisizliktir", "Kitaptaki kaynak Beyhakî'ye aittir, sebep tövbenin gecikmesi olarak verilir"], "answer": "E", "sinav": 1}, {"no": "58", "body": "Kitapta namazın sonunda okunan tahiyyat duası \"namazın miraç olduğunun tescili\" olarak nitelendirilmiştir. Bu dua vesilesiyle miraçta gerçekleşen kutsal bir ana şahit tutuluruz. Ardından şehadet getirilir, salavat ve dualarla Peygamberimize hürmet arz edilir.\n\nTahiyyat duasının \"namazın miraç olduğunun tescili\" sayılmasının sebebi aşağıdakilerden hangisidir?", "options": ["Tahiyyatta Allah'ın doksan dokuz ismi zikredildiği için", "Tahiyyatta tüm peygamberlere ayrı ayrı selam gönderildiği için", "Miraçta Allah Teâlâ ile Peygamberimizin selamlaşmalarına bu dua ile şahit tutulduğumuz için", "Tahiyyatın yalnızca son oturuşta okunması miraçın sonunu temsil ettiği için", "Tahiyyatta Kur'ân'dan ayetler okunduğu için"], "answer": "C", "sinav": 1}, {"no": "59", "body": "Kitapta namazın şekil şartlarının ötesinde bir derinliğe sahip olması gerektiği vurgulanmıştır. Niyazi Mısrî'nin \"Savm u salât u hac ile sanma biter zahit işin / İnsan-ı kamil olmaya lazım olan irfan imiş\" beyti aktarılmış, ardından şöyle denilmiştir: \"Namazla huzura eren, şuurla dirilişi yaşayan kulların elinden, dilinden, gözünden, kulağından kimseye zarar gelmez.\"\n\nBu beyit ve ifade birlikte değerlendirildiğinde kitabın ulaştığı sonuç aşağıdakilerden hangisidir?", "options": ["Oruç, hac ve zekât namazdan daha önemlidir", "İbadetlerin şekli yerine getirildiğinde insan-ı kâmil olunur", "Namazın hikmetini idrak etmek ve irfanla birleştirmek gerekir; aksi halde şeklen kılınan namaz insanı dönüştürmez", "Tasavvuf ibadetlerden üstündür", "Zahitlik yanlış bir yoldur"], "answer": "B", "sinav": 1}, {"no": "60", "body": "Kitabın genelinde namaz ibadeti; şükür, zaman, kulluk ve özgürlük kavramlarıyla bütüncül olarak ele alınmıştır. Peygamberimiz bu semavi yolculuktan namaz hediyesiyle dönmüş ve vefatından hemen önce ısrarla tekrarlamıştır.\n\nPeygamberimizin vefatından önce ısrarla tekrarladığı son sözler aşağıdakilerden hangisidir?", "options": ["\"Namaza devam edin! Namaza, namaza!\"", "\"Ümmetim, ümmetim!\"", "\"Kur'ân'a sarılın!\"", "\"Birbirinizi sevin!\"", "\"Allah'tan korkun!\""], "answer": "A", "sinav": 1}, {"no": "1", "body": "Kitapta Christy Brown adlı yazarın \"Sol Ayağım\" isimli kitabından bahsedilmiştir. Brown doğuştan beyin felçli olarak doğmuş ve üç yıl boyunca vücudunda çalışan tek organ olmamıştır.\n\nÜçüncü yılın sonunda çalışmaya başlayan tek organı aşağıdakilerden hangisidir?", "options": ["Sağ eli", "Sol eli", "Sol ayağı", "Sağ ayağı", "Dili"], "answer": "C", "sinav": 2}, {"no": "2", "body": "Christy Brown, Fransa'nın hangi kasabasında diğer engelli insanları gördükten sonra şükür bilincine ulaşmıştır?", "options": ["Paris", "Lyon", "Lordes", "Marsilya", "Nice"], "answer": "C", "sinav": 2}, {"no": "3", "body": "Kitapta nefes almanın aslında üç ayrı faydası olduğu belirtilmiştir.\n\nAşağıdakilerden hangisi bu üç faydadan biri değildir?", "options": ["Kan temizlenmesi", "Beyin fonksiyonlarının güçlenmesi", "Konuşma imkânı sağlanması", "Vücut ısısının dengelenmesi", "Hepsi kitapta geçen faydalardandır"], "answer": "B", "sinav": 2}, {"no": "4", "body": "Kitapta \"Medeniyet başparmağın eseridir\" ifadesiyle hangi konuya dikkat çekilmiştir?", "options": ["Bunu arıyordum, bu benim arayışımdı diyerek Müslüman olmuştur", "Namazdan etkilenip camiye gitmiş ancak İslam'ı kabul etmemiştir", "Parkta namaz kılanı uyararak bu davranışın yasak olduğunu söylemiştir", "Namaz kılan kişiyi görmezden gelerek yoluna devam etmiştir", "Merak edip sormuş ancak kendi dininde kalmayı tercih etmiştir"], "answer": "A", "sinav": 2}, {"no": "5", "body": "Kitapta arıların Hz. Âdem'den bu yana yalnızca petek örüp bal ürettiği, binlerce yıl boyunca faaliyetlerinde değişiklik olmadığı belirtilmiştir.\n\nBu örnek kitapta hangi nimetin önemini vurgulamak için kullanılmıştır?", "options": ["Bal nimeti", "Doğa nimeti", "Çalışma nimeti", "Sabır nimeti", "Akıl nimeti"], "answer": "E", "sinav": 2}, {"no": "6", "body": "Kitapta yeryüzünde hangi elementin bulunmaması halinde insanlığın bugünkü medeniyet seviyesine ulaşamayacağı belirtilmiştir?", "options": ["Altın", "Bakır", "Gümüş", "Demir", "Kömür"], "answer": "D", "sinav": 2}, {"no": "7", "body": "Rivayete göre Cenâb-ı Hak Hz. Âdem'e zürriyetini göstermiştir. Hz. Âdem kiminin zengin kiminin fakir olduğunu görünce \"Keşke bunları eşit yapsaydın\" demiştir.\n\nAllah'ın Hz. Âdem'e verdiği cevap aşağıdakilerden hangisidir?", "options": ["\"Onlar imtihan ediliyorlar.\"", "\"Her birine ayrı hikmet verdim.\"", "\"Ben bana şükredilmesini severim.\"", "\"Fakirlik de zenginlik de bendendir.\"", "\"Sabırlı olanlar mükâfat görecek.\""], "answer": "C", "sinav": 2}, {"no": "8", "body": "Peygamberimiz çok sıcak bir gün evinden çıktığında Hz. Ebu Bekir ve Hz. Ömer ile karşılaşmış, onlara evlerinden çıkma sebebini sormuştur.\n\nHz. Ebu Bekir ve Hz. Ömer'in verdiği cevap aşağıdakilerden hangisidir?", "options": ["\"Seni aramaya çıktık Ya Resûlallah!\"", "\"Açlık Ya Resûlallah!\"", "\"Mescide namaz kılmaya gidiyoruz.\"", "\"Cihat için hazırlık yapıyoruz.\"", "\"Hastaları ziyarete gidiyoruz.\""], "answer": "B", "sinav": 2}, {"no": "9", "body": "Yukarıdaki kıssanın devamında Peygamberimiz ve iki arkadaşı Ensâr'dan bir zâtın evine gitmişlerdir. Ev sahibi onlara hurma salkımı getirmiş ve koyun kesmiştir.\n\nYemekten sonra Peygamberimizin Hz. Ebu Bekir ve Hz. Ömer'e söylediği söz aşağıdakilerden hangisidir?", "options": ["İbadetin dışa dönük görünüşü ve şekil kurallarına uygunluğu boyutu", "Namazda kendini sorgulama ve olumsuzluktan uzaklaşma süreci", "Namaza eşlik eden sevgi, saygı, korku ve şükür hisleri boyutu", "Kötülükten alıkoyma ve güzele yönelme şeklinde dışa yansıması", "Namazın beden sağlığına katkısı olan fizyolojik etki boyutu"], "answer": "E", "sinav": 2}, {"no": "10", "body": "Kitapta Peygamberimizin Medine'ye gelişinden vefatına kadar hizmetkârlığını yapan sahâbî şöyle demiştir: \"Rasûlullah, peygamber olarak görevlendirildiği günden vefat ettiği güne dek hiçbir zaman elekten geçirilmiş bir un görmedi.\"\n\nBu sözün sahibi aşağıdakilerden hangisidir?", "options": ["Enes b. Mâlik (ra)", "Abdullah b. Ömer (ra)", "Ebu Hüreyre (ra)", "Câbir (ra)", "Bilal b. Rebah (ra)"], "answer": "A", "sinav": 2}, {"no": "11", "body": "Peygamberimize Hz. Fatıma pişirdiği ekmekten bir parça getirmiş, \"Bu parçayı sana getirmeden ekmeği yemeye gönlüm razı olmadı\" demiştir.\n\nPeygamberimizin Hz. Fatıma'ya verdiği cevap aşağıdakilerden hangisidir?", "options": ["\"Allah senden razı olsun Ya Fatıma.\"", "\"Üç günden beri babanın ağzına giren ilk yiyecek budur.\"", "\"Bunu fakirlere dağıt.\"", "\"Bir hafta boyunca hiçbir şey yemedim.\"", "\"Şükür Ya Rabbi, nihayet ekmek geldi.\""], "answer": "B", "sinav": 2}, {"no": "12", "body": "Rivayetlere göre Tevrat'ta Peygamberimizin ümmeti hakkında kullanılan sıfat ve anlamı aşağıdakilerden hangisidir?", "options": ["Namaz kılmayan asker — omzunda yıldız olan komutana itaat örneği", "Hz. İbrahim ve meleklerin misafirliği — yemeğin fiyatı olarak şükür", "Hacivat-Karagöz oyunu — arkadaki görünmez eli fark etmek gerçeği", "Otomobil fabrikası — son birimdeki adamın ürünleri parçalaması", "Padişahın hediyesi — getiren fakire ilgi gösterip sahibini unutma"], "answer": "E", "sinav": 2}, {"no": "13", "body": "Kitapta tüccar ve hırsız kıssası anlatılmıştır. Hırsız tüccarı öldürmek istemiş, tüccar abdest alıp dört rekât namaz kılmış ve bir duayı üç kere tekrar etmiştir.\n\nTüccarın tekrar ettiği duanın başlangıcındaki Allah'ın ismi aşağıdakilerden hangisidir?", "options": ["Ya Rahmân", "Ya Vedûd", "Ya Rahîm", "Ya Kerîm", "Ya Gaffâr"], "answer": "B", "sinav": 2}, {"no": "14", "body": "Kitapta Amerikalı göz doktoru Laurence Brown'ın kızı hangi hastalıkla doğmuştur?", "options": ["Aort koarktasyonu", "Lösemi", "Beyin tümörü", "Kalp kapak yetmezliği", "Böbrek yetmezliği"], "answer": "A", "sinav": 2}, {"no": "15", "body": "Dr. Laurence Brown, kızının hastalığı karşısında dua etmeden önce hangi inanca sahipti?", "options": ["Hıristiyan", "Yahudi", "Müslüman", "Deist", "Ateist"], "answer": "E", "sinav": 2}, {"no": "16", "body": "Kitapta cennet hayatı anlatılırken \"yarım metrelik akvaryumdaki 500 cm'lik balık\" temsili kullanılmıştır.\n\nBu temsil ile anlatılmak istenen aşağıdakilerden hangisidir?", "options": ["Yalnızca sabah namazı ezanında eklenen ifade olarak geçmektedir", "Tüm vakitlerin ezanında okunan bir ifade olarak belirtilmiştir", "Yalnızca kamette okunan bir ifade olarak zikredilmiştir", "Yalnızca cuma namazı ezanında eklenen ifade olarak belirtilmiştir", "Hem ezan hem kamette okunan bir ifade olarak geçmektedir"], "answer": "E", "sinav": 2}, {"no": "17", "body": "\"Dünyanın ahirete nisbeti birinizin şu parmağını denize daldırması gibidir. Parmağını çektiğinde onun denizden ne kadar su çıkardığına bir bak!\"\n\nBu hadis hangi konuyu anlatmak için aktarılmıştır?", "options": ["İlk secde = Hakkın varlığında fenaya erme; ikinci secde = mutlak varlığın Hakka ait idraki", "İlk secde = Günahlardan arınma; ikinci secde = yeni bir başlangıç yapma iradesi", "İlk secde = Dünya nimetlerini terk; ikinci secde = ahiret nimetlerine yöneliş", "İlk secde = Kulluğu kabul etme; ikinci secde = nefisle mücadele azmi taşıma", "İlk secde = Allah'ın azametini idrak; ikinci secde = kendi aczini itiraf etme"], "answer": "B", "sinav": 2}, {"no": "18", "body": "Kitapta namaz kılmayan askerin, namaz kılan arkadaşına \"Niçin kendini zahmete sokup her gün beş defa namaz kılıyorsun?\" diye sorduğu kıssa anlatılmıştır.\n\nNamaz kılan askerin cevabındaki ana argüman aşağıdakilerden hangisidir?", "options": ["Kıyam = Kararlılık; rükû = Acz itirafı; secde = Tam teslimiyet şeklinde açıklanır", "Kıyam = İtaat; rükû = Korku; secde = Ümit şeklinde açıklanmıştır", "Kıyam = Şükür; rükû = Tesbih; secde = Hamd şeklinde açıklanmıştır", "Kıyam = Dua; rükû = İstiğfar; secde = Tövbe şeklinde açıklanmıştır", "Kıyam = Zikir; rükû = Tefekkür; secde = Murakabe şeklinde açıklanır"], "answer": "A", "sinav": 2}, {"no": "19", "body": "Kitapta insanların ibadet etme sebepleri üç grupta toplanmıştır.\n\nAşağıdakilerden hangisi bu üç sebepten biri değildir?", "options": ["Toplumda saygın bir konuma ulaşmak amacıyla", "Cehennemden korunmak ve cenneti kazanmak amacıyla", "Allah'ın azametini, büyüklüğünü görüp hayran olmak", "Nimetlere karşılık şükür duygusunu hissetmek", "Bazıları bu üç sebebi birleştirir"], "answer": "A", "sinav": 2}, {"no": "20", "body": "Kitapta kıyametten bahsedilirken \"Kıyamet gününde Allah Azze ve Celle şöyle buyurur: 'Ey Âdemoğlu! Ben seni atların, develerin üzerinde taşıdım, kadınlarla evlendirdim, sana bolluk verdim, başa geçirdim.'\" hadisi aktarılmıştır.\n\nHadisin devamındaki soru aşağıdakilerden hangisidir?", "options": ["\"İbadetlerin nerede?\"", "\"Namazların nerede?\"", "\"Bunların şükrü nerede?\"", "\"İmanın nerede?\"", "\"Tövben nerede?\""], "answer": "C", "sinav": 2}, {"no": "21", "body": "Kitapta \"Akıllı, zeki olan kişi nefsini hesaba çekip, ölümden sonrası için çalışan kimsedir\" hadisi aktarılmıştır.\n\nBu hadiste \"âciz\" olarak tanımlanan kişi aşağıdakilerden hangisidir?", "options": ["Ezan İslam'ın şiârıdır; abdest ise namazın şiârı olarak tanımlanır", "Ezan namazın şiârıdır; abdest ise imanın şiârı olarak tanımlanır", "Ezan cemaatin şiârıdır; abdest ise fıkhın şiârı olarak tanımlanır", "Ezan mescidlerin şiârıdır; abdest ise orucun şiârı olarak tanımlanır", "Ezan Cuma'nın şiârıdır; abdest ise haccın şiârı olarak tanımlanır"], "answer": "E", "sinav": 2}, {"no": "22", "body": "\"Lezzetleri acılaştırıp, yok eden ölümü çok zikrediniz.\" Peygamberimizin bu hadisi kitapta hangi bağlamda ele alınmıştır?", "options": ["Kulu şuur ve tefekküre yönlendiren, bilinç sıçramasına vesile olan simge", "İslam'ın dış dünyaya yansıyan görünür alameti ve pratik uygulaması", "Yalnızca ibadet vakitlerinde hatırlanan sembolik bir ritüel unsuru", "Müslümanları diğer dinlerden ayıran harici bir kimlik göstergesi", "İbadetlerin düzenini sağlayan organizasyonel bir araç ve yöntem"], "answer": "B", "sinav": 2}, {"no": "23", "body": "Kitapta ömrün azalması \"kum saati\" benzetmesiyle anlatılmıştır.\n\nBu benzetmede her kum tanesi neye denk gelmektedir?", "options": ["Bir güne", "Bir saate", "Bir nefese", "Bir namaza", "Bir amele"], "answer": "C", "sinav": 2}, {"no": "24", "body": "Kitapta modern verimlilik yaklaşımlarının zihinsel ve fiziksel performans için iki-üç saatte bir kısa molalar (mikro-aralar) önerdiği belirtilmiştir.\n\nKitaba göre İslam bu ritmi asırlardır hangi ibadet ile sunmaktadır?", "options": ["Kul ile Allah arasında paylaştırılmıştır", "Melek ile Peygamber arasında paylaştırılmıştır", "Kul ile Peygamber arasında paylaştırılmıştır", "Peygamber ile Allah arasında paylaştırılmıştır", "Melek ile Kul arasında paylaştırılmıştır"], "answer": "C", "sinav": 2}, {"no": "25", "body": "Kitapta nörobilimsel araştırmalara atıfla namazın etkileri açıklanmıştır.\n\nAşağıdakilerden hangisi kitapta belirtilen bilimsel bulgulardan biri değildir?", "options": ["Düzenli ibadet kortizol seviyesini düşürür", "Şükür temelli dualar serotonin salınımını artırır", "Şükür temelli dualar dopamin salınımını artırır", "Namaz bedensel egzersiz, zihinsel farkındalık ve duygusal dengeyi destekler", "Namaz kan basıncını doğrudan düşürür"], "answer": "E", "sinav": 2}, {"no": "26", "body": "Kitapta \"Helâl kazanç peşinde koşmak Allah yolunda cihattır\" hadisi hangi bağlamda aktarılmıştır?", "options": ["Lisan, beden, zihin ve kalbin hepsinin namaza iştirak etmesi gerekir", "Yalnızca beden ve dilin namaza iştirak etmesi yeterli kabul edilir", "Yalnızca kalp ve zihnin namaza iştirak etmesi esas kabul edilir", "Yalnızca lisan ve kalbin namaza iştirak etmesi şart koşulmuştur", "Yalnızca beden ve kalbin namaza iştirak etmesi yeterli görülür"], "answer": "E", "sinav": 2}, {"no": "27", "body": "Kitapta \"Namaz'a Dair Pratik 5 Tavsiye\" sıralanmıştır.\n\nAşağıdakilerden hangisi bu beş tavsiyeden biri değildir?", "options": ["Bugünü yakala, ebediyeti kurtar", "Her gün en az bir saat Kur'ân oku", "Sabır gücünü 'şimdi'ye odakla", "Ruhunu besle, kalbini soluksuz bırakma", "Gerçek meşguliyetin farkına var"], "answer": "B", "sinav": 2}, {"no": "28", "body": "Kitapta ezan sözleri ve tekrar sayıları verilmiştir.\n\n\"Allâhü Ekber\" ifadesi ezanda toplam kaç defa söylenir?", "options": ["2 defa", "4 defa", "8 defa", "6 defa", "10 defa"], "answer": "D", "sinav": 2}, {"no": "29", "body": "Sabah ezanında \"Hayye ale'l-felâh\" cümlesinden sonra eklenen ve diğer vakitlerde okunmayan ilave cümle aşağıdakilerden hangisidir?", "options": ["Kad kâmeti's-salâh", "Lâ ilâhe illallâh", "Allâhü Ekber", "es-Salâtü hayrun mine'n-nevm", "Eşhedü en lâ ilâhe illallâh"], "answer": "D", "sinav": 2}, {"no": "30", "body": "Kitapta Hz. Peygamber'in namazla ilgili son sözleri aktarılmıştır. Vefatına yakın günlerde ümmetine tekrar tekrar namaz konusunda tembihte bulunmuştur.\n\nBu son sözler aşağıdakilerden hangisidir?", "options": ["Namazlarınızı cemaatle kılın, tek başına kılmayın", "Namazı son vaktine bırakmayın, ilk vaktinde kılın", "Namaza devam edin! Namaza, namaza!", "Beş vakit namazı asla terk etmeyin, kazaya bırakmayın", "Namazda huşûyu muhafaza edin, acele etmeyin"], "answer": "C", "sinav": 2}, {"no": "31", "body": "Sabah ezanındaki \"es-Salâtü hayrun mine'n-nevm\" ilavesinin kametteki durumu aşağıdakilerden hangisidir?", "options": ["Kamette de okunur", "Yalnızca cuma kametinde okunur", "Kamette okunmaz", "Yalnızca bayram kametinde okunur", "İmamın tercihine bağlıdır"], "answer": "C", "sinav": 2}, {"no": "32", "body": "Kitapta ezan dinlerken sabah ezanındaki \"es-Salâtü hayrun mine'n-nevm\" cümlesine karşılık söylenmesi gereken ifade aşağıdakilerden hangisidir?", "options": ["Lâ havle velâ kuvvete illâ billâh", "Sadakte ve berirte", "Sübhânallah", "Allâhü Ekber", "Elhamdülillâh"], "answer": "B", "sinav": 2}, {"no": "33", "body": "Kitapta ezandan önce namaza çağrı yöntemi olarak çan, boru ve ateş yakma teklifleri reddedilmiştir.\n\nBu yöntemlerin reddedilme sebebi aşağıdakilerden hangisidir?", "options": ["Ses çıkarmalarının yetersiz olması", "Başka din ve kültürlerin sembolü olmaları", "Maliyetlerinin yüksek olması", "Peygamberimizin beğenmemesi", "Sahâbenin karşı çıkması"], "answer": "B", "sinav": 2}, {"no": "34", "body": "Kitapta Hz. Peygamber'in gece namazı hakkında Hz. Âişe'nin şahitliği aktarılmıştır. Hz. Âişe, Peygamberimizin geceleri ayakları şişinceye kadar namaz kıldığını görünce \"Allah senin geçmiş ve gelecek günahlarını bağışlamadı mı?\" diye sormuştur.\n\nPeygamberimizin bu soruya verdiği cevap aşağıdakilerden hangisidir?", "options": ["Gece namazı farz olan beş vakte dahildir, terk edilemez", "Geceleri kılınan namaz gündüzden daha faziletlidir", "Şükreden bir kul olmayayım mı?", "Gece namazı cennetin anahtarlarından biridir", "Ümmetim için şefaat vesilesi olması için kılıyorum"], "answer": "C", "sinav": 2}, {"no": "35", "body": "Kitapta Hz. Peygamber'in namazda duygulanması ve ağlaması anlatılmıştır. Sahâbe, namazda Peygamberimizin göğsünden kaynayan kazan gibi bir ses geldiğini aktarmıştır.\n\nBu bilgi kitapta hangi bağlamda değerlendirilmiştir?", "options": ["Namazda konsantrasyon tekniklerine örnek olarak verilmiştir", "Namazın bedensel zorluğuna işaret eden bir delil olarak sunulmuştur", "Namazda huşûnun en üst seviyesine örnek olarak zikredilmiştir", "Peygamberimizin hastalığına delil olarak tıbbi açıdan incelenmiştir", "Cemaatle namazda sesin yükseltilmesine örnek olarak verilmiştir"], "answer": "C", "sinav": 2}, {"no": "36", "body": "Kitapta son hastalığı sırasında Hz. Peygamber'in namaz kıldırma görevi için bir sahâbîyi imam tayin ettiği anlatılmıştır. Peygamberimiz kendisi oturarak cemaate katılmıştır.\n\nİmam tayin edilen sahâbî aşağıdakilerden hangisidir?", "options": ["Hz. Ömer — cesaret ve kararlılığı sebebiyle tercih edilmiştir", "Hz. Ali — ilim ve fıkıh bilgisi sebebiyle tercih edilmiştir", "Hz. Osman — yumuşak huyluluğu sebebiyle tercih edilmiştir", "Hz. Ebu Bekir — Peygamberimizin açık emriyle imam olmuştur", "Hz. Bilal — müezzinlik görevine ek olarak imamlık da yapmıştır"], "answer": "D", "sinav": 2}, {"no": "37", "body": "Kitapta \"Abdest masivadan uzaklaşma, namaz Allah'a yaklaşmadır\" ifadesi kullanılmıştır. Aynı bölümde ezan ve abdestin birer \"şiâr\" olduğu belirtilmiştir.\n\nKitapta şiârın tanımı aşağıdakilerden hangisidir?", "options": ["Namazı cemaatle kılmak tek başına kılmaktan yirmi yedi kat faziletlidir", "Namazı cemaatle kılmak tek başına kılmaktan on kat daha faziletlidir", "Namazı cemaatle kılmak tek başına kılmaktan yetmiş kat daha faziletlidir", "Namazı cemaatle kılmak tek başına kılmaktan kırk kat daha faziletlidir", "Namazı cemaatle kılmak tek başına kılmaktan elli kat daha faziletlidir"], "answer": "E", "sinav": 2}, {"no": "38", "body": "Kitapta namazdaki iki secdenin farklı anlamları açıklanmıştır.\n\nBirinci secde ve ikinci secdenin anlamları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Mescide alâkasını görürseniz imanına şehâdet edin (Tevbe 9/18, Tirmizî)", "Mescide gidenin her adımı bir sevaptır ve günahları silinir (Buhârî)", "Mescidler yalnızca Allah'a ait olup orada şirk koşulamaz (Cin, 72/18)", "Mescidleri imar edenler yalnızca Allah'a inanan kimselerdir (Tevbe 9/18)", "Mescide yürüyerek gitmek Allah yolunda cihad gibidir (Ahmed b. Hanbel)"], "answer": "D", "sinav": 2}, {"no": "39", "body": "Kitapta namazdaki selam vermenin anlamı şöyle açıklanmıştır: \"Sağ ve sola, evvel ve ahire, şehadet ve gayb âlemine selam vererek...\"\n\nBu ifadenin devamında selam vermenin ne anlama geldiği belirtilmiştir. Bu anlam aşağıdakilerden hangisidir?", "options": ["Hz. Peygamber birkaç gece kıldırdı, sonra cemaat kalabalıklaştığı için bıraktı", "Hz. Ebu Bekir döneminde başlatılıp her gece düzenli olarak kılınmıştır", "Hz. Ömer döneminden itibaren düzenli cemaatle kılınmaya başlanmıştır", "Hz. Osman döneminde başlatılıp iki rekat olarak kılınmıştır", "Hz. Ali döneminde farz ibadet olarak kabul edilmiş ve kılınmıştır"], "answer": "C", "sinav": 2}, {"no": "40", "body": "Kitapta Fatiha sûresinin Allah ile kul arasındaki özel durumu anlatılmıştır.\n\nBuna göre Fatiha sûresi hakkında söylenen aşağıdakilerden hangisidir?", "options": ["Kadınların ilk safta, erkeklerin arka safta durması müstehaptır", "Erkeklerin safı öne, kadınların safı arkaya; çocuklar arada durur", "Erkekler ve kadınlar yan yana, çocuklar en arka safta durur", "Kadınlar ve çocuklar birlikte, erkekler ayrı bir bölümde durur", "Çocuklar en öne, erkekler ortaya, kadınlar en arkaya durur"], "answer": "A", "sinav": 2}, {"no": "41", "body": "Kitapta 7 semanın meleklerinin her birinin farklı bir ibadet halinde olduğu anlatılmıştır.\n\nDünya semasının (1. sema) meleklerinin ibadet hali aşağıdakilerden hangisidir?", "options": ["Rükû", "Kıyam", "Secde", "Arş etrafında tavaf", "Tek ayak üzerinde kıyam"], "answer": "C", "sinav": 2}, {"no": "42", "body": "Kitapta amellerin fazilet sıralaması bir hadis ile belirtilmiştir. Peygamberimize \"Amellerin en faziletlisi hangisidir?\" diye sorulduğunda sırasıyla üç amel saymıştır.\n\nBu hadiste ilk üç sırada yer alan ameller aşağıdakilerden hangisidir?", "options": ["Oruç — Zekât — Hac şeklinde sıralanmıştır", "İlim öğrenmek — Namaz — Cihat şeklinde sıralanmıştır", "Namaz — Namaz — Allah yolunda cihat şeklinde sıralanmıştır", "Cihat — Namaz — Sadaka şeklinde sıralanmıştır", "Namaz — Oruç — Hac şeklinde sıralanmıştır"], "answer": "C", "sinav": 2}, {"no": "43", "body": "Kitapta \"Tüm semavat ehlinin ibadetleri tek bir namazda mümin için bir araya getirilmiştir\" ifadesi kullanılmıştır.\n\nBu ifadenin devamında bu durumun sebebi olarak ne gösterilmiştir?", "options": ["Namazın en uzun ibadet olması", "Namazın yalnızca insana farz olması", "Namazın Arş'a denk gelmesi", "Namazın beş vakit olması", "Namazın cemaatle kılınması"], "answer": "C", "sinav": 2}, {"no": "44", "body": "Kitapta namazda kalp ile şekil arasındaki ilişki \"okçu\" benzetmesiyle anlatılmıştır.\n\nBu benzetmeye göre okun hedefe ulaşmasını belirleyen üç unsur aşağıdakilerden hangisidir?", "options": ["Rüzgâr, mesafe ve hedef", "Okçunun niyeti, duası ve cesareti", "Bileğin gücü, yayın kalitesi ve okun sertliği", "Okun uzunluğu, ağırlığı ve şekli", "Hedefin büyüklüğü, uzaklığı ve yüksekliği"], "answer": "C", "sinav": 2}, {"no": "45", "body": "Kitapta Hz. Ömer'in namazda ordu ve cizye hesabı yapması hakkında bilgi verilmiştir.\n\nBu durumun kitaptaki açıklaması aşağıdakilerden hangisidir?", "options": ["Fecr-i sâdık ile başlar ve güneşin doğmasıyla sona erer", "Fecr-i kâzib ile başlar ve güneşin tam doğuşuna kadar sürer", "Gece yarısından sonra başlar ve fecr-i sâdık ile sona erer", "İmsak vaktiyle başlar ve güneş doğduktan sonra da devam eder", "Fecr-i sâdık ile başlar ve öğle vaktine kadar devam eder"], "answer": "B", "sinav": 2}, {"no": "46", "body": "Kitapta namazın kabulü konusunda cennete girme açısından üç grup namaz ehli sıralanmıştır.\n\nAşağıdakilerden hangisi kitapta \"en üstün grup\" olarak belirtilmiştir?", "options": ["Namazda zahirin ötesine geçerek hep Allah'ı düşünenler", "Namazda zahiri düşünmekten Allah'ı düşünmeyi ihmal edenler", "Günahların temizlenmesini bekleyen mücâhede ehli", "Namazı adet üzere kılanlar", "Namazı cemaatle kılanlar"], "answer": "A", "sinav": 2}, {"no": "47", "body": "Kitapta namaz kılmayan kişinin dini durumu hakkında açıklama yapılmıştır.\n\nBuna göre aşağıdakilerden hangisi doğrudur?", "options": ["Namaz kılmayan kişi dinden çıkar", "Namaz kılmayan kişi münafık sayılır", "Namaz kılmayan kişi kâfir olur", "Namaz kılmayan kişinin tüm ibadetleri geçersizdir", "Namaz kılmayan günahkârdır ama İslam dairesi içindedir"], "answer": "E", "sinav": 2}, {"no": "48", "body": "Kitapta namazda Kur'ân'ın Türkçe tercümesinin okunmasının hükmü aşağıdakilerden hangisidir?", "options": ["Caizdir, anlamını bilmek önemlidir", "Mekruhtur ama namaz geçerlidir", "Yalnızca nafile namazlarda caizdir", "Caiz değildir; kıraat Arapça olmalıdır", "İmamın tercihine bağlıdır"], "answer": "D", "sinav": 2}, {"no": "49", "body": "Kitapta Kur'an'a bakarak namaz kılmanın hükmü konusunda mezhep farklılıkları aktarılmıştır.\n\nEbû Hanîfe ve Ebû Yûsuf-Muhammed'in görüşleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Her ikisi de caiz görmüştür", "Ebû Hanîfe: mekruh / Ebû Yûsuf-Muhammed: bozulur", "Ebû Hanîfe: namaz bozulur / Ebû Yûsuf-Muhammed: mekruh ama geçerli", "Her ikisi de bozulur demiştir", "Her ikisi de mekruh demiştir"], "answer": "C", "sinav": 2}, {"no": "50", "body": "Kitapta namazda dua ve sûreleri okurken sesin durumu hakkında şu bilgi verilmiştir:\n\n\"Dil ve dudak kıpırdatmadan sadece zihinden geçirmek...\"\n\nBu cümlenin devamı aşağıdakilerden hangisidir?", "options": ["...yeterlidir, namaz geçerli olur", "...mekruhtur ama namaz bozulmaz", "...yalnızca nafile namazlarda caizdir", "...geçerli değildir, kıraat rüknü yerine getirilmiş sayılmaz", "...imamın arkasında caizdir"], "answer": "D", "sinav": 2}, {"no": "51", "body": "\"Yeryüzü bana mescid ve temiz kılındı. Ümmetimden namaz vaktine kavuşan herkes bulunduğu mekânda namazını kılıversin.\"\n\nBu hadis aşağıdakilerden hangisini göstermektedir?", "options": ["Yalnızca camide namaz kılınabileceğini", "Cemaatle namazın zorunlu olmadığını", "Abdestsiz namaz kılınabileceğini", "Namaz vaktinin önemsiz olduğunu", "Namazın her yerde kılınabileceğini"], "answer": "E", "sinav": 2}, {"no": "52", "body": "Kitapta Hanefî mezhebine göre kadınların namazda ayaklarının durumu hakkında bilgi verilmiştir.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Vitir namazı — Sünnet-i müekkede; bayram namazı — Farz-ı kifâye", "Vitir namazı — Vâcip; bayram namazı — Vâcip (li-aynihî sınıfında)", "Vitir namazı — Farz-ı aynî; bayram namazı — Sünnet-i gayr-i müekkede", "Vitir namazı — Nafile; bayram namazı — Farz-ı aynî sınıfındadır", "Vitir namazı — Müstehap; bayram namazı — Vâcip li-gayrihî"], "answer": "D", "sinav": 2}, {"no": "53", "body": "Cenaze namazında Sübhâneke duasına eklenen ilave ifade aşağıdakilerden hangisidir?", "options": ["Ve celle senâük", "Velâ ilâhe gayruke", "Tebârekesmüke", "Ve bihamdike", "Teâlâ ceddüke"], "answer": "A", "sinav": 2}, {"no": "54", "body": "Kitapta intihar eden kişinin cenaze namazının kılınıp kılınmayacağı konusunda verilen bilgi aşağıdakilerden hangisidir?", "options": ["Allâhü Ekber: 4 — Eşhedü enlâ: 2 — Eşhedü Muhammeden: 2 — Hayye: 2+2", "Allâhü Ekber: 2 — Eşhedü enlâ: 4 — Eşhedü Muhammeden: 2 — Hayye: 2+2", "Allâhü Ekber: 4 — Eşhedü enlâ: 2 — Eşhedü Muhammeden: 4 — Hayye: 2+2", "Allâhü Ekber: 2 — Eşhedü enlâ: 2 — Eşhedü Muhammeden: 2 — Hayye: 4+4", "Allâhü Ekber: 4 — Eşhedü enlâ: 4 — Eşhedü Muhammeden: 2 — Hayye: 1+1"], "answer": "B", "sinav": 2}, {"no": "55", "body": "Kitapta vakitlerin oluşmadığı kutup bölgelerinde yaşayan Müslümanların namaz vakitlerini nasıl belirleyecekleri açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["En yakın bölgenin namaz vakitleri esas alınır", "Günde tek vakit namaz kılınır", "Namaz yükümlülüğü düşer", "Güneşin konumuna göre serbestçe kılarlar", "İmamın belirlediği vakitlerde kılarlar"], "answer": "A", "sinav": 2}, {"no": "56", "body": "Kitapta namazın psikolojisi bölümünde namazın üstünlük ve aşağılık duygularını dengelediği belirtilmiştir.\n\nBu dengenin sonucunda kazanılan özellik aşağıdakilerden hangisidir?", "options": ["Güç", "Cesaret", "Liderlik", "Mütevazılık", "Sabır"], "answer": "D", "sinav": 2}, {"no": "57", "body": "Kitapta namazın duygusal yönünde bulunan korku duygusunun niteliği açıklanmıştır.\n\nBu korku aşağıdakilerden hangisidir?", "options": ["Dil ve dudak kıpırdatmadan zihinden geçirmek yeterli kabul edilir", "En az üç kişinin duyabileceği sesle okuması şart koşulmuştur", "Kişinin kendi duyabileceği fısıltı hâlinde okuması gerekir", "Sesli okuması şarttır; sessiz okunan namaz geçersiz sayılır", "İmama uyan kişi hiçbir şekilde okumaz, imam herkes adına okur"], "answer": "B", "sinav": 2}, {"no": "58", "body": "Kitapta namazda en çok tekrar edilen sözün \"Allâhu Ekber\" olduğu ve iki rekâtlık bir namazda 11 kez söylendiği belirtilmiştir.\n\nBu tekrarın asıl amacı aşağıdakilerden hangisidir?", "options": ["14 secde âyeti vardır; okunduğunda veya dinlendiğinde secde yapılır", "7 secde âyeti vardır; her biri Kur'ân'ın farklı sûrelerinde bulunur", "21 secde âyeti vardır; bu sayı mezheplere göre farklılık göstermez", "10 secde âyeti vardır; yalnızca Hanefî mezhebine göre secde yapılır", "30 secde âyeti vardır; her cüzde en az bir secde âyeti bulunur"], "answer": "A", "sinav": 2}, {"no": "59", "body": "Kitapta \"Beni nasıl namaz kılarken gördüyseniz öyle kılın\" hadisi hangi konuyu vurgulamak için aktarılmıştır?", "options": ["Namazda bilerek yapılan hatayı telafi etmek için yapılan secdedir", "Unutma veya yanılmayla rükün gecikmesi ya da vâcip terkinde yapılır", "Namazın sonunda her durumda yapılması gereken zorunlu bir secdedir", "Yalnızca farz namazlarda yapılır, nafile namazlarda gerekmez", "Bilinçli olarak fazladan rükün eklenmesi durumunda yapılır"], "answer": "D", "sinav": 2}, {"no": "60", "body": "Kitapta cemaatle kılınan namazın tek başına kılınan namazdan kaç kat daha faziletli olduğu belirtilmiştir?", "options": ["5 kat", "10 kat", "25 kat", "27 kat", "70 kat"], "answer": "D", "sinav": 2}, {"no": "1", "body": "Kitapta Tolstoy'un hayat arayışı anlatılırken, onun gözünü açmasına vesile olan iki olaydan bahsedilmiştir. Birincisi Paris'te bir mahkûmun giyotinle idam edilmesini görmesi, ikincisi ise genç yaştaki kardeşinin acı çekerek ölmesidir. Tolstoy bu olayların ardından \"Ölüm diye bir şey var. Fakat niçin var?\" sorusunu sormuş, felsefe ve bilime başvurmuş ancak cevap bulamamıştır.\n\nTolstoy'un bu sorulara cevap bulamadığı dönemde yaşadığı psikolojik durum ve bu durumun süresi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Depresyon — 3 yıl", "Yalnızlık — 1 yıl", "Öfke — 5 yıl", "Korku — 2 yıl", "İnkâr — 4 yıl"], "answer": "A", "sinav": 3}, {"no": "2", "body": "Kitapta Kur'ân-ı Kerîm'in verdiği cevaplar dört temel hakikat üzerinden açıklanmıştır. Bu hakikatlerden biri olan \"haşir hakikati\" şöyle tanımlanmıştır: Ölüm, insanın tamamen yok olması değildir. Ruh, \"berzah\" denilen başka bir âleme geçer. Kabir âleminde kalan insan, kıyametin kopmasıyla diriltilecek ve hesaba çekilecektir.\n\nBu tanıma göre haşir hakikatinin kapsamına aşağıdakilerden hangisi girmez?", "options": ["Ölümün bir geçiş olması", "Berzah âlemi", "Mahşerde hesaba çekilme", "Ebedî âkıbetin tayin edilmesi", "İnsanın yaratılış gayesini öğrenmesi"], "answer": "E", "sinav": 3}, {"no": "3", "body": "Kitapta şükrün en kapsamlı tanımı olarak şu ifade verilmiştir: \"Allah'ın insana maddî veya manevî anlamda lütfettiği her nimeti, yine O'nun rızasına uygun biçimde kullanmak.\" Bu yaklaşıma göre göz nimetinin şükrü, gözü Allah'ın bakılmasını emrettiği şeylere yöneltmek; dil nimetinin şükrü ise hakikati söylemek ve gıybetten arınmaktır.\n\nBu tanımdan yola çıkarak aşağıdaki çıkarımlardan hangisi yapılabilir?", "options": ["Namazın dindeki yeri, suyun hayattaki yeri gibidir — susuz yaşanmaz", "Namazın dindeki yeri, ağacın kökleri gibidir — köksüz ağaç durmaz", "Namazın dindeki yeri, cesette başın yeri gibidir — başsız ceset olmaz", "Namazın dindeki yeri, kalbin bedendeki yeri gibidir — kalpsiz yaşanmaz", "Namazın dindeki yeri, temelin binadaki yeri gibidir — temelsiz bina çöker"], "answer": "A", "sinav": 3}, {"no": "4", "body": "Kitapta otomobil fabrikası temsili ile şükrün önemi anlatılmıştır. Fabrikadaki bütün birimler ürün çıkması için çalışır; hammadde gelir, işlenir, son birime ulaşır. Son birimdeki adam eline balyozu alıp otomobilleri paramparça etse herkesin emeği boşa gider. Aynı şekilde ekmeğin önümüze gelmesi için güneşten fırıncıya kadar herkes çalışmıştır.\n\nBu temsilde \"son birimdeki adam\" neyi simgelemektedir?", "options": ["Tesbih, hamd ve tekbir — namaz bu üç kavramın özünü barındırır", "Kıyam, rükû ve secde — bunlar namazın yalnızca fiziksel rükünleridir", "İman, amel ve ihsan — bunlar dinin üç temel boyutunu ifade eder", "Sabır, şükür ve zikir — bunlar kalbin üç temel hâlini ifade eder", "Korku, ümit ve sevgi — bunlar kulluğun duygusal boyutlarıdır"], "answer": "A", "sinav": 3}, {"no": "5", "body": "Kitapta padişah-hediye benzetmesi yapılmıştır: \"Bir padişah sana kıymetli bir hediye gönderse ve bu hediyeyi sana getiren fakir adama fazlasıyla ilgi gösterip, asıl hediyenin sahibini tamamen unutmak ne kadar büyük bir gaflettir.\"\n\nBu benzetme ile anlatılmak istenen temel mesaj aşağıdakilerden hangisidir?", "options": ["Sübhânallah 33 + Elhamdülillâh 33 + Allâh-u ekber 33 ve Lâ ilâhe illallah ile tamamlanır", "Sübhânallah 10 + Elhamdülillâh 10 + Allâh-u ekber 10 ve salavat ile tamamlanır", "Sübhânallah 33 + Elhamdülillâh 33 + Allâh-u ekber 34 ve Âyetü'l-kürsî ile tamamlanır", "Sübhânallah 11 + Elhamdülillâh 11 + Allâh-u ekber 11 ve istiğfar ile tamamlanır", "Sübhânallah 99 + Elhamdülillâh 99 + Allâh-u ekber 99 ve dua ile tamamlanır"], "answer": "E", "sinav": 3}, {"no": "6", "body": "Kitapta Hz. Dâvûd (as) ile Allah arasında geçen diyalog aktarılmıştır. Allah \"Ey Dâvûd! Benim sana olan nimetlerime şükret!\" buyurmuş, Hz. Dâvûd ise \"Ya Rab! Verdiğin nimetler şükür ister. Fakat şükür de bir nimettir. Ona da şükretmek gerekir. Dolayısıyla ben sana nasıl şükredeceğimi bilemiyorum\" demiştir.\n\nAllah'ın Hz. Dâvûd'a verdiği cevap ile Hz. Musa'ya verdiği benzer cevabın ortak anlamı aşağıdakilerden hangisidir?", "options": ["Şükür nimetlere karşılık dil ile yapılır; ibadet ise bedenle yapılan kulluktur", "Şükür yalnızca kalben hissedilir; namazın şükürle doğrudan ilgisi yoktur", "Namazın üç çekirdeği olan tesbih, şükür ve tekbir kıyam-rükû-secdede mevcuttur", "Şükür yalnızca maddi nimetler içindir; manevi nimetler için ayrı ibadet gerekir", "Namaz yalnızca korkudan kaynaklanan bir ibadet olup şükürle bağlantısı yoktur"], "answer": "E", "sinav": 3}, {"no": "7", "body": "Kitapta 500 yıl ibadet eden kulun kıssasında, bir denizin ortasındaki adada tatlı su ve nar ağacıyla yaşayan bir adam anlatılmıştır. Bu adam kıyamette \"Beni amelimle cennete koy\" demiş, Allah meleklere \"Kuluma olan nimetlerimi onun ameliyle karşılaştırınız\" diye emretmiştir. Melekler yalnızca göz nimetinin adamın 500 yıllık ibadetini kuşattığını görmüşlerdir.\n\nBu kıssanın kitaptaki bağlamda verdiği ana ders aşağıdakilerden hangisidir?", "options": ["Cansız varlıklar→hayat→bitkiler→hayvanlar/insanlar→rızık→şükür sırasıyla dizilir", "Şükür→rızık→hayvanlar/insanlar→bitkiler→cansız varlıklar→hayat sırasıyla dizilir", "Bitkiler→cansız varlıklar→hayat→hayvanlar→rızık→şükür sırasıyla dizilir", "Hayvanlar→bitkiler→cansız varlıklar→hayat→şükür→rızık sırasıyla dizilir", "Rızık→hayat→cansız varlıklar→bitkiler→şükür→hayvanlar sırasıyla dizilir"], "answer": "A", "sinav": 3}, {"no": "8", "body": "Kitapta şükür ve nankörlük bağlamında modern çağın paradoksu şöyle anlatılmıştır: \"Dünya tarihinde Allah'ın en çok nimet verdiği zaman bu zamandır. Hiçbir padişahın elektriği, telefonu, televizyonu yoktu. Ama bu zaman en az şükredilen ve en çok günah işlenen zamandır. Üstelik insanlar hayatlarından memnun da değildir.\"\n\nKitaba göre insanların bolluk içinde darlık çekmesinin temel sebebi aşağıdakilerden hangisidir?", "options": ["Zikir — Şükür — Fikir: Bu üçü Allah'ın kullarından beklediği karşılıktır", "Sabır — Şükür — Namaz: Bu üçü kulluğun temel direkleri olarak belirtilir", "Namaz — Oruç — Zekât: Bu üçü İslam'ın ibadet ayakları olarak verilir", "İlim — İman — İbadet: Bu üçü mümin olmanın şartları olarak sıralanır", "Hamd — Tesbih — İstiğfar: Bu üçü her namazda tekrarlanan zikirlerdir"], "answer": "E", "sinav": 3}, {"no": "9", "body": "Kitapta \"Rabbiniz Teâla şöyle buyurdu: 'Eğer kullarım bana hakkıyla itaat etseydiler, ben yağmuru geceleyin yağdırıp, gündüz de güneşi çıkarırdım. Onlara gök gürültüsünün sesini duyurmazdım.'\" hadisi aktarılmıştır.\n\nBu hadis kitapta hangi ana fikri desteklemek için kullanılmıştır?", "options": ["İtaat ve şükrün nimetleri artırıp hayatı kolaylaştıracağı", "Gök gürültüsünün zararlı olduğu", "Yağmurun yağma zamanının önemsiz olduğu", "Gecenin gündüzden üstün olduğu", "Doğa olaylarının tesadüfi olduğu"], "answer": "A", "sinav": 3}, {"no": "10", "body": "Kitapta Peygamberimiz \"Sizden aşağıda olanlara bakın; yukarıda olanlara bakmayın. Bu, Allah'ın size verdiği nimetleri küçümsememeniz bakımından daha uygun olur\" buyurmuştur.\n\nBu hadis hangi kavramla doğrudan ilişkilendirilmiştir?", "options": ["31 defa tekrarlanmıştır", "21 defa tekrarlanmıştır", "41 defa tekrarlanmıştır", "17 defa tekrarlanmıştır", "55 defa tekrarlanmıştır"], "answer": "B", "sinav": 3}, {"no": "11", "body": "Kitapta gece ve gündüzün çift yönlü nimet olduğu anlatılmış ve şu ayet aktarılmıştır: \"Allah üzerinize geceyi kıyamete kadar sürekli kılsaydı, Allah'tan başka hangi ilah size bir aydınlık getirir?\" (el-Kasas, 28/71-73)\n\nBu ayetle birlikte kitapta aşağıdaki karşıtlıklardan hangisi de çift yönlü nimet olarak sunulmuştur?\n\nI. Yağmurun yağması ve durması\nII. Acıkmak ve doymak\nIII. Sıhhat ve hastalıktaki ağrı\nIV. Zenginlik ve fakirlik", "options": ["Yalnız I ve II", "Yalnız I, II ve III", "Yalnız II ve III", "I, II, III ve IV", "Yalnız I"], "answer": "B", "sinav": 3}, {"no": "12", "body": "Kitapta hastalık anında hissedilen ağrının bile ayrı bir nimet olduğu anlatılmıştır. Çünkü ağrı, vücuttaki arızayı haber veren bir uyarı mekanizmasıdır. Bu görüşü desteklemek için kanser hastalığı örnek verilmiştir.\n\nKanserin bu bağlamda örnek gösterilme sebebi aşağıdakilerden hangisidir?", "options": ["Başta Bismillah demek + sonda Elhamdülillâh demek — nimetin bedeli budur", "Yemeği paylaşmak + israf etmemek — cömertlik nimetin bedelidir", "Yemekten önce el yıkamak + şükretmek — temizlik bedel sayılır", "Misafire ikram etmek + karşılık beklememek — bedel cömertliktir", "Yemeği oturarak yemek + sağ elle yemek — sünnet olan adap budur"], "answer": "D", "sinav": 3}, {"no": "13", "body": "Kitapta namaz \"İslâm'ın beş şartının ve bütün ibadetlerin en mühimi\" olarak tanımlanmıştır. Namaz Kur'ân'da doksandan fazla âyette zikredilir ve önceki ümmetlerde de vardı.\n\nNamezin farz kılınma zamanı ve yeri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İyilik yapan zâta övgüde bulunmak şeklinde tanımlanmıştır", "İnsanın şükürden âciz olduğunu bilmesi şeklinde tanımlanmıştır", "Allah'ın emrettiklerini yapıp yasaklarından kaçınmak olarak tanımlanır", "Yalnızca dil ile hamd etmek ve tesbih çekmek olarak tanımlanır", "Nimetleri başkalarıyla paylaşarak toplumsal fayda sağlamak tanımıdır"], "answer": "B", "sinav": 3}, {"no": "14", "body": "Kitapta şükrün beş farklı tanımı yapılmıştır. Bunlardan biri \"Nimetin karşılığında dil, el veya kalple yapılan karşılık\" şeklindedir.\n\nAşağıdakilerden hangisi kitapta verilen şükür tanımlarından biri değildir?", "options": ["İyilik yapan zâta övgüde bulunmak — âlimlerin yaygın tanımıdır", "Allah'a isyanı terk etmek — bazı âlimlerin şükür tanımıdır", "Nimeti Allah'ın rızasına uygun kullanmak — her uzvun şükrüdür", "İnsanın şükürden âciz olduğunu bilmesi — hakiki şükür budur", "Nimeti başkalarıyla paylaşıp topluma fayda sağlamak — sosyal şükürdür"], "answer": "E", "sinav": 3}, {"no": "15", "body": "Kitapta mutasavvıfların insanı \"kâinatın küçültülmüş şekli\" (misal-i musaggarı) olarak kabul ettiği belirtilmiştir. Bu görüşe göre insandaki kemikler cansız varlıkları, hücreler bitkileri, nefsanî arzular hayvanları, güzel hasletler melekleri temsil eder.\n\nBu modelde gurur ve kibir gibi hasletler neyi temsil etmektedir?", "options": ["Melekleri", "Hayvanları", "Cansız varlıkları", "Şeytanı", "Bitkileri"], "answer": "D", "sinav": 3}, {"no": "16", "body": "Kitapta namazın insanı kötülüklerden alıkoyması ile namazın özünü ihmal edenlerin durumu arasındaki çelişki iki ayetle ortaya konmuştur: \"Namaz hayâsızlıktan ve kötülükten alıkoyar\" (Ankebût, 29/45) ve \"Yazıklar olsun o namaz kılanlara!\" (Mâûn, 107/4).\n\nBu iki ayet birlikte değerlendirildiğinde kitabın ulaştığı sonuç aşağıdakilerden hangisidir?", "options": ["Hz. Dâvûd: \"Şükür de nimettir\" paradoksu → Allah: \"İşte şimdi şükrettin\"", "Hz. Musa: \"En küçük nimeti bile ödeyemem\" → Allah: \"İşte şimdi şükrettin\"", "Hz. İbrahim: \"Kalbim mutmain olsun\" → Allah: \"İşte şimdi şükrettin\"", "Hz. Nuh: \"Gemide sana şükredeceğim\" → Allah: \"İşte şimdi şükrettin\"", "Hz. Süleyman: \"Bu Rabbimin fazlıdır\" → Allah: \"İşte şimdi şükrettin\""], "answer": "D", "sinav": 3}, {"no": "17", "body": "Kitapta \"kalbim temiz\" söylemi analiz edilirken şu temsil yapılmıştır: \"Birisine kalbinin temizliğine itimat ederek 24 milyar borç verseniz, bu adam 1 milyarını bile ödemese kalbinin temiz olduğuna inanır mıyız?\"\n\nBu temsilde 24 milyar ve 1 milyar neyi simgelemektedir?", "options": ["24 milyar = insanın ömrü / 1 milyar = namaz vakitleri", "24 milyar = günlük 24 saatlik sermaye / 1 milyar = ibadete ayrılması gereken yaklaşık 1 saat", "24 milyar = Allah'ın nimetleri / 1 milyar = şükür borcu", "24 milyar = dünya serveti / 1 milyar = zekât miktarı", "24 milyar = ömür boyu kazanç / 1 milyar = sadaka miktarı"], "answer": "B", "sinav": 3}, {"no": "18", "body": "Kitapta Kur'ân'dan hiçbir şey ezberleyemeyen bir adam Peygamberimize gelmiş ve namazda okuyabileceği bir alternatif istemiştir. Peygamberimiz ona bir ifade öğretmiştir.\n\nBu ifade aşağıdakilerden hangisidir?", "options": ["Hz. Dâvûd'un \"Şükür de nimettir\" paradoksu ve Hz. Musa'nın acziyeti anlatılır", "Yalnızca İmam Şâfiî'nin er-Risâle'deki şükür tanımı verilmiştir", "Yalnızca Hz. İbrahim'in şükrü ve meleklere ikramı anlatılmıştır", "Yalnızca Peygamberimizin gece namazı kılma sebebi verilmiştir", "Yalnızca 500 yıl ibadet eden kulun kıssası ele alınmıştır"], "answer": "E", "sinav": 3}, {"no": "19", "body": "Kitapta Dr. Laurence Brown'ın İslam'a geliş hikâyesi anlatılmıştır. Brown, kızının ölümcül hastalığı karşısında ateist olmasına rağmen dua etmiş ve Allah'a bir söz vermiştir: \"Çocuğumun hayatını kurtarırsa ve bana en çok razı olduğu dinin yolunu gösterirse o yoldan gideceğim.\" Kızı mucizevi şekilde iyileşmiş, Brown önce Yahudiliği, sonra Hıristiyanlığın tüm mezheplerini araştırmıştır.\n\nBrown'ın tüm sorularına cevap bulduğu ve gönlünün huzur bulduğu din aşağıdakilerden hangisidir?", "options": ["Katolik Hıristiyanlık", "İslam", "Yahudilik", "Ortodoks Hıristiyanlık", "Protestanlık"], "answer": "B", "sinav": 3}, {"no": "20", "body": "Kitapta \"Zamana Hükmeden Namaz\" bölümünde insanın zamanla ilişkisi ele alınmıştır. İnsanın ebedi olmak isteği öylesine galebe çalmıştır ki, Allah'ın emri ihlal edilmiş ve insan cennetten dünyaya indirilmiştir. \"Size yeryüzünde bir zamana kadar yerleşme ve yararlanma vardır.\" (A'râf, 7/24)\n\nKitaba göre \"ilk günah\" neyin eseridir?", "options": ["Fizyolojik fonksiyonlar ve nimete şükür bağlamında ele alınmıştır", "Yalnızca bir kimyasal süreç olarak bilimsel açıdan verilmiştir", "Sosyolojik bir olgu olarak toplumsal hayat bağlamında değerlendirilir", "Yalnızca fiziksel egzersiz olarak beden sağlığı açısından ele alınır", "Tarihî bir keşif olarak İslam medeniyeti bağlamında sunulmuştur"], "answer": "D", "sinav": 3}, {"no": "21", "body": "Kitapta \"Rabbin nezdinde bir gün, sizin saydığınız bin yıl gibidir\" (Hac, 22/47) ayeti ve \"Geçirdiğimiz dünya ömrü bir göz açıp kapaması mesabesindedir\" ayetleri aktarılmıştır.\n\nBu ayetlerle birlikte kitapta zamanın hangi özelliği vurgulanmıştır?", "options": ["Zamanın izafi (göreceli) olduğu, mutlak olmadığı", "Zamanın mutlak ve değişmez olduğu", "Zamanın yalnızca insanlar için geçerli olduğu", "Zamanın yalnızca dünyada var olduğu", "Zamanın durdurulamayacağı"], "answer": "A", "sinav": 3}, {"no": "22", "body": "Kitapta Ahmet Haşim'in sözü aktarılmıştır: \"Müslüman gününün başlangıcını şafağın parıltıları ve nihayetini akşamın ziyaları tayin etmelidir.\" Bu sözle birlikte \"namazın uzaydaki kara delikler gibi zamanın akışını yavaşlattığı\" ifade edilmiştir.\n\nBu ifadelerden çıkarılabilecek sonuç aşağıdakilerden hangisidir?", "options": ["Göz nimeti bile 500 yıllık ibadeti kuşatır — Allah azı çok sayar", "500 sene ibadet eden kul doğrudan cennetle mükâfatlandırılır", "Kulun ameliyle cennete girmesi ve nimetlerin hakkını ödemesi", "Allah kullarından asla hesap sormaz ve hepsini kayıtsız affeder", "500 sene ibadet bu ibadetle tüm nimetlerin bedelini ödemiştir"], "answer": "C", "sinav": 3}, {"no": "23", "body": "Kitapta namazın \"ikame\" edilmesi kavramı açıklanmıştır. Buna göre ikame edilen namaz üç unsuru kapsamaktadır.\n\nAşağıdakilerden hangisi bu üç unsurdan biri değildir?", "options": ["Huşu ile ifa edilmesi", "Dosdoğru kılınması", "Yalnızca cemaatle kılınması", "Titizlikle devam edilmesi (muhafaza)", "Hepsi bu unsurdandır"], "answer": "C", "sinav": 3}, {"no": "24", "body": "Kitapta kıyam, rükû ve secdenin derin anlamları açıklanmıştır: \"Kıyam kararlılığın izharıdır. Rükû aczin itirafı, haddin bilinişi ve kulluğun fark edilişidir. Secde ise tam bir teslimiyet ve boyun eğiştir.\"\n\nPeygamberimiz \"En faziletli namaz hangisidir?\" sorusuna verdiği cevap aşağıdakilerden hangisidir?", "options": ["Kıyamı uzun olan namaz", "Secdesi uzun olan namaz", "Cemaatle kılınan namaz", "Gece kılınan namaz", "İlk vaktinde kılınan namaz"], "answer": "A", "sinav": 3}, {"no": "25", "body": "Kitapta namazı zayi eden nesil hakkında şu ayet aktarılmıştır: \"Onlardan sonra, namazı zayi eden, şehvet ve dünyevi tutkularının peşine düşen bir nesil geldi. Onlar bu tutumlarından ötürü büyük bir azaba çarptırılacaklardır.\" (Meryem, 19/59)\n\nBu ayetle ilgili kitapta yapılan önemli tespit aşağıdakilerden hangisidir?", "options": ["Namaz kılmayan kâfir olur", "Namazı zayi eden nesil helak olmuştur", "Namazı zayi edenler cehennemliktir", "Bu ayet yalnızca önceki ümmetler içindir", "Kur'ân namazın terkinden değil zayi edilmesinden bahsetmektedir"], "answer": "E", "sinav": 3}, {"no": "26", "body": "Kitapta Asr sûresi bağlamında insanın hüsrandan kurtuluş yolu anlatılmıştır: \"Geçen her an kaybedilen zamanla hüsranda olan insanoğlu, ömrünün nihayetine doğru hızla akıp giden zamanı sadece iman, sâlih amel, hakkı ve sabrı tavsiye ile tersine çevirebilir.\"\n\nBu ifadeye göre hüsrandan kurtuluşun dört şartı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İman — Namaz — Oruç — Hac", "İman — İlim — Amel — İhlas", "İman — Şükür — Tevekkül — Dua", "İman — Salih amel — Hakkı tavsiye — Sabrı tavsiye", "İman — Cihat — Zekât — Sadaka"], "answer": "D", "sinav": 3}, {"no": "27", "body": "Kitapta ezanın ortaya çıkış sürecinde Hz. Peygamber sahâbe ile istişare etmiştir. Çan, boru, ateş yakma ve bayrak dikme gibi teklifler reddedilmiştir. Hz. Ömer, sokaklarda bir kişinin seslenme yöntemini önermiş ve Hz. Bilal bir süre \"es-salâh es-salâh\" diye seslenerek dolaşmıştır.\n\nBu yöntemin de yeterli görülmemesinin ardından çözüm nasıl bulunmuştur?", "options": ["Hz. Peygamber'e vahiy inmiştir", "Hz. Ebu Bekir bir yöntem geliştirmiştir", "Abdullah b. Zeyd rüyasında yeşil elbiseli birinden ezanı öğrenmiştir", "Hz. Ali ezan metnini yazmıştır", "Cebrâil (as) doğrudan Bilal'e öğretmiştir"], "answer": "C", "sinav": 3}, {"no": "28", "body": "Kitapta Abdullah b. Zeyd'in rüyasını Peygamberimize arz etmesinin ardından Hz. Ömer'in de aynı rüyayı gördüğü aktarılmıştır. Peygamberimiz \"Bu hak bir rüyadır\" buyurmuş ve ezanı Bilal'e okutmuştur.\n\nPeygamberimizin ezanı Bilal'e okutma sebebi ile Abdullah b. Zeyd'in tarihte anıldığı unvan aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sebep: Bilal daha cesur / Unvan: Sahibü'd-da've", "Sebep: Bilal rüyayı daha önce görmüş / Unvan: Müezzinü'l-evvel", "Sebep: Bilal daha yaşlı / Unvan: Emîrü'l-ezan", "Sebep: Bilal'in sesi daha gür ve güzel / Unvan: Sâhibü'l-ezân", "Sebep: Bilal Mescid'e daha yakın / Unvan: Hâfızü'l-ezan"], "answer": "D", "sinav": 3}, {"no": "29", "body": "Kitapta Hz. Peygamber'in hicret sürecinde Kubâ'ya varışı ve Medine'ye geçişi anlatılmıştır. Kubâ'da İslam'ın ilk mescidi inşa edilmiş, ardından Medine'ye geldiğinde daha devesinden inmeden mescid yeri tespit edilmiştir.\n\nMescid-i Nebevi'nin inşasının tamamlanma süresi ve Suffe'nin işlevi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sizden aşağıda olanlara bakın, yukarıda olanlara bakmayın", "Zenginlik mal çokluğunda değil, gönül zenginliğindedir", "Kanaatkâr olan kimse insanların en zenginlerinden olur", "Dünya malı gelir geçer, kalıcı olan ancak salih amellerdir", "Malı çok olan değil, malından razı olan gerçek zengindir"], "answer": "B", "sinav": 3}, {"no": "30", "body": "Kitapta namazdaki el bağlamanın anlamı şöyle açıklanmıştır: \"El bağlamak Allah'a teslimiyetin, emir ve yasaklarına itaatin ifadesidir. Elimizden ve bütün ellerden işleyen fail-i hakikiyi tanımanın şuuruyla bağlarız ellerimizi.\"\n\nAynı bölümde Kur'ân-ı Kerîm'de namaz için sürekli kullanılan fiilin \"kılmak\" değil başka bir fiil olduğu vurgulanmıştır. Bu fiil aşağıdakilerden hangisidir?", "options": ["Eda etmek", "İfa etmek", "Tamamlamak", "Yerine getirmek", "İkame etmek"], "answer": "E", "sinav": 3}, {"no": "31", "body": "Kitapta \"Hayye ale'l-Felah\" bölümünde İblisin isyanı derinlemesine analiz edilmiştir. İblis \"Ben ateştenim, o topraktan; ateş topraktan üstündür\" diyerek secde emrine karşı çıkmıştır. Önünde tövbe imkânı olmasına rağmen, istiğfar yerine mühlet dilemiştir.\n\nKitaba göre İblisin tövbe etmesini engelleyen temel hastalık ve bu hastalığın insandaki en tehlikeli tezahürü aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Mü'minûn 23/115: Sizi boşuna yarattığımızı mı sandınız?", "Bakara 2/156: Biz Allah'a aidiz ve O'na döneceğiz", "Zâriyât 51/56: İnsanları ancak ibadet etsinler diye yarattım", "Mülk 67/2: Hanginizin daha güzel amel edeceğini denemek için", "Yâsîn 36/83: Her şeyin hükümranlığı elinde olan Allah münezzehtir"], "answer": "A", "sinav": 3}, {"no": "32", "body": "Kitapta namazdaki \"Allâh-u ekber\" ifadesinin tekrar sayısı verilmiştir. İki rekatlık bir namazda 11 defa, dört rekatlık bir namazda 22 defa söylenmektedir.\n\nKitaba göre her \"Allâh-u ekber\" ifadesinin anlamı ve işlevi aşağıdakile
