Kitaba göre bu savaşta vaktinde kılınamayan namaz aşağıdakilerden hangisidir?", "options": ["Sabah namazı", "Öğle namazı", "İkindi namazı", "Akşam namazı"], "answer": "C", "sinav": 1}, {"no": "98", "body": "Kitapta, namazı vaktinde kılamamanın hangi durumda günah olup hangisinde olmadığı açıkça belirtilmiştir.

Kitaba göre aşağıdakilerden hangisi doğrudur?", "options": ["Uyku ve unutma sebebiyle kazaya bırakmak günah değildir, ancak tembellik ve ihmal sebebiyle bırakmak büyük günahtır", "Her durumda namazı kazaya bırakmak günahtır", "Savaş dışında namazı kazaya bırakmak caiz değildir", "Namazı kazaya bırakmak hiçbir durumda günah değildir, çünkü kaza edilebilir"], "answer": "A", "sinav": 1}, {"no": "99", "body": "Kitapta, mazeret sebebiyle kılınamayan namazların kazası ile mazeretsiz kılınamayan namazların kazası arasında önemli bir fark bulunduğu belirtilmiştir.

Bu fark aşağıdakilerden hangisidir?", "options": ["Mazeret sebebiyle kalanlar kaza edilemez, mazeretsiz kalanlar edilebilir", "Mazeret sebebiyle kalanlarda tövbe gerekir, mazeretsiz kalanlarda gerekmez", "İkisi arasında hiçbir fark yoktur, her ikisinde de sadece kaza yeterlidir", "Mazeret sebebiyle kalanlar kaza edilince sorumluluk kalkar; mazeretsiz kalanlarda kaza yetmez, ayrıca tövbe de gerekir"], "answer": "D", "sinav": 1}, {"no": "100", "body": "Kitapta, Peygamberimizin vefatından hemen önce ısrarla ve tekrarla söylediği son vasiyeti aktarılmıştır.

Peygamberimizin bu son vasiyeti aşağıdakilerden hangisidir?", "options": ["Kur'ân'a sarılın, Kur'ân'a!", "Birbirinizi sevin, birbirinizi!", "Namaza devam edin! Namaza, namaza!", "Cemaati terk etmeyin, cemaati!"], "answer": "C", "sinav": 1}, {"no": "101", "body": "Kitapta, namazın şekil şartları ile manevi boyutu arasındaki ilişki bir benzetmeyle açıklanmıştır.

Kitaba göre namazın şekil şartları ve huşu arasındaki ilişki aşağıdakilerden hangisiyle ifade edilmiştir?", "options": ["Şekil şartları ağaç, huşu meyvedir", "Şekil şartları namazın cesedi, huşu ise ruhudur", "Şekil şartları temel, huşu çatıdır", "Şekil şartları kılıç, huşu kalkandır"], "answer": "B", "sinav": 1}, {"no": "102", "body": "Kitapta, namazdaki birinci secde ile ikinci secde arasında derin bir manevi fark olduğu anlatılmıştır. Her iki secde farklı bir şuurla yapılmaktadır.

Kitaba göre birinci ve ikinci secdenin manevi anlamları sırasıyla aşağıdakilerden hangisidir?", "options": ["Şükür ve istiğfar", "Hamd ve tesbih", "Fenâ (Hakk'ın varlığında yok olma) ve bekâ (mutlak varlığın Hakk'a ait olduğu idraki)", "Korku ve ümit"], "answer": "C", "sinav": 1}, {"no": "103", "body": "Kitapta tahiyyat duasının manevi anlamı açıklanırken, bu duanın namazın belirli bir hakikatle ilişkisini tescil ettiği belirtilmiştir. Buna göre tahiyyat, belirli bir olayda yaşanan selamlaşmanın namazda yeniden yaşanmasıdır.

Kitaba göre tahiyyat duası hangi olayı yeniden yaşatır?", "options": ["Hz. Peygamber'in hicret esnasındaki vedalaşmasını", "Mi'rac'ta Allah Teâlâ ile Hz. Peygamber'in selamlaşmasını", "Hz. İbrahim'in Kâbe'yi inşa ederken ettiği duayı", "Hz. Peygamber'in Medine'ye girişindeki karşılamayı"], "answer": "B", "sinav": 1}, {"no": "104", "body": "Kitapta, büyük şair İkbal'in secde hakkında söylediği çarpıcı bir söz aktarılmıştır.

İkbal'in secde hakkındaki sözü aşağıdakilerden hangisidir?", "options": ["Sana ağır gelen o bir secde var ya, binlerce secdeden kurtarır seni", "Secde, insanın Allah'a en yakın olduğu andır", "Secde eden kul, tahtında oturan sultandan üstündür", "Her secde, cennete atılan bir adımdır"], "answer": "A", "sinav": 1}, {"no": "105", "body": "Kitapta, Peygamberimizin namaz hakkında kullandığı ifade açıklanırken, bu ifadedeki ince bir dil ayrımına dikkat çekilmiştir. Buna göre Peygamberimiz 'namaz ile' değil, farklı bir ifade kullanmıştır ve bazı gafillerin bu ifadeyi yanlış yorumladığı belirtilmiştir.

Kitaba göre Peygamberimizin 'Kamet getir ya Bilal' sözündeki asıl mesaj aşağıdakilerden hangisidir?", "options": ["Bizi namazla meşgul et", "Bizi namazdan kurtar (yanlış yorum)", "Bizi namaz ile rahata erdir (huzur bulmak)", "Bizi namaza çabuk başlat"], "answer": "C", "sinav": 1}, {"no": "106", "body": "Kitapta, kadınların mescide gelmesi konusunda Peygamberimizin hem izin veren hem de tercih belirten bir ifadesi aktarılmıştır.

Kitaba göre Peygamberimizin bu konudaki tutumu aşağıdakilerden hangisidir?", "options": ["Kadınların mescide gelmesine engel olunmamasını, ancak evlerinin onlar için daha hayırlı olduğunu söylemiştir", "Kadınların mescide gelmesini tamamen yasaklamıştır", "Kadınların yalnızca Cuma namazına gelmesine izin vermiştir", "Kadınların sadece bayram namazlarına katılmasını uygun görmüştür"], "answer": "A", "sinav": 1}, {"no": "107", "body": "Kitapta, ergenlik (bülûğ) yaşları konusunda bir araştırma sonucuna atıfta bulunulmuştur.

Bu araştırmaya göre kızlarda ve erkeklerde bülûğa erme yaş aralıkları sırasıyla aşağıdakilerden hangisidir?", "options": ["Kızlarda 8-16, erkeklerde 10-18", "Kızlarda 11-16, erkeklerde 12-17", "Kızlarda 9-17, erkeklerde 10-18", "Kızlarda 10-18, erkeklerde 9-19"], "answer": "D", "sinav": 1}, {"no": "108", "body": "Kitapta üç özel mescidin diğer camilerden farklı olduğu ve bunların ziyaretinin teşvik edildiği belirtilmiştir.

Aşağıdakilerden hangisi kitapta belirtilen bu üç mescidden biri değildir?", "options": ["Mescid-i Haram", "Mescid-i Nebevî", "Mescid-i Aksa", "Mescid-i Kuba"], "answer": "D", "sinav": 1}, {"no": "109", "body": "Kitapta, namaz kılmayan kimselere karşı Peygamberimizin çok sert bir tepki gösterdiği bir hadis aktarılmıştır. Peygamberimiz, cemaate gelmeyenlerin evlerini yakmayı düşündüğünü ifade etmiştir.

Kitaba göre aşağıdakilerden hangisi bu hadis hakkında doğrudur?", "options": ["Peygamberimiz içinden böyle geçtiğini söylemiş ancak uygulamaya koymamıştır", "Peygamberimiz bu cezayı fiilen uygulamıştır", "Bu tehdit yalnızca münafıklara yönelikti", "Peygamberimiz bu sözü sadece kadınlara yönelik söylemiştir"], "answer": "A", "sinav": 1}, {"no": "110", "body": "Kitapta, Abdullah b. Mes'ûd'un cemaatle namaza devam hakkındaki şahitliği aktarılmıştır. Abdullah b. Mes'ûd, sahabe döneminde cemaatten geri kalanlar hakkında önemli bir gözlemde bulunmuştur.

Abdullah b. Mes'ûd'a göre sahabe döneminde cemaatten geri kalanlar aşağıdakilerden hangisidir?", "options": ["Hastalar ve yaşlılar", "Kadınlar ve çocuklar", "Münafık olduğu bilinen kimseler", "Savaşa gidenler"], "answer": "C", "sinav": 1}, {"no": "111", "body": "Kitapta insanın yaratılışı ve organları arasındaki ilişki bir metaforla anlatılmıştır. Buna göre Allah, insana yedi aza (organ) bahşetmiş ve bu azaların yönetimi için belirli bir organ görevlendirilmiştir. Bu yönetici organ, içinde çeşitli hazineler barındırmaktadır.

Kitaba göre yedi azayı yönetmekle görevlendirilen organ ve içindeki hazineler aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Akıl; ilim, hikmet, tefekkür, basiret", "Kalp; marifet, akıl, ilim, zihin, hafıza, anlayış, kavrayış ve en faydalı olanı seçme", "Ruh; iman, ihlas, takva, sabır", "Vicdan; doğruluk, adalet, merhamet, şefkat"], "answer": "B", "sinav": 1}, {"no": "112", "body": "Kitapta insanın yedi azası, belirli bir benzetmeyle anlatılmıştır. Bu benzetmede insan bir meslek sahibi, azaları ise onun sorumluluğundaki varlıklar olarak tasvir edilmiştir. Her bir azanın kendine ait bir alanı vardır ve bu alanın dışına çıkamaz.

Kitaba göre bu benzetmede insan ve yedi aza sırasıyla neye benzetilmiştir?", "options": ["Komutan ve askerleri", "Bahçıvan ve yedi ağacı", "Kaptan ve tayfaları", "Çoban ve yedi koyunu"], "answer": "D", "sinav": 1}, {"no": "113", "body": "Kitaptaki çoban-koyun metaforunda, koyunların karşılaşabileceği çeşitli tehlikeler sıralanmıştır. Çoban bu tehlikelere karşı farklı tedbirler almaktadır. Tehlikelerden biri zehirli otlaklara girmektir ve bunun tedavisi için özel bir ilaç kullanılmaktadır.

Kitaba göre zehirli otlaklara karşı kullanılan bu ilacın adı ve içeriği aşağıdakilerden hangisidir?", "options": ["El-Bazir; yağ ve sütten oluşan ilaç", "El-Şifa; bal ve suyla yapılan karışım", "El-Devâ; otlardan elde edilen merhem", "El-Tiryâk; baldan yapılan panzehir"], "answer": "A", "sinav": 1}, {"no": "114", "body": "Kitapta, namazın semeresi (meyvesi) diğer ibadetlerin semereleriyle karşılaştırılmıştır. Buna göre her ibadetin kendine özgü bir semeresi varken, namazın semeresi diğerlerinden farklı ve kapsamlı bir nitelik taşımaktadır.

Aşağıdaki ibadet-semere eşleştirmelerinden hangisi kitaba göre yanlıştır?", "options": ["Oruç: Nefsin temizlenmesi", "Hac: Bağışlanmanın gerekliliği", "Zekât: Günahların affedilmesi", "Cihat: Cennetin gerekliliği"], "answer": "C", "sinav": 1}, {"no": "115", "body": "Kitapta namazın semeresi olan \"Allah'ın kuluna yönelmesi\" kavramı açıklanırken, bu semerenin diğer ibadetlerin semereleriyle olan ilişkisi de belirtilmiştir.

Kitaba göre namazın semeresi hakkında aşağıdakilerden hangisi doğrudur?", "options": ["Namazın semeresi yalnızca günahların affedilmesidir", "Namazın semeresi oruç ve zekâtın semeresinden farksızdır", "Namazın semeresi sadece cennetin kazanılmasıdır", "Namazın semeresi, diğer ibadetlerin semlerelerinin hepsini içinde barındırır"], "answer": "D", "sinav": 1}, {"no": "116", "body": "Kitapta namaz, belirli bir mekân ve olay benzetmesiyle tanımlanmıştır. Bu benzetmeye göre namazın içindeki farklı rükünler, bu mekândaki farklı ikramlara karşılık gelmektedir.

Aşağıdakilerden hangisi kitaptaki bu benzetmede doğru bir eşleştirmedir?", "options": ["Namaz = okul; rükünler = dersler", "Namaz = Allah'ın evi; kıyam, rükû, secde = ziyafetler; tilavet = düğün; teşehhüt = velime", "Namaz = yolculuk; rükünler = duraklar", "Namaz = savaş; rükünler = mücadele safhaları"], "answer": "B", "sinav": 1}, {"no": "117", "body": "Kitapta, Peygamberimizin namaz hakkındaki bir hadisinde kullanılan kelime seçimi üzerinde durulmuş ve ince bir dil ayrımına dikkat çekilmiştir. Buna göre Peygamberimiz \"Gözümün nuru namaz ile kılındı\" dememiş, bunun yerine farklı bir ifade kullanmıştır.

Kitaba göre Peygamberimizin kullandığı doğru ifade aşağıdakilerden hangisidir?", "options": ["Gözümün nuru namazda kılındı", "Gözümün nuru namaz sayesinde kılındı", "Gözümün nuru namaz için kılındı", "Gözümün nuru namaz esnasında verildi"], "answer": "A", "sinav": 1}, {"no": "118", "body": "Kitapta, insanın namazdaki yönelişinin düzeyine göre üç farklı kategori oluşturulmuştur: sadıklar, sıddıklar ve sıddıklardan olan seçkin kullar. Bu üç grubun namazdaki yönelişleri birbirinden farklıdır.

Kitaba göre sadıklar ile sıddıkların namazdaki yönelişleri arasındaki temel fark aşağıdakilerden hangisidir?", "options": ["Sadıklar cemaatle kılar, sıddıklar tek başına kılar", "Sadıklar farz kılar, sıddıklar hem farz hem nafile kılar", "Sadıklar namazın fiillerine ve tilavetine yönelir; sıddıklar bunların manalarına yönelir", "Sadıklar kısa kılar, sıddıklar uzun kılar"], "answer": "C", "sinav": 1}, {"no": "119", "body": "Kitapta, namazın her bir rüknünün insanı belirli bir olumsuzluktan kurtardığı detaylı bir şekilde açıklanmıştır.

Aşağıdaki rükün-etki eşleştirmelerinden hangisi kitaba göre doğrudur?", "options": ["Tekbir: Gafletten arınma", "Rükû: Günahlardan arınma", "Secde: Kalp katılığından uzaklaşma", "Tilavet: Nefsanî teslimiyeti ve ahdi yenileme"], "answer": "D", "sinav": 1}, {"no": "120", "body": "Kitapta namazın rükünlerinin manevi etkileri listelenmiştir. Buna göre her rükün insanı farklı bir olumsuzluktan kurtarmaktadır.

I. Kıyam: Asi olmaktan çıkış
II. Tekbir: Kibirden uzak durma
III. Rükû: Günahlardan arınma
IV. Secde: Günahlardan arınma
V. Selam: En büyük tehlikeden çıkış

Kitaba göre yukarıdaki eşleştirmelerden hangisi yanlıştır?", "options": ["Yalnız I", "Yalnız III", "III ve IV", "Yalnız V"], "answer": "B", "sinav": 1}, {"no": "121", "body": "Kitapta, kalpteki marifet (Allah'ı tanıma bilgisi) bir benzetmeyle anlatılmıştır. Buna göre marifet belirli bir nesne gibidir ve gaflet halinde bu nesne üzerinde belirli bir tabaka oluşur. İnsan Allah'ı övdüğünde ise bu tabaka kaldırılır.

Kitaba göre bu benzetmede marifet neye, gaflet halindeki durum neye benzetilmiştir?", "options": ["Marifet = ışık; gaflet = karanlık perdesi", "Marifet = nehir; gaflet = nehrin donması", "Marifet = tohum; gaflet = toprağın kuruması", "Marifet = tutuşmuş köz; gaflet = külün közü örtmesi"], "answer": "D", "sinav": 1}, {"no": "122", "body": "Kitapta, iki namaz arasında insanda meydana gelen olumsuz haller sıralanmıştır. Her namaz bu olumsuz hallerin giderilmesi için bir tövbe niteliği taşımaktadır.

Aşağıdakilerden hangisi kitapta iki namaz arasında oluştuğu belirtilen olumsuz hallerden biri değildir?", "options": ["Gaflet", "Kalp katılaşması", "Kaymalar ve hatalar", "İnkâr ve şirk"], "answer": "D", "sinav": 1}, {"no": "123", "body": "Kitapta, gafletin zincirleme etkisi detaylı olarak açıklanmıştır. Gaflet bir dizi olumsuz sonuca yol açarak insanı adım adım daha kötü bir duruma sürüklemektedir.

Kitaba göre gafletin zincirleme etkisinin doğru sıralaması aşağıdakilerden hangisidir?", "options": ["Gaflet → günah → tövbe → tekrar günah → azap", "Gaflet → Allah'tan uzaklaşma → kibir ve gurur → korku ve haşyeti kaybetme → kalp katılığı → kayma → düşmanın esir alması", "Gaflet → tembellik → fakirlik → hastalık → ölüm", "Gaflet → şüphe → inkâr → küfür → cehennem"], "answer": "B", "sinav": 1}, {"no": "124", "body": "Kitapta, kötü çobana yönelik bir atasözü aktarılmıştır. Bu atasözünde çobanın koyunlardan faydalandığı halde görevini ihmal ettiği eleştirilmektedir.

Kitapta aktarılan bu atasözüne göre çobanın yaptığı üç şey ve ihmal ettiği üç görev aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Yaptığı: sağmak, kesmek, satmak / İhmal: yavrularına bakmak, suya götürmek, gece korumak", "Yaptığı: otlatmak, sulamak, korumak / İhmal: satmak, kırkımını yapmak, sayısını kontrol etmek", "Yaptığı: beslemek, büyütmek, pazara götürmek / İhmal: hastalanınca tedavi etmek, kurttan korumak, barınak yapmak", "Yaptığı: eti yemek, sütü içmek, yünü giymek / İhmal: koyuna sahip çıkmamak, kırığı onarmamak, merasında otlatmamak"], "answer": "D", "sinav": 1}, {"no": "125", "body": "Kitapta, güzel kılınan namazın ve kötü kılınan namazın ahiretteki durumu iki ayrı hadisle tasvir edilmiştir. Güzel kılınan namaz belirli bir şekilde Allah'a yükselirken, kötü kılınan namaz tamamen farklı bir durumla karşılaşmaktadır.

Kitaba göre güzel kılınan namazın Allah'a yükselme hali aşağıdakilerden hangisidir?", "options": ["Parlak bir halde, doğu ile batı arasında bulunan her şeyi aydınlatır bir vaziyette yükselir", "Sessizce ve mütevazı bir şekilde yükselir", "Yeşil bir nur halinde meleklerin eşliğinde yükselir", "Hızla ve doğrudan Arş'a yükselir"], "answer": "A", "sinav": 1}, {"no": "126", "body": "Kitapta, kötü kılınan namazın kıyametteki durumu çarpıcı bir şekilde tasvir edilmiştir. Bu namaz sahibine dönerek belirli bir söz söylemekte ve sonunda belirli bir muameleye tabi tutulmaktadır.

Kitaba göre kötü kılınan namazın sahibine söylediği söz ve sonraki muamele aşağıdakilerden hangisidir?", "options": ["\"Beni affet\" der ve yeniden kılma fırsatı verilir", "\"Beni tamamla\" der ve nafile namazlarla tamamlanır", "\"Beni kaçırdığın gibi Allah da seni dikkate almasın\" der ve eski bir elbise gibi dürülerek sahibinin yüzüne fırlatılır", "\"Beni hatırla\" der ve kıyamette tekrar kılması istenir"], "answer": "C", "sinav": 1}, {"no": "127", "body": "Kitapta, yedi sema ehlinin her birinin farklı bir ibadet şekliyle meşgul olduğu anlatılmıştır. Tüm bu farklı ibadet şekillerinin tek bir namazda mümin için bir araya getirildiği belirtilmiştir.

Aşağıdaki sema-ibadet eşleştirmelerinden hangisi kitaba göre yanlıştır?", "options": ["Dünya seması ehli: Secde", "İkinci sema ehli: Kıyam", "Yedinci sema ehli: Arş etrafında tavaf ve kanat çırpma", "Beşinci sema ehli: Kâde (diz üzerine çöküş)"], "answer": "B", "sinav": 1}, {"no": "128", "body": "Kitapta Mi'rac hadisesi detaylı bir şekilde anlatılmıştır. Buna göre Peygamberimize ilk başta belirli sayıda vakit namaz farz kılınmış, ardından bir peygamberin tavsiyesiyle bu sayı kademeli olarak azaltılmıştır.

Kitaba göre Mi'rac'ta ilk farz kılınan namaz sayısı ve tavsiye veren peygamber aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["50 vakit; Hz. Musa", "100 vakit; Hz. İbrahim", "70 vakit; Hz. İsa", "30 vakit; Hz. Nuh"], "answer": "A", "sinav": 1}, {"no": "129", "body": "Kitapta, Mi'rac hadisesinde Hz. Musa'nın Peygamberimize tavsiye verirken İsrailoğulları'nın durumunu örnek gösterdiği anlatılmıştır.

Kitaba göre Hz. Musa, İsrailoğulları hakkında ne söylemiştir?", "options": ["Onlara on vakit farz kılınmış ama sadece beşini yapmışlardır", "Onlara iki vakit farz kılınmıştı ama onu bile yapmadılar", "Onlara üç vakit farz kılınmış ama zamanla terk etmişlerdir", "Onlara yedi vakit farz kılınmış ama beşe indirmişlerdir"], "answer": "B", "sinav": 1}, {"no": "130", "body": "Kitapta insanın yaptığı ameller üç farklı kategoride değerlendirilmiştir. Her kategorinin sonucu birbirinden tamamen farklıdır.

I. Yapılması gereken ameli yapmamak → itaatsizlik
II. Ameli yapmak ama Allah rızası için yapmamak → boş iş, sevap verilmez, hesaba çekilir
III. Ameli Allah rızası için yapmak → kazançlı ticaret, cennet ve Allah'ın hoşnutluğu

Kitaba göre yukarıdaki kategorilerden hangisi veya hangileri doğrudur?", "options": ["Yalnız I ve III", "Yalnız II ve III", "I, II ve III", "Yalnız I ve II"], "answer": "C", "sinav": 1}, {"no": "131", "body": "Kitapta, gaflet ve zikir arasındaki ilişki bir tabiat olayı benzetmesiyle açıklanmıştır. Buna göre kul belirli bir davranışa devam ettikçe rahmet gelmeye devam eder, aksini yaptığında ise olumsuz bir doğal durum ortaya çıkar.

Kitaba göre bu benzetmede zikir ve gaflet sırasıyla neye benzetilmiştir?", "options": ["Zikir = yağmur; gaflet = kuraklık", "Zikir = güneş ışığı; gaflet = bulutlu hava", "Zikir = rüzgâr; gaflet = durgun hava", "Zikir = bahar; gaflet = kış"], "answer": "A", "sinav": 1}, {"no": "132", "body": "Kitapta, Allah'ın tekebbür eden (büyüklenen) kullara karşı tutumu açıklanmıştır. Buna göre Allah, kullarını belirli bir haldeyken sever, ancak tekebbür ettiklerinde çok kızar.

Kitaba göre Allah'ın kullarını sevdiği hal ve tekebbüre kızmasının sebebi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sevdiği hal: ilim sahibi olmaları; Kızma sebebi: ilimle kibirlenmeleri", "Sevdiği hal: fakir olmaları; Kızma sebebi: zenginlikle şımarmaları", "Sevdiği hal: kul sûretinde bulunmaları; Kızma sebebi: tekebbürün Allah'a benzeşme olması", "Sevdiği hal: çok ibadet etmeleri; Kızma sebebi: ibadetle övünmeleri"], "answer": "C", "sinav": 1}, {"no": "133", "body": "Kitapta, namaz kılmasına rağmen kötülüklerden uzak durmayan kişinin durumu hakkında hem bir ayet hem de bir hadis aktarılmıştır. Hadise göre böyle bir namazın sonucu çok ağırdır.

Kitaba göre kişiyi kötülüklerden alıkoymayan namazın sonucu aşağıdakilerden hangisidir?", "options": ["Bu namaz kişiyi Allah'tan daha fazla uzaklaştırmaktan başka bir işe yaramamıştır", "Bu namaz sevap da günah da getirmez, nötr kalır", "Bu namaz kabul edilir ama sevabı azaltılır", "Bu namaz kıyamete kadar ertelenir ve orada tekrar değerlendirilir"], "answer": "A", "sinav": 1}, {"no": "134", "body": "Kitapta, namaz kılmanın kime ağır gelip kime gelmediği bir ayetle açıklanmıştır.

Kitaba göre namaz aşağıdakilerden hangisine ağır gelmez?", "options": ["Zengin olan kullara", "İlim sahibi olanlara", "Allah'a derinden saygı duyan (haşyet sahibi) kullara", "Cemaatle kılan kullara"], "answer": "C", "sinav": 1}, {"no": "135", "body": "Kitapta, Mi'rac hadisesinde Peygamberimizin yedinci semaya çıkarıldığı ve orada belirli bir peygamberi gördüğü anlatılmıştır. Ancak bu peygamber, Hz. Musa'dan farklı olarak, Peygamberimize herhangi bir tavsiyede bulunmamıştır.

Kitaba göre yedinci semada bulunan ve sessiz kalan bu peygamber aşağıdakilerden hangisidir?", "options": ["Hz. Âdem", "Hz. İsa", "Hz. İbrahim", "Hz. İdris"], "answer": "C", "sinav": 1}, {"no": "136", "body": "Kitapta, Mi'rac gecesinde Peygamberimizin çıkarıldığı en yüksek noktada özel bir deneyim yaşadığı anlatılmıştır. Bu noktada kendisini bir bulut tabakası kaplamış ve çok özel sesler duymuştur.

Kitaba göre Peygamberimizin duyduğu bu sesler aşağıdakilerden hangisidir?", "options": ["Meleklerin tesbih sesleri", "Kalem sesleri", "Ezan sesleri", "Kur'ân okunma sesleri"], "answer": "B", "sinav": 1}, {"no": "137", "body": "Kitapta, namazın her bir fiilindeki yönelişin Allah'ın farklı bir sıfatına yönelik olduğu açıklanmıştır.

Aşağıdaki fiil-sıfat eşleştirmelerinden hangisi kitaba göre doğrudur?", "options": ["Kıyam: Allah'ın Rahmaniyetine yöneliş", "Rükû: Allah'ın Azametine yöneliş", "Secde: Allah'ın Samediyetine yöneliş", "İstaze (Eûzü): Allah'ın Cömertliğine yöneliş"], "answer": "B", "sinav": 1}, {"no": "138", "body": "Kitapta, kalbin Allah'ın rahmetiyle olan ilişkisi bir doğa benzetmesiyle açıklanmıştır. Buna göre göğüs nurla dolu olursa kalp ve azalar belirli bir hale gelir, aksi durumda ise tamamen farklı bir durum ortaya çıkar.

Kitaba göre göğüs nurla dolduğunda kalbin ve azaların durumu aşağıdakilerden hangisidir?", "options": ["Kalp güçlü, azalar dayanıklı olur", "Kalp geniş, azalar esnek olur", "Kalp aydınlık, azalar hızlı olur", "Kalp ıslak, azalar yumuşak olur ve itaate sevk edilince boyun eğerler"], "answer": "D", "sinav": 1}, {"no": "139", "body": "Kitapta, insanın namazdaki teşehhüdde oturmasının yöneldiği ilahî sıfat belirtilmiştir. Bu yöneliş, kalbinde belirli duygular oluşturur ve kişiyi belirli bir davranıştan uzak tutar.

Kitaba göre teşehhüdde kulun yöneldiği ilahî sıfat ve bunun kalpte oluşturduğu etki aşağıdakilerden hangisidir?", "options": ["Allah'ın Rahmaniyetine yöneliş; kalbi şefkatle doldurur", "Allah'ın Azametine yöneliş; kalbi korkuyla doldurur", "Allah'ın Samediyetine yöneliş; kalbini haya ve rahmetle doldurur, Allah'tan başkasına minnet etmekten uzak tutar", "Allah'ın Kerimiyetine yöneliş; kalbi umutla doldurur"], "answer": "C", "sinav": 1}, {"no": "140", "body": "Kitapta, namazın emanetlerle ilişkisi açıklanmıştır. Buna göre insana emanet edilen yedi aza, misak gününde verilen bir ahitle bağlıdır. Bu azalara sahip çıkan belirli bir sonuçla karşılaşacaktır.

Kitaba göre yedi azanın emanet niteliği ve bunlara sahip çıkmanın sonucu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Emanet: misak gününde bu azalarla Allah'a ibadet edileceğine dair verilen sözdür; Sonuç: cennet", "Emanet: ilim öğrenme ve öğretme sorumluluğudur; Sonuç: şefaat hakkı", "Emanet: akraba ve komşu haklarını koruma aracıdır; Sonuç: toplumsal huzur", "Emanet: dünya hayatında başarı elde etme aracıdır; Sonuç: dünyada refah"], "answer": "A", "sinav": 1}, {"no": "141", "body": "Kitapta \"salât\" kelimesinin Arapçadaki anlamları verilmiştir.

Aşağıdakilerden hangisi kitapta belirtilen \"salât\" kelimesinin anlamlarından biri değildir?", "options": ["Secde etmek", "Övmek", "Yüceltmek", "Dua etmek"], "answer": "A", "sinav": 1}, {"no": "142", "body": "Kitapta Peygamberimizin namazı belirli bir benzetmeyle nitelediği aktarılmıştır. Bu benzetmeye göre namaz, bir binanın belirli bir yapısal unsuruna benzetilmiştir.

Kitaba göre Peygamberimiz namazı aşağıdakilerden hangisine benzetmiştir?", "options": ["Binanın temeli", "Binanın çatısı", "İslam dininin direği", "İslam binasının kapısı"], "answer": "C", "sinav": 1}, {"no": "143", "body": "Kitapta namaz kılmayan kişinin dini durumu açıkça belirtilmiştir. Buna göre ameller imanın bir parçası değildir ve iman esaslarını inkâr etmedikçe kişi dinden çıkmaz.

Kitaba göre namaz kılmayan kimsenin durumu aşağıdakilerden hangisidir?", "options": ["Kâfir sayılır ve İslam'dan çıkar", "Münafık sayılır ama dinden çıkmaz", "İmanı geçersiz sayılır ve yeniden şehadet getirmesi gerekir", "Günahkârdır, Allah'ın emirlerini yerine getirmeyen biridir fakat İslam dairesi içindedir"], "answer": "D", "sinav": 1}, {"no": "144", "body": "Kitapta namazın özü hakkında önemli bir tespit yapılmıştır. Buna göre namazda sadece şekil şartlarını yerine getirmek yeterli değildir.

Kitaba göre namazın özü aşağıdakilerden hangisidir?", "options": ["Rükünlerin eksiksiz yapılması", "Ayetlerin doğru okunması", "Kalbin Allah'ı anması", "Cemaatle kılınması"], "answer": "C", "sinav": 1}, {"no": "145", "body": "Kitapta, namaz kıldığı halde kötülük yapan kişilerin durumu açıklanmıştır. Buna göre bu kişilerin namazlarında belirli bir sorun vardır.

Kitaba göre bu sorun aşağıdakilerden hangisidir?", "options": ["Namazlarının bilinçli ve dosdoğru kılınmaması, dolayısıyla kötülükten alıkoyacak kaliteye ulaşmamış olması", "Namazlarını cemaatle kılmamaları", "Namazlarında yeterli miktarda Kur'ân okumamaları", "Namazlarını vakit çıktıktan sonra kaza olarak kılmaları"], "answer": "A", "sinav": 1}, {"no": "146", "body": "Kitapta huşunun sağlanması için üç temel husus belirtilmiştir.

Aşağıdakilerden hangisi kitapta huşuyu sağlamaya yardımcı olan hususlardan biri olarak belirtilmemiştir?", "options": ["Namazın şartlarına ve rükünlerine dikkat ederek kılınması", "Kılınan namazın 'son namaz' olabileceğinin düşünülmesi", "Namazın, dünyada Allah'a yaklaşmanın son noktası olduğunun idrak edilmesi", "Namazı mutlaka camide cemaatle kılmak"], "answer": "D", "sinav": 1}, {"no": "147", "body": "Kitapta namazların dinî hüküm açısından üç ana kategoriye ayrıldığı belirtilmiştir. Bu kategorilerden biri olan vacip namazlar da kendi içinde ikiye ayrılmaktadır.

Aşağıdakilerden hangisi li-aynihî vacip namaza örnektir?", "options": ["Adak namazı", "Cenaze namazı", "Vitir namazı", "Bozulan nafile namazın kazası"], "answer": "C", "sinav": 1}, {"no": "148", "body": "Kitapta nafile namazlar iki alt kategoriye ayrılmıştır: revâtib ve regâib namazlar.

Aşağıdakilerden hangisi kitapta regâib namazlar arasında sayılmamıştır?", "options": ["Teheccüd namazı", "Tesbih namazı", "İstihâre namazı", "Teravih namazı"], "answer": "D", "sinav": 1}, {"no": "149", "body": "Kitapta namazın geçerli olması için uyulması gereken şartlar (namazın dışındaki farzlar) altı madde olarak sıralanmıştır.

Aşağıdakilerden hangisi bu altı şarttan biri değildir?", "options": ["Hadesten taharet", "Setr-i avret", "Niyet", "Cemaatle kılmak"], "answer": "D", "sinav": 1}, {"no": "150", "body": "Kitapta namazın içindeki farzlar (rükünleri) altı madde olarak sıralanmıştır.

Aşağıdakilerden hangisi bu altı rükünden biri değildir?", "options": ["İftitah tekbiri", "Kıraat", "Ka'de-i ahire", "Salli-Bârik duaları"], "answer": "D", "sinav": 1}, {"no": "151", "body": "Kitapta, namazda avret yerinin açılması durumunda namazın bozulup bozulmayacağı belirli ölçülerle açıklanmıştır.

Kitaba göre namazda irade dışı açılan bir organın namazı bozması için hangi iki şartın birlikte gerçekleşmesi gerekir?", "options": ["Açılan yerin tamamı görülmeli ve kişi fark etmeli", "Açılan yer üç saniyeden fazla sürmeli ve kişi bilerek örtmemeli", "Açılan yer karşıdaki kişi tarafından fark edilmeli ve kıbleye dönük olmalı", "Açılan yer bir organın dörtte biri oranına ulaşmalı ve bir rükün eda edilecek kadar açık kalmalı"], "answer": "D", "sinav": 1}, {"no": "152", "body": "Kitapta Hanefî mezhebine göre kadınların çıplak ayakla namaz kılıp kılamayacağı konusunda bilgi verilmiştir.

Kitaba göre Hanefî mezhebinin bu konudaki görüşü aşağıdakilerden hangisidir?", "options": ["Topuklardan yukarısı açık olmamak şartıyla çıplak ayakla namaz kılınabilir", "Kadınlar hiçbir durumda çıplak ayakla namaz kılamaz", "Sadece evde çıplak ayakla kılınabilir, camide kılınamaz", "Çorap giyilmesi her durumda farzdır"], "answer": "A", "sinav": 1}, {"no": "153", "body": "Kitapta, oje, ruj gibi maddelerin abdeste etkisi ve bunun istisnaları açıklanmıştır.

Kitaba göre aşağıdakilerden hangisi abdeste engel olmaz?", "options": ["Jöle", "Ruj", "Oje", "Boya"], "answer": "A", "sinav": 1}, {"no": "154", "body": "Kitapta kerahet vakitleri üç ana vakit olarak belirtilmiştir. Bu vakitlerde kılınamayan namazlar da sayılmıştır. Ancak bir istisna olarak belirli bir namazın son kerahet vaktinde kılınabileceği ifade edilmiştir.

Kitaba göre güneşin batmasından önceki kerahet vaktinde kılınabilecek tek namaz aşağıdakilerden hangisidir?", "options": ["O günün sabah namazının kazası", "O günün ikindi namazının farzı", "Vitir namazı", "Cenaze namazı"], "answer": "B", "sinav": 1}, {"no": "155", "body": "Kitapta, sabah namazı kılınırken güneşin doğması durumunda namazın bozulup bozulmayacağı konusunda farklı görüşler aktarılmıştır.

Kitaba göre İmam Ebû Hanîfe'nin ve İmam Ebû Yûsuf ile Muhammed'in görüşleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ebû Hanîfe: bozulmaz; Ebû Yûsuf ve Muhammed: bozulur", "Hepsi: kesinlikle bozulur", "Ebû Hanîfe: bozulur; Ebû Yûsuf ve Muhammed: son oturuşta teşehhüd miktarı oturulmuşsa bozulmaz", "Hepsi: kesinlikle bozulmaz"], "answer": "C", "sinav": 1}, {"no": "156", "body": "Kitapta, Cuma namazının toplam rekât sayısı ve farz kısmının rekât sayısı belirtilmiştir.

Kitaba göre Cuma namazının sünnetleriyle birlikte toplam rekât sayısı ve farz kısmı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Toplam 8 rekât; farz 2 rekât", "Toplam 10 rekât; farz 2 rekât", "Toplam 12 rekât; farz 4 rekât", "Toplam 10 rekât; farz 4 rekât"], "answer": "B", "sinav": 1}, {"no": "157", "body": "Kitapta, Cuma namazı için gerekli asgari cemaat sayısı mezheplere göre farklı belirtilmiştir.

Aşağıdaki mezhep-asgari sayı eşleştirmelerinden hangisi kitaba göre yanlıştır?", "options": ["Hanefî: imam dışında en az 3 kişi", "Şâfiî ve Hanbelî: en az 40 kişi", "Mâlikî: en az 12 kişi", "Hanefî: imam dışında en az 7 kişi"], "answer": "D", "sinav": 1}, {"no": "158", "body": "Kitapta zuhr-i âhir namazı hakkında bilgi verilmiştir.

Kitaba göre zuhr-i âhir namazı hakkında aşağıdakilerden hangisi doğrudur?", "options": ["Şehirlerde birden fazla camide Cuma kılınması sebebiyle ihtiyaten kılınmaya başlanmıştır", "Hz. Peygamber zamanında düzenli olarak kılınmıştır", "Cuma namazının yerine kılınan zorunlu bir namazdır", "Yalnızca kadınlar tarafından kılınan özel bir namazdır"], "answer": "A", "sinav": 1}, {"no": "159", "body": "Kitapta teravih namazının rekât sayısı konusunda farklı rivayetler aktarılmıştır.

Kitaba göre Hz. Âişe'nin bu konudaki rivayeti aşağıdakilerden hangisidir?", "options": ["Peygamberimiz Ramazan'da 20 rekâttan fazla kılmazdı", "Peygamberimiz Ramazan'da da Ramazan dışında da 11 rekâttan fazla namaz kılmazdı", "Peygamberimiz teravihi bazen 8, bazen 20 rekât kılardı", "Peygamberimiz teravihi yalnızca cemaatle kılardı"], "answer": "B", "sinav": 1}, {"no": "160", "body": "Kitapta, seferi (yolcu) sayılmanın şartları belirtilmiştir.

Kitaba göre bir kişinin seferi sayılması için gerekli mesafe ve kalış süresi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["En az 50 km mesafe, 7 günden az kalma niyeti", "En az 90 km mesafe, 15 günden az kalma niyeti", "En az 120 km mesafe, 30 günden az kalma niyeti", "En az 80 km mesafe, 10 günden az kalma niyeti"], "answer": "B", "sinav": 1}, {"no": "161", "body": "Kitapta, mest üzerine mesh süresi mukim ve seferi kişiler için farklı belirtilmiştir.

Kitaba göre mukim ve seferi kişiler için mesh süreleri sırasıyla aşağıdakilerden hangisidir?", "options": ["12 saat ve 36 saat", "24 saat ve 72 saat", "1 gün ve 5 gün", "48 saat ve 96 saat"], "answer": "B", "sinav": 1}, {"no": "162", "body": "Kitapta, namazda en az ne kadar Kur'ân okunması gerektiği (asgari kıraat miktarı) belirtilmiştir.

Kitaba göre namazda farz olan asgari kıraat miktarı aşağıdakilerden hangisidir?", "options": ["Fatiha sûresinin tamamı", "Sadece Besmele yeterlidir", "En az 5 ayet", "En az 3 kısa ayet veya 1 uzun ayet"], "answer": "D", "sinav": 1}, {"no": "163", "body": "Kitapta, namazda sûrelerin Kur'ân'a bakarak okunması konusunda Ebû Hanîfe ile talebeleri Ebû Yûsuf ve Muhammed arasında görüş farkı olduğu belirtilmiştir.

Kitaba göre bu görüş farkı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ebû Hanîfe: namazı bozar; Ebû Yûsuf ve Muhammed: mekruh ama namaz geçerlidir", "Ebû Hanîfe: caizdir; Talebeleri: caiz değildir", "Hepsi: kesinlikle namazı bozar", "Hepsi: tamamen caizdir"], "answer": "A", "sinav": 1}, {"no": "164", "body": "Kitapta cenaze namazının yapısı ve tekbir sayısı belirtilmiştir.

Kitaba göre cenaze namazı hakkında aşağıdakilerden hangisi doğrudur?", "options": ["Rükû ve secdeli, 2 rekâtlı bir namazdır", "Secdesiz ve rükûsuz, 4 tekbirli bir namazdır", "3 tekbirli ve 1 secdeli bir namazdır", "Normal namaz gibi kılınır ama 1 rekâttır"], "answer": "B", "sinav": 1}, {"no": "165", "body": "Kitapta, namazın psikolojik boyutları üç temel yönde ele alınmıştır: şekli, zihinsel ve duygusal.

Kitaba göre namazda hissedilen korku duygusu nasıl bir korkudur?", "options": ["Allah'ın cezasından duyulan dehşet verici bir korku", "Cehennem ateşinin azabından duyulan panik hali", "Ölümün yakınlığını hissetmekten kaynaklanan varoluşsal bir korku", "Allah'ın sevgisini ve rızasını kaybetme endişesinin doğurduğu, sevgi ve saygıya dayalı bir korku"], "answer": "D", "sinav": 1}, {"no": "166", "body": "Kitapta, namazın üstünlük ve aşağılık duygularını dengeleyici etkisi açıklanmıştır. Buna göre namaz kılan birey bu iki uç duyguyu atarak belirli bir özellik kazanır.

Kitaba göre namazın bireye kazandırdığı bu özellik aşağıdakilerden hangisidir?", "options": ["Liderlik", "Cesaret", "Mütevazılık", "Kararlılık"], "answer": "C", "sinav": 1}, {"no": "167", "body": "Kitapta, beş vakit namazın insan hayatındaki işlevi bir benzetmeyle açıklanmıştır. Bu benzetmeye göre namaz, belirli bir meslek grubunun çalışma rutinindeki zorunlu molalara benzemektedir.

Kitaba göre bu benzetmede namaz neye benzetilmiştir?", "options": ["Öğrencinin ders arası molalarına", "Sporcunun antrenman arası dinlenmelerine", "Uzun yola çıkan şoförün belli aralıklarla verdiği molalara", "Doktorun hastalar arasında aldığı nefes molalarına"], "answer": "C", "sinav": 1}, {"no": "168", "body": "Kitapta, namazın merhamet duygusuyla olan ilişkisi açıklanmıştır. Buna göre günlük hayatta kızgınlık ve nefret gibi olumsuz duygular merhamet duygusunu baskıladığında, belirli bir mekanizma devreye girmektedir.

Kitaba göre merhamet duygusunun yeniden canlanmasında etkili olan unsur aşağıdakilerden hangisidir?", "options": ["Sadaka vermek", "Kur'ân okumak", "Kısa aralıklarla kılınan namaz ve özellikle Besmele ile Fatiha'daki Rahmân ve Rahîm kelimeleri", "Cemaatle ibadet etmek"], "answer": "C", "sinav": 1}, {"no": "169", "body": "Kitapta Peygamberimizin Mi'rac öncesi hazırlığı anlatılmıştır.

Kitaba göre Peygamberimiz Mi'rac'a hazırlanırken neler olmuştur?", "options": ["Cebrail gelmiş, göğsü yarılıp zemzem ile yıkanmıştır", "Peygamberimiz üç gün oruç tutmuştur", "Medine'den Kudüs'e yürüyerek gitmiştir", "Peygamberimiz Hira Mağarası'nda vahiy almıştır"], "answer": "A", "sinav": 1}, {"no": "170", "body": "Kitapta, İmam Gazali'nin abdest hakkındaki görüşü aktarılmıştır. Buna göre taharet dıştan içe doğru birbirini kuşatan üç temizliği kapsar.

Kitaba göre bu üç temizlik dıştan içe doğru sırasıyla aşağıdakilerden hangisidir?", "options": ["Beden, kalp, ruh", "Elbise, beden, kalp", "El, yüz, ayak", "Su, sabun, havlu"], "answer": "B", "sinav": 1}, {"no": "171", "body": "Kitapta, Peygamberimizin beş vakit namaz farz kılınmadan önce günde kaç vakit namaz kıldığı belirtilmiştir.

Kitaba göre bu benzetmede namaz neye benzetilmiştir?", "options": ["Evin önündeki ırmakta günde beş defa yıkanmaya", "Yağmurun toprağı yıkamasına", "Rüzgârın yaprakları savurmasına", "Güneşin karanlığı aydınlatmasına"], "answer": "A", "sinav": 1}, {"no": "176", "body": "Kitapta, namazların birleştirilmesi (cem) konusunda Hanefi mezhebinin diğer mezheplerden farklı bir görüşe sahip olduğu belirtilmiştir.

Kitaba göre aşağıdakilerden hangisi tertip sahibinin doğru tanımıdır?", "options": ["Her gün beş vakit namazını düzenli kılan kimse", "Altı vakitten az namazı kazaya kalmış kimse", "Nafile namazları hiç kaçırmayan kimse", "Cemaatle namazı hiç aksatmayan kimse"], "answer": "B", "sinav": 1}, {"no": "179", "body": "Kitapta, namazın insan psikolojisi üzerindeki etkisi çok boyutlu olarak ele alınmıştır. Buna göre namazın benlik üzerinde onarıcı bir etkisi vardır.

Kitaba göre namazın benlik üzerindeki etkisi aşağıdakilerden hangisidir?", "options": ["Olumsuz yaşantıların benlikte açtığı yaraları pansuman eder, onarır ve benlik saygısını güçlendirir", "Benliği tamamen ortadan kaldırır", "Benliği değiştirmez, sadece geçici bir rahatlama sağlar", "Benliği sadece ahiret kaygısıyla şekillendirir"], "answer": "A", "sinav": 1}, {"no": "180", "body": "Kitapta, namazların cem edilmesinde (birleştirilmesinde) hangi namazların birbirleriyle birleştirilebileceği belirtilmiştir.

Kitaba göre aşağıdaki namaz çiftlerinden hangisi cem edilemez?", "options": ["Öğle ile ikindi", "Akşam ile yatsı", "Sabah ile öğle", "Yolculukta öğle ile ikindi"], "answer": "C", "sinav": 1}];
const R={"tolstoy":"Giris, s.12-14","tevhid":"Giris, s.15","ibadet":"Giris, s.15","hasir":"Giris, s.15-16","nubuvvet":"Giris, s.16","tesbih":"Giris, s.17-19","sukur":"1. Bolum, s.22-26","fabrika":"1. Bolum, s.23-25","ibrahim":"1. Bolum, s.25-26","nimet":"1. Bolum, s.33-39","sihat":"1. Bolum, s.36","kanuni":"1. Bolum, s.36","namaz":"1. Bolum, s.47-49","halife":"1. Bolum, s.50-51","fatiha":"1. Bolum, s.51-52","sermaye":"1. Bolum, s.52-54","kavanoz":"1. Bolum, s.54-57","kalbim":"1. Bolum, s.57-61","kiraat":"1. Bolum, s.60-62","dua":"1. Bolum, s.62-66","cennet":"1. Bolum, s.67-76","hesap":"1. Bolum, s.45-47","zaman":"2. Bolum, s.80-88","vakit":"2. Bolum, s.88-94","ezan":"2. Bolum, s.94-105","hayye":"2. Bolum, s.105-120","cami":"2. Bolum, s.121-132","kaza":"2. Bolum, s.136-140","kulluk":"3. Bolum, s.142-158","mirac":"3. Bolum, s.159-161","kabul":"3. Bolum, s.165-174","fikih":"4. Bolum, s.175-217","psikoloji":"Ekler, s.218-228","peygamber":"Ekler, s.234-243"};
function gr(q){const b=(q.body||"").toLowerCase();const m=[["tolstoy","tolstoy"],["hasir","haşir|hasir|diriliş|berzah"],["nubuvvet","nübüvvet|nubuvvet|kimden öğren"],["tevhid","tevhid haki"],["ibrahim","ibrahim.*melek|fiyat.*ödeme"],["sukur","şükür|şükr|nimet.*artır|nankörlük"],["fabrika","fabrika|daire.*merkez|otomobil"],["nimet","nimet.*sayma|nefes.*fayda|christy|sol ayağ|başparmak|demir|ağrı.*nimet|kanser"],["sihat","sıhhat.*boş vakit"],["kanuni","kanunî"],["namaz","salât.*dua|namazın.*yer|mi.rac.*farz|doksandan"],["halife","halife|misal-i musaggar"],["fatiha","fatiha.*104|fatiha.*kur"],["sermaye","yüzde dört|güvenlik kemeri|nörobilim|kortizol|katalizör"],["kavanoz","kavanoz"],["kalbim","kalbim temiz|yansıtma|psikolojik denge|24 milyar"],["kiraat","imam-ı a.zam|kıraat|kolayınıza|arapça.*kılın|tercüme.*namaz"],["dua","vedûd|tüccar.*hırsız|laurence|brown"],["cennet","cennet.*anahtar|koç.*sûret|ölüm.*öldür|parmağını denize|akvaryum"],["hesap","dört şey.*sorgul|vaiz.*ölüm|kum saati|gölge.*nalin|lezzet.*acılaş"],["zaman","zamana hükm|vakit.*zaman|izafi|ahmet haşim|ikame|muvakkithane"],["vakit","sabah.*bahar|öğle.*zirve|ikindi.*hazan|akşam.*ölüm|yatsı.*karanlık|vaktin çağrı"],["ezan","ezan|müezzin|abdullah.*zeyd|bilal.*ezan|çan.*boru|kamet|es-salâtü hayrun|kad kâmet|sadakte"],["hayye","hayye|iblis.*kibir|yusuf.*tebrie|yunus.*tesbih|nefsimle.*başbaş|şuayb|ikbal.*secde|allâh-u ekber.*11|sübhâneke|özgürlük.*ferman"],["cami","cami.*cemaat|mescid.*alâka|27.*kat|cemaat.*fazilet|teravih"],["kaza","hendek|tertip sahibi|kazaya|kaza.*namaz"],["kulluk","7.*aza.*koyun|semere|gözlerimin nuru.*namazda|bilal.*rahata|cesedi.*ruhu|fuhşiyat|nurlu.*yüksel|kapkara.*dürül"],["mirac","50 vakit|musa.*6.*sema|sema.*kalem sesi|semavat.*ibadet|azimet"],["kabul","mukarrebîn|okçu|ömer.*ordu|niyazi mısrî|zayi eden|mücâhede"],["fikih","dışındaki farz|rükün|cenaze namaz|kerâhet|avret|oje|ruj|pijama|resim.*kıyafet|sehiv|tilavet|intihar|kutup|cem |tertip|müekked|bakarak namaz|tuvalet"],["psikoloji","psikoloj|şekli yön|zihinsel yön|duygusal yön|üstünlük.*aşağılık|merhamet.*rahmân|günahkârlık.*suçluluk"],["peygamber","nasıl.*namaz.*gördüyseniz|son hastalığ|ebu bekir.*imam"]];for(const[k,v]of m)for(const p of v.split("|")){try{if(new RegExp(p,"i").test(b))return R[k]||"";}catch(e){}}return"Kitabin ilgili bolumune bakiniz.";}

let cQ=[],cI=0,cC=0,cW=0,dn=false,wl=[],cE=0;const L=['A','B','C','D','E'];
function sh(id){document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));document.getElementById(id).classList.add('a')}
function hm(){sh('home');uh()}
function uh(){const s=JSON.parse(localStorage.getItem('ns')||'{}');let h='';for(let i=1;i<=4;i++){const d=s[`s${i}`];if(d)h+=`<div class="hc2">Sinav ${i}: <b>%${d.p}</b> (${d.c}D/${d.w}Y)</div>`;}document.getElementById('hst').innerHTML=h||'<div class="hc2">Henuz sinav cozulmedi</div>';}

function go(n){cE=n;cQ=n===0?[...Q].sort(()=>Math.random()-.5):Q.filter(q=>q.sinav===n);cI=0;cC=0;cW=0;dn=false;wl=[];document.getElementById('qT').textContent=n===0?'Tum Sorular':`${n}. Sinav`;sh('quiz');rd();}

function rd(){const q=cQ[cI],t=cQ.length;document.getElementById('qU').textContent=`Soru ${cI+1} / ${t}`;document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('pF').style.width=`${(cI/t)*100}%`;
let h=`<div class="qb">Soru ${cI+1} / ${t}</div><div class="qt2">${q.body}</div><div class="os">`;
q.options.forEach((o,i)=>{h+=`<div class="o" onclick="pk(this,${i})"><div class="lt">${L[i]}</div><div class="tx">${o}</div></div>`;});
h+=`</div><div class="ex" id="ex"></div>`;document.getElementById('cI').innerHTML=h;document.getElementById('nB').disabled=true;document.getElementById('nB').textContent=cI<t-1?'Sonraki \u2192':'Sonuclari Gor';dn=false;
const c=document.getElementById('qC');c.classList.remove('ol');c.classList.add('en');requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.remove('en')));}

function pk(el,i){if(dn)return;dn=true;const q=cQ[cI],ci=q.answer.charCodeAt(0)-65;document.querySelectorAll('.o').forEach(o=>o.classList.add('dm'));el.classList.remove('dm');
if(i===ci){el.classList.add('rt');cC++;}else{el.classList.add('fl');const ce=document.querySelectorAll('.o')[ci];ce.classList.remove('dm');ce.classList.add('ht');cW++;const ref=gr(q);const ex=document.getElementById('ex');ex.innerHTML=`<b>Dogru cevap: ${L[ci]})</b> ${q.options[ci]}<br><br><b>Kitaptaki yeri:</b> ${ref}`;ex.classList.add('on');wl.push({q,y:L[i],c:L[ci],ref});}
document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('nB').disabled=false;}

function nx(){document.getElementById('qC').classList.add('ol');setTimeout(()=>{cI++;if(cI>=cQ.length){srs();return;}rd();},280);}

function srs(){sh('result');const t=cQ.length,p=Math.round((cC/t)*100);document.getElementById('rP').textContent=p;document.getElementById('rC').textContent=cC;document.getElementById('rW').textContent=cW;
document.getElementById('rR').className='rr '+(p>=70?'gd':p>=50?'md':'bd');
document.getElementById('rE').textContent=p>=90?'\uD83C\uDF1F':p>=70?'\uD83D\uDE0A':p>=50?'\uD83D\uDE10':'\uD83D\uDE1E';
document.getElementById('rT').textContent=p>=90?'Mukemmel!':p>=70?'Basarili!':p>=50?'Gelistirilmeli':'Calismaniz Gerekiyor';
document.getElementById('rS').textContent=`${t} sorudan ${cC} dogru, ${cW} yanlis`;
if(cE>0){const s=JSON.parse(localStorage.getItem('ns')||'{}');const pr=s[`s${cE}`];if(!pr||p>pr.p)s[`s${cE}`]={c:cC,w:cW,p};localStorage.setItem('ns',JSON.stringify(s));}}

function sr(){sh('review');if(!wl.length){document.getElementById('rL').innerHTML='<div class="rvem">Tebrikler! Hic yanlis yok! \uD83C\uDF89</div>';return;}
let h='';wl.forEach((w,i)=>{h+=`<div class="rc"><div class="rn">Yanlis #${i+1}</div><div class="rb2">${w.q.body.replace(/\n/g,'<br>')}</div><div class="ar2"><span class="yr">\u2717 ${w.y})</span><span class="cr">\u2713 ${w.c}) ${w.q.options[w.c.charCodeAt(0)-65]}</span></div><div class="rf"><b>Kitaptaki Yeri:</b>${w.ref}</div></div>`;});
document.getElementById('rL').innerHTML=h;}

uh();
</script>
