swer": "A", "sinav": 3}, {"no": "32", "body": "Kitapta namazdaki \"Allâh-u ekber\" ifadesinin tekrar sayısı verilmiştir. İki rekatlık bir namazda 11 defa, dört rekatlık bir namazda 22 defa söylenmektedir.\n\nKitaba göre her \"Allâh-u ekber\" ifadesinin anlamı ve işlevi aşağıdakilerden hangisidir?", "options": ["Ömür — Gençlik — Mal (nereden/nereye) — İlim (ne amel ettiği)", "İman — Namaz — Oruç — Zekât şeklinde dört ibadetten sorgulanır", "Ailesi — Malı — Komşusu — Ümmeti şeklinde dört sorumluluktan", "Kalbi — Dili — Eli — Ayağı şeklinde dört uzvundan sorgulanır", "Farz — Vâcip — Sünnet — Nafile şeklinde dört ibadet türünden"], "answer": "A", "sinav": 3}, {"no": "33", "body": "Kitapta namazdaki Sübhâneke duasının iki önemli işlevi açıklanmıştır: Birincisi, nefsini kusursuz gören emmâre nefse karşı ilk darbeyi vurmak; ikincisi, mâsivâyı arkada bırakarak kesretten vahdete yol bulmak.\n\nBu iki işlev birlikte değerlendirildiğinde Sübhâneke duasının asıl anlamı aşağıdakilerden hangisidir?", "options": ["Akıllı = nefsini hesaba çekip ahiret için çalışan; vaiz olarak ölüm yeter", "Akıllı = en çok mal biriktiren; vaiz olarak fakirlik yeter", "Akıllı = en çok ilim öğrenen; vaiz olarak cehalet yeter", "Akıllı = en çok sadaka veren; vaiz olarak hastalık yeter", "Akıllı = en çok oruç tutan kimse; vaiz olarak açlık yeter"], "answer": "D", "sinav": 3}, {"no": "34", "body": "Kitapta Fatiha sûresinin özel konumu anlatılırken Allah'ın bu sûreyi \"kuluyla arasında paylaştırdığı\" belirtilmiş ve Peygamberimizin namazda kıraatin \"kulun Rabbiyle özel olarak konuşması\" anlamına geldiğini bildirdiği aktarılmıştır.\n\nBu iki bilginin hadis kaynakları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Buhârî, İmân / Müslim, İmân", "Müslim, Salât, 38 / Buhârî, Salât, 36", "Tirmizî, Salât / Ebû Dâvûd, Salât", "Ahmed, Müsned / Nesâî, Salât", "Buhârî, Tefsîr / Müslim, Tefsîr"], "answer": "B", "sinav": 3}, {"no": "35", "body": "Kitapta Peygamberimizin darlık ve bolluk zamanlarında farklı hamd ifadeleri kullandığı aktarılmıştır.\n\nDarlık zamanında kullandığı ifade aşağıdakilerden hangisidir?", "options": ["Salih amellerin nimetiyle tamamlandığı Allah'a hamd ederim", "Bize bu nimetleri bahşeden Allah'a sonsuz şükürler olsun", "Her hal üzere Allah'a hamd olsun", "Rabbimiz, bize verdiğin nimetlere karşılık sana şükrederiz", "Allah'ım, bize bu sıkıntıdan çıkış yolu göster"], "answer": "C", "sinav": 3}, {"no": "36", "body": "Kitapta namazda tahiyyât okumanın anlamı açıklanmış ve bunun tarihsel bir olaya dayandığı belirtilmiştir.\n\nTahiyyâtın kitapta belirtilen tarihsel dayanağı aşağıdakilerden hangisidir?", "options": ["Hz. İbrahim'in Kâbe'yi inşa ederken yaptığı duadır", "Hz. Musa'nın Tur Dağı'nda Allah ile konuşmasının tescilidir", "Miraç gecesinde Peygamberimiz ile Allah arasındaki selamlaşmanın tescilidir", "Peygamberimizin Medine'ye hicretinde sahâbeyle yaptığı ahdin tescilidir", "Hz. Âdem'in cennetten çıkarken yaptığı tövbe duasının tescilidir"], "answer": "C", "sinav": 3}, {"no": "37", "body": "Kitapta namazın kabul şekilleri ve cennete girme grupları anlatılmıştır. Birinci grup Allah için namaza durur ama zahiri düşünmekten Allah'ı düşünmeyi ihmal eder. İkinci grup Allah için namaza durur ve hep Allah'ı düşünür. Üçüncü grup mücâhede ehlidir.\n\nBu grupların cennete girme sıralaması aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["1. grup önce, 2. grup sonra, 3. grup en son", "Hepsi aynı anda girer", "3. grup önce, 2. grup sonra, 1. grup en son", "2. grup önce, 1. grup sonra, 3. grup en son", "Yalnızca 2. grup girer"], "answer": "D", "sinav": 3}, {"no": "38", "body": "Kitapta namazın dışındaki farzlar (şartlar) ve içindeki farzlar (rükünler) ayrı ayrı sıralanmıştır. Dışındaki farzlar: hadesten taharet, necasetten taharet, setr-i avret, istikbâl-i kıble, vakit ve niyet.\n\nAşağıdakilerden hangisi namazın içindeki farzlardan (rükünlerden) biri değildir?", "options": ["İftitah tekbiri", "Kıyam", "Ka'de-i ahire", "Rükû", "Niyet"], "answer": "E", "sinav": 3}, {"no": "39", "body": "Kitapta setr-i avret konusu anlatılırken erkek ve kadın için farklı ölçüler verilmiştir.\n\nErkekler ve kadınlar için avret sınırları aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Erkek: Omuz-diz arası / Kadın: Tüm vücut", "Erkek: Göbek-ayak arası / Kadın: Eller dışındaki tüm vücut", "Erkek: Bel-diz arası / Kadın: Yüz dışındaki tüm vücut", "Erkek: Göbek-diz arası / Kadın: El, yüz ve ayaklar dışındaki tüm vücut", "Erkek: Omuz-ayak arası / Kadın: Tüm vücut"], "answer": "D", "sinav": 3}, {"no": "40", "body": "Kitapta cenaze namazının dört tekbirle kılındığı ve her tekbirde farklı duaların okunduğu anlatılmıştır.\n\nBirinci tekbirde Sübhâneke duasına eklenen ilave ifade ve üçüncü tekbirde okunan dua aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["1. tekbir: \"ve celle senâük\" eklenir / 3. tekbir: Salli-Bârik okunur", "1. tekbir: \"velâ ilâhe gayruke\" eklenir / 3. tekbir: Fatiha okunur", "1. tekbir: Hiçbir ekleme yapılmaz / 3. tekbir: Salli-Bârik okunur", "1. tekbir: \"Tebârekesmüke\" eklenir / 3. tekbir: Tahiyyat okunur", "1. tekbir: \"ve celle senâük\" eklenir / 3. tekbir: Cenaze duası okunur"], "answer": "E", "sinav": 3}, {"no": "41", "body": "Kitapta namazları birleştirme (cem) konusu açıklanmıştır.\n\nAşağıdakilerden hangisi cem hakkında verilen bilgilerden biri değildir?", "options": ["Yalnızca öğle ile ikindi birleştirilebilir", "Öğle ile akşam namazı birleştirilebilir", "Sabah namazı hiçbir namazla birleştirilemez", "Namazlar peş peşe ve sırasıyla kılınır", "Yalnızca akşam ile yatsı birleştirilebilir"], "answer": "B", "sinav": 3}, {"no": "42", "body": "Kitapta namazda kıraatin asgari seviyesi hakkında açık bir hüküm verilmiştir. Dil ve dudak kıpırdatmadan sadece zihinden geçirmek konusunda net bir ifade kullanılmıştır.\n\nKitaba göre namazda kıraatin asgari seviyesi aşağıdakilerden hangisidir?", "options": ["Zihinden geçirmek yeterlidir, ses çıkarmak şart değildir", "En az yanındaki kişinin duyacağı sesle okunmalıdır", "Kişinin kendi duyabileceği fısıltı halinde okuması gerekir", "Sesli okumak şarttır, fısıltı halinde okumak geçersizdir", "İmama uyan kişi hiçbir şekilde okumaz, sessiz durur"], "answer": "C", "sinav": 3}, {"no": "43", "body": "Kitapta Hendek Savaşı sırasında harbin şiddetinden dolayı kılınamayan bir vakit namazı ve yolculukta uyuyakalınarak kaçırılan bir sabah namazı örnek verilmiştir.\n\nHendek Savaşı'nda kılınamayan namaz ve ne zaman kaza edildiği aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Öğle namazı — akşam namazından önce kaza edilmiş", "Cuma namazı — ertesi gün kaza edilmiş", "Sabah namazı — öğle namazından önce kaza edilmiş", "Akşam namazı — yatsı namazından sonra kaza edilmiş", "İkindi namazı — akşam ile yatsı arasında kaza edilmiş"], "answer": "E", "sinav": 3}, {"no": "44", "body": "Kitapta namazda dua ve sûreleri okurken sesin durumu hakkında şu bilgi verilmiştir: Dil ve dudak kıpırdatmadan sadece zihinden geçirmek geçerli değildir.\n\nNamezda kıraatin geçerli olması için gereken asgari ses seviyesi aşağıdakilerden hangisidir?", "options": ["Çevredekilerin duyabileceği yüksek sesle", "Tamamen sessiz", "Kişinin kendi duyabileceği fısıltı halinde", "İmamın duyabileceği sesle", "Mümkün olan en yüksek sesle"], "answer": "C", "sinav": 3}, {"no": "45", "body": "Kitapta namazda oje ve ruj gibi maddelerin abdeste etkisi açıklanmıştır.\n\nKitaba göre bu konudaki hüküm aşağıdakilerden hangisidir?", "options": ["Oje ve ruj abdeste engel değildir, doğrudan namaz kılınabilir", "Yalnızca oje abdeste engeldir, ruj ise engel değildir", "Suyun deriye ulaşmasına engel olduğu için abdest ve gusülden önce giderilmelidir", "Yalnızca gusülde engel olur, normal abdestte sorun oluşturmaz", "Meslek gereği sürülen kozmetik ürünleri muaf tutulmuştur"], "answer": "C", "sinav": 3}, {"no": "46", "body": "Kitapta pijamayla namaz kılmanın hükmü açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Pijamayla namaz kılmak caiz değildir, namaz bozulur", "Pijamayla namaz kılmak adaba uygun olmasa da setr-i avret şartlarını taşıyorsa sahihtir", "Pijamayla yalnızca gece namazı kılınabilir", "Pijamayla namaz kılmak her durumda caizdir", "Pijamayla yalnızca nafile namaz kılınabilir"], "answer": "B", "sinav": 3}, {"no": "47", "body": "Kitapta üzerinde insan veya hayvan resimleri olan kıyafetlerle namaz kılmanın hükmü anlatılmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Ezan İslam'ın şiârıdır; abdest namazın şiârıdır — bilinç sıçraması vesilesi", "Ezan cemaatin şiârıdır; abdest orucun şiârıdır — arınma vesilesidir", "Ezan mescidlerin şiârıdır; abdest haccın şiârıdır — ibadet simgeleridir", "Ezan Cuma'nın şiârıdır; abdest zekatın şiârıdır — sosyal ibadet sembolü", "Ezan ilmin şiârıdır; abdest cihadın şiârıdır — İslam'ın dış yüzüdür"], "answer": "B", "sinav": 3}, {"no": "48", "body": "Kitapta oje, ruj gibi maddelerin abdeste etkisi açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Namazın cesedi = dış şartlar ve şekil; namazın ruhu = huşu ve kalp huzuru", "Namazın cesedi = kıyam ve rükû; namazın ruhu = secde ve tahiyyât", "Namazın cesedi = Fâtiha okumak; namazın ruhu = dua ve niyaz etmek", "Namazın cesedi = abdest almak; namazın ruhu = Kur'ân okumak", "Namazın cesedi = cemaatle kılmak; namazın ruhu = tek başına kılmak"], "answer": "D", "sinav": 3}, {"no": "49", "body": "Kitapta Hz. Peygamber'in \"Melekler, içerisinde köpek ve resim/heykel bulunan eve girmezler\" hadisi aktarılmıştır.\n\nKitaba göre bu hadisin kapsamı ve namaz kılınan ortamdaki fotoğrafların durumu hakkında aşağıdakilerden hangisi doğrudur?", "options": ["Kıyamda kararlılık ve duruş; rükûda aczini itiraf; secdede tam teslimiyet", "Kıyamda korku; rükûda ümit; secdede sevgi ifade edilir", "Kıyamda şükür; rükûda tesbih; secdede hamd ifade edilir", "Kıyamda zikir; rükûda tefekkür; secdede murakabe ifade edilir", "Kıyamda istiğfar; rükûda tövbe; secdede af dileme ifade edilir"], "answer": "A", "sinav": 3}, {"no": "50", "body": "Kitapta namazın psikolojisi bölümünde namazın şekli yönünün anlamları açıklanmıştır: Ayakta durma (kıyam) Allah'ın huzurunda saygıyla durmayı, öne eğilme (rükû) saygının ileri aşamasını, alnı yere koyma (secde) saygının son noktasını ifade eder.\n\nNamezda Allah'ın en çok tekrar ettirdiği söz ve bunun insanın hayatına yansıtılması gereken anlamı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Meryem 19/59: Namazı zayi eden nesil geldi, şehvetlere uydular", "Bakara 2/45: Sabır ve namazla Allah'tan yardım isteyin", "Nisâ 4/142: Münafıklar namaza tembel tembel kalkarlar", "Mâûn 107/4-5: Yazıklar olsun o namaz kılanlara ki gafildirler", "Ankebût 29/45: Namaz insanı hayâsızlıktan ve kötülükten alıkoyar"], "answer": "C", "sinav": 3}, {"no": "51", "body": "Kitapta namazın psikolojik boyutunda üstünlük ve aşağılık duygularının dengelenmesi ele alınmıştır. Namazda tekrarlanan belirli bir ifadenin bu dengelemeyi sağladığı belirtilmiştir.\n\nBu dengeyi sağlayan ifade ve mekanizması aşağıdakilerden hangisidir?", "options": ["Sübhânallah ifadesi — Allah'ın yüceliğini hatırlatarak tevazuyu artırır", "Elhamdülillâh ifadesi — şükür duygusuyla kanaati güçlendirir", "Allâh-u Ekber ifadesi — büyüklüğü yalnız Allah'a vererek kibri kırar, acziyetle ezikliği giderir", "Estağfirullah ifadesi — günahkârlık duygusunu hafifletir", "Lâ ilâhe illallâh ifadesi — yalnızlık duygusunu giderir"], "answer": "C", "sinav": 3}, {"no": "52", "body": "Kitapta namazın merhamet duygusuyla yakın ilişkisi anlatılmıştır. İnsanın günlük hayatta kızgınlık ve nefret gibi olumsuz duygulara kapılması durumunda namaz devreye girer.\n\nNamezda okunan hangi kelimelerin rahmet ve merhameti vurgulayan anlamları insanı merhametli olmaya ittiği belirtilmiştir?", "options": ["Allâh-u Ekber ve Sübhânallah", "Rahmân ve Rahîm", "Lâ ilâhe illallâh", "Semiallahu limen hamideh", "Rabbena lekel hamd"], "answer": "B", "sinav": 3}, {"no": "53", "body": "Kitapta camide zengin-fakir, amir-memur, işçi-işveren, öğretmen-öğrenci gibi toplumun her kesiminden insanın aynı safta omuz omuza namaz kılmasının psikolojik etkisi açıklanmıştır.\n\nBu etkinin sonucu aşağıdakilerden hangisidir?", "options": ["Müslüman gününü şafağın parıltıları ve akşamın ziyaları tayin etmeli", "Namaz vakitleri takvimle değil güneşin hareketleriyle belirlenmelidir", "İslam'da zaman bilinci ancak felsefe ile anlaşılabilir", "Müslüman günü yalnızca öğle namazı ile ikiye bölünmelidir", "Vakit namazı yerine toplu ibadet daha verimli ve faydalıdır"], "answer": "A", "sinav": 3}, {"no": "54", "body": "Kitapta Hz. Peygamber'in son hastalığında namaz kıldırma görevini kime verdiği ve kendisinin nasıl namaz kıldığı anlatılmıştır.\n\nBu konuda kitaptaki bilgi aşağıdakilerden hangisidir?", "options": ["Hz. Ömer'i imam tayin etmiş, kendisi ayakta cemaate katılmıştır", "Hz. Ali'yi imam tayin etmiş, kendisi hiç namaza katılamamıştır", "Hz. Ebu Bekir'i imam tayin etmiş, kendisi oturarak cemaate katılmıştır", "Hz. Osman'ı imam tayin etmiş, kendisi yataktan takip etmiştir", "Kimseyi tayin etmemiş, son nefesine kadar kendisi kıldırmıştır"], "answer": "C", "sinav": 3}, {"no": "55", "body": "Kitapta Arş'ın gölgesinde barınacak yedi gruptan bahsedilmiş ve bunlardan birinin gençlikle ilgili olduğu belirtilmiştir.\n\nBu hadiste gençlikle ilgili grup aşağıdakilerden hangisidir?", "options": ["Gençliğinde çok sadaka veren genç — cömertlikle tanınmıştır", "Gençliğinde ilim öğrenen genç — alim olarak yetişmiştir", "Allah'a ibadet ederek yetişen genç — ibadet alışkanlığı kazanmıştır", "Gençliğinde cihat eden genç — kahramanlığıyla bilinmiştir", "Gençliğinde hicret eden genç — fedakarlığıyla tanınmıştır"], "answer": "C", "sinav": 3}, {"no": "56", "body": "Kitapta teravih namazının cemaatle kılınması konusu anlatılmıştır. Hz. Peygamber teravih namazını birkaç defa cemaate kıldırmıştır.\n\nTeravihin düzenli olarak cemaatle kılınmaya başlandığı dönem aşağıdakilerden hangisidir?", "options": ["Hz. Peygamber dönemi", "Hz. Ebu Bekir dönemi", "Hz. Ali dönemi", "Hz. Osman dönemi", "Hz. Ömer dönemi"], "answer": "E", "sinav": 3}, {"no": "57", "body": "Kitapta sabah namazının vakti konusunda Hanefî âlimlerin görüşü ve Cebrâil'in Peygamberimize iki gün kıldırması aktarılmıştır. Cebrâil bir gün fecrin ağarmasıyla, diğer gün güneş doğmadan önce sabah namazını kıldırmış ve \"Namaz vakti bu iki an arasındadır\" demiştir.\n\nHanefî âlimlerin sabah namazı için tercih ettiği vakit aşağıdakilerden hangisidir?", "options": ["Fecrin ağarmasıyla hemen kılınması", "İmsak vaktinden önce kılınması", "Güneş doğduktan sonra kılınması", "Güneş yükselmeye yakın (isfar vakti) kılınması", "Öğleye kadar ertelenebilmesi"], "answer": "D", "sinav": 3}, {"no": "58", "body": "Kitapta Hendek Savaşı'nda harbin şiddetinden dolayı bir vakit namazın kılınamadığı ve sonradan kaza edildiği anlatılmıştır.\n\nKazaya kalan namaz ve kaza edildiği vakit aşağıdakilerden hangisidir?", "options": ["Sabah namazı — öğle vaktinde kaza edilmiştir", "Öğle namazı — ikindi vaktinde kaza edilmiştir", "İkindi namazı — akşam ile yatsı arasında kaza edilmiştir", "Akşam namazı — yatsı vaktinde kaza edilmiştir", "Yatsı namazı — sabah vaktinde kaza edilmiştir"], "answer": "C", "sinav": 3}, {"no": "59", "body": "Kitapta cenaze namazının diğer namazlardan farklı özellikleri anlatılmıştır. Secdesiz ve rükûsuz olarak kılınan bu namazda her tekbirde farklı dualar okunur.\n\nCenaze namazı kaç tekbirle kılınır ve hükmü nedir?", "options": ["3 tekbirle kılınır — Farz-ı aynîdir, her Müslüman kılmak zorundadır", "5 tekbirle kılınır — Vâciptir, kılınmazsa günah olur ama küfür değildir", "4 tekbirle kılınır — Farz-ı kifâyedir, bir grup kılarsa diğerlerinden düşer", "2 tekbirle kılınır — Sünnettir, kılınması sevaptır ama zorunlu değildir", "6 tekbirle kılınır — Müstehaptır, kılınması tavsiye edilir"], "answer": "C", "sinav": 3}, {"no": "60", "body": "Kitapta intihar eden kişinin cenaze namazının kılınıp kılınmayacağı konusu ele alınmıştır. İslam'da hayat Allah'ın emaneti olarak kabul edilir ve kendi hayatına son vermek büyük günahtır.\n\nKitaba göre intihar eden kişinin cenaze namazının durumu ve gerekçesi aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kur'ân sırasına göre okumak uygun; en az iki sûre atlayarak devam edilir", "Sıra farzdır; aksi hâlde namaz bozulur ve iade edilmesi gerekir", "Sûrelerin sırası önemsizdir; herhangi bir sırayla okunabilir", "Yalnızca farz namazlarda sıra gözetilir; nafile namazlarda aranmaz", "Sûreler tersten okunmalıdır; son sûreden başa doğru gidilir"], "answer": "B", "sinav": 3}, {"no": "1", "body": "Kitapta insanın dünyaya geldiğinde aklına gelen dört temel soru Kur'ân'ın dört esasıyla eşleştirilmiştir. \"Bizi buraya kim getirdi?\" sorusu tevhid, \"Niçin getirdi?\" sorusu ibadet ve adalet, \"Nereye gidiyoruz?\" sorusu haşir hakikatiyle açıklanmıştır.\n\nDördüncü soru olan \"Bu soruların cevabını kimden öğreneceğiz?\" sorusunun karşılığı olan Kur'ân esası aşağıdakilerden hangisidir?", "options": ["Tevhid hakikati — Allah'ın varlığını ve birliğini kabul etmek", "Haşir hakikati — öldükten sonra diriliş inancı", "İbadet ve adalet hakikati — kulluğun çerçevesini belirleyen ilke", "Kader hakikati — her şeyin Allah'ın takdiriyle olduğu inancı", "Nübüvvet hakikati — soruların cevabını ancak peygamberlerin anlatacağı"], "answer": "E", "sinav": 4}, {"no": "2", "body": "Kitapta Tolstoy'un hayat arayışı anlatılırken, felsefeye ve bilime başvurduğu, onların \"Bu soruların cevabı yok\" dediği aktarılmıştır. Tolstoy üç yıl süren bir bunalım yaşamış ve nihayetinde bu halden kurtulmuştur.\n\nTolstoy'un bu bunalımdan kurtuluş yolu aşağıdakilerden hangisidir?", "options": ["Yeni bir felsefe akımı keşfetmesi", "Allah'a inanarak iç huzura kavuşması", "Bilimsel araştırmalarda başarı elde etmesi", "Edebiyata yönelerek kendini ifade etmesi", "Bir terapistten profesyonel yardım alması"], "answer": "B", "sinav": 4}, {"no": "3", "body": "Kitapta varlıkların tesbihi konusunda âlimlerin iki görüşü aktarılmıştır. Birinci görüşe göre varlıklar kendilerine mahsus bir hayat ve şuurla tesbih ederler. İkinci görüşe göre ise lisan-ı hal ile, yani yaptıkları fiillerle Allah'ın yüceliğini ifade ederler.\n\nKitapta bu iki görüşün birleştirilmesinin en güzel yol olduğu söylenmiş ve delil olarak bir ayet parçası gösterilmiştir. Bu delil aşağıdakilerden hangisidir?", "options": ["\"Her şey O'nu hamd ile tesbih eder\" — varlıkların aktif tesbihi", "\"Göklerde bulunanlar Allah'a secde ederler\" — evrensel secde", "\"Bitkiler ve ağaçlar secde ederler\" — bitkilerin boyun eğmesi", "\"Hepsi duasını ve tesbihini bilmektedir\" — bilinçli tesbih", "\"Fakat siz onların tesbihini anlamazsınız\" — insanın kavrayış sınırı"], "answer": "E", "sinav": 4}, {"no": "4", "body": "Kitapta kâinatın \"şükür üreten bir fabrika\"ya benzetildiği bölümde iç içe daireler modeli sunulmuştur. Cansız varlıklar bir daire oluşturmuş ve merkezine hayat konulmuştur. Bitkiler bir daire oluşturmuş ve merkezine hayvanlar ve insanlar konulmuştur.\n\nBu modelde hayvanlar ve insanların oluşturduğu dairenin merkezine konulan kavram ve onun etrafında dönen nihai ürün aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Merkez: Rızık — Nihai ürün: Şükür", "Merkez: İlim — Nihai ürün: Hikmet", "Merkez: İman — Nihai ürün: İbadet", "Merkez: Hayat — Nihai ürün: Tefekkür", "Merkez: İnsan — Nihai ürün: Medeniyet"], "answer": "A", "sinav": 4}, {"no": "5", "body": "Kitapta Kur'ân'ın namaz için \"kılmak\" yerine farklı bir ifade kullandığı belirtilmiştir. Bu ifadenin huşu ile dosdoğru kılınma ve titizlikle devam etme anlamlarını içerdiği açıklanmıştır.\n\nBu ifade aşağıdakilerden hangisidir?", "options": ["Namazı eda etmek — borcunu ödemek anlamında kullanılmıştır", "Namazı ikame etmek — ayağa kaldırmak, hakkıyla yerine getirmek", "Namazı ifa etmek — görevini tamamlamak anlamında kullanılmıştır", "Namazı hıfz etmek — korumak ve muhafaza etmek anlamındadır", "Namazı kaza etmek — geçen namazı telafi etmek anlamındadır"], "answer": "B", "sinav": 4}, {"no": "6", "body": "Kitapta şükrün beş farklı tanımı verilmiştir. Bunlardan dördü: iyilik yapana övgüde bulunmak, nimetin karşılığında dil/el/kalple mukabele, Allah'a isyanı terk etmek ve nimeti O'nun rızasına uygun kullanmak şeklindedir.\n\nBeşinci ve \"hakiki şükür\" olarak nitelendirilen tanım aşağıdakilerden hangisidir?", "options": ["İnsanın şükürden aciz olduğunu bilmesi", "Her nimete ayrı ayrı hamd etmek", "Allah'ın nimetlerini başkalarıyla paylaşmak", "Nimetleri saymaya çalışmak", "Her gün belirli sayıda tesbih çekmek"], "answer": "A", "sinav": 4}, {"no": "7", "body": "Kitapta Hz. Fatıma'nın Peygamberimize ekmek getirdiği rivayet aktarılmıştır. Peygamberimiz bu ekmeği yediğinde açlık süresi hakkında bilgi vermiştir.\n\nPeygamberimizin bu ekmeği yemeden önce ne kadar süredir aç olduğu kitapta nasıl belirtilmiştir?", "options": ["Bir gündür ağzına giren ilk yiyecek olarak belirtilmiştir", "İki gündür ağzına giren ilk yiyecek olarak belirtilmiştir", "Beş gündür ağzına giren ilk yiyecek olarak belirtilmiştir", "Bir haftadır ağzına giren ilk yiyecek olarak belirtilmiştir", "Üç gündür ağzına giren ilk yiyecek olarak belirtilmiştir"], "answer": "E", "sinav": 4}, {"no": "8", "body": "Kitapta Enes b. Mâlik'ten aktarılan rivayette Peygamberimizin sofrası hakkında önemli bir bilgi verilmiştir.\n\nBu rivayet aşağıdakilerden hangisidir?", "options": ["Peygamberimiz her gün mutlaka taze ekmek yerdi", "Peygamberimiz elekten geçirilmiş un görmedi", "Peygamberimiz yalnızca arpa ekmeği yerdi", "Peygamberimiz günde yalnızca bir öğün yemek yerdi", "Peygamberimiz asla et yemezdi"], "answer": "B", "sinav": 4}, {"no": "9", "body": "Kitapta Hz. Âişe'nin aktardığı bir rivayette Medine'deki ev hayatının sadeliği anlatılmıştır. Bu rivayette ateş yakılmadığı süre ve beslenme şekli belirtilmiştir.\n\nHz. Âişe'nin rivayetine göre kaç ay ateş yakılmamış ve ne ile beslenilmiştir?", "options": ["1 ay ateş yakılmamış, yalnızca ekmek ve su ile beslenilmiştir", "2 ay ateş yakılmamış, hurma ve su ile beslenilmiştir", "3 ay ateş yakılmamış, arpa ve süt ile beslenilmiştir", "6 ay ateş yakılmamış, kuru ekmek ve zeytin ile beslenilmiştir", "1 yıl ateş yakılmamış, yalnızca hurma ile beslenilmiştir"], "answer": "B", "sinav": 4}, {"no": "10", "body": "Kitapta insanların ibadet etme sebepleri üç grupta açıklanmıştır. Her grup farklı bir motivasyonla ibadet eder.\n\nAşağıdakilerden hangisi kitapta belirtilen üç ibadet sebebinden biri değildir?", "options": ["Toplumsal statü kazanmak — çevrede saygın biri olarak tanınmak", "Ahiret korkusu — cehennemden korunmak ve cenneti kazanmak", "Nimetlere şükretmek — Allah'ın verdiği nimetlerin karşılığını ödemek", "Allah'ın azametine hayran olmak — yaratan zata kulluk bilinci", "Bazıları bu üç sebebi birleştirir ve hepsini bir arada yaşar"], "answer": "A", "sinav": 4}, {"no": "11", "body": "Kitapta mutasavvıfların insanı \"kâinatın küçültülmüş şekli\" (misal-i musaggarı) olarak kabul ettiği ve insandaki unsurların farklı varlıkları temsil ettiği anlatılmıştır: kemikler cansız varlıkları, hücreler bitkileri, nefsanî arzular hayvanları, güzel hasletler melekleri temsil eder.\n\nBu modelde gurur ve kibir gibi hasletlerin temsil ettiği varlık aşağıdakilerden hangisidir?", "options": ["Şeytan — çünkü kibir İblisin isyanının temelidir", "Hayvanlar — çünkü nefsanî arzular hayvani özelliklerdir", "Cansız varlıklar — çünkü kibir insanı katılaştırır", "Melekler — çünkü kibir güç işaretidir", "Bitkiler — çünkü kibir büyümeyi simgeler"], "answer": "A", "sinav": 4}, {"no": "12", "body": "Kitapta modern verimlilik yaklaşımlarının iki-üç saatte bir kısa molalar (mikro-aralar) önerdiği belirtilmiş ve İslam'ın bu ritmi asırlardır beş vakit namazla sunduğu vurgulanmıştır. Nörobilimsel araştırmalara atıfla namazın stres hormonu kortizolü düşürdüğü, şükür temelli duaların serotonin ve dopamin salınımını artırdığı aktarılmıştır.\n\nBu bilgiler ışığında kitapta namazın aynı anda yerine getirdiği üç işlev aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Tüccar ve hırsız kıssası — dört rekât namaz ve Ya Vedûd duası", "Hz. İbrahim'in ateşe atılması — namaz kılarak ateşin serin olması", "Hz. Musa'nın denizi yarması — namazla denizin ikiye ayrılması", "Hz. Yunus'un balığın karnı — tesbih ile balıktan kurtulma", "Hz. Peygamber'in hicreti — mağarada namaz kılarak korunma"], "answer": "D", "sinav": 4}, {"no": "13", "body": "Kitapta Dr. Laurence Brown'ın İslam'a geçiş hikâyesi anlatılmıştır. Ateist bir göz doktoru olan Brown'ın hayatını değiştiren olay kızının hastalığıyla ilgilidir.\n\nKızının hastalığı ve Brown'ın dönüşümü aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kızı beyin tümörü geçirmiş, ameliyat sonrası iyileşince araştırmaya başlamıştır", "Kızı doğuştan görme engelli doğmuş, mucizevi şekilde görmeye başlamıştır", "Kızı trafik kazası geçirmiş, komadan mucizevi uyanış sonrası iman etmiştir", "Kızı lösemi teşhisi almış, tedavi sürecinde manevi arayışa girmiştir", "Kızı aort koarktasyonu geçirmiş, duadan sonra iyileşince tüm dinleri araştırmıştır"], "answer": "E", "sinav": 4}, {"no": "14", "body": "Kitapta tüccar ve hırsız kıssası anlatılmıştır. Bir tüccar hırsızlar tarafından tehdit edildiğinde belirli bir ibadet ve dua ile kurtulmuştur.\n\nTüccarın yaptığı ibadet ve okuduğu dua aşağıdakilerden hangisidir?", "options": ["İki rekât namaz kılmış ve Ya Rahmân diyerek dua etmiştir", "Üç rekât namaz kılmış ve Ya Hafîz diyerek dua etmiştir", "Beş rekât namaz kılmış ve Ya Selâm diyerek dua etmiştir", "Dört rekât namaz kılmış ve Ya Vedûd diyerek üç kere dua etmiştir", "Bir rekât namaz kılmış ve Ya Latîf diyerek yedi kere dua etmiştir"], "answer": "D", "sinav": 4}, {"no": "15", "body": "Kitapta ezanın ortaya çıkışı anlatılırken istişare toplantısında reddedilen yöntemler ve sebepleri aktarılmıştır. Çan, boru ve ateş yakma teklif edilmiş, Peygamberimiz bunları reddetmiştir.\n\nBu yöntemlerin reddi, Hz. Ömer'in teklifi ve nihai çözüm aşağıdakilerden hangisinde doğru kronolojik sırayla verilmiştir?", "options": ["Parmağını denize batırıp çıkar, dünya ahirete göre o kadardır", "Dünya bir damla su, ahiret uçsuz bucaksız bir okyanustur", "Dünya bir gölge gibidir, güneş battığında hiçbir şey kalmaz", "Dünya bir rüya gibidir, uyandığında her şey yok olup gider", "Dünya bir köprüdür, üzerinde durma, bir an önce geçip git"], "answer": "E", "sinav": 4}, {"no": "16", "body": "Kitapta İmam Gazali'nin namaz için taharete ilişkin üç temizlik katmanı sıralanmıştır. Bu katmanlar dıştan içe birbirini kuşatmaktadır. Ayrıca abdestin \"şirk fiil ve sıfat günahlarından temizlenmenin sembolü\" olduğu ifade edilmiştir.\n\nÜç temizlik katmanının dıştan içe doğru sıralaması ve kitaptaki \"Ezan İslam'ın şiârı olduğu gibi abdest de namazın şiârıdır\" ifadesindeki şiâr tanımı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kalp-Beden-Elbise — Şiâr: Allah'ın emri olan farz", "Beden-Elbise-Kalp — Şiâr: İslam'ın temel ibadeti", "Kalp-Elbise-Beden — Şiâr: Peygamberimizin sünneti olan uygulama", "Elbise-Kalp-Beden — Şiâr: Toplumu birleştiren sembol", "Elbise-Beden-Kalp — Şiâr: Kulu şuur ve tefekküre yönlendiren, bilinç sıçramasına vesile olan simge"], "answer": "E", "sinav": 4}, {"no": "17", "body": "Kitapta namazdan sonra selam vermenin anlamı açıklanmıştır. Bu hareketin sembolik bir geçişi ifade ettiği belirtilmiştir.\n\nKitaba göre namazdaki selam neyi ifade eder?", "options": ["Namazın bittiğini çevredekilere duyurmayı ifade eder", "Sağ ve soldaki meleklere selam vermeyi ifade eder", "Cemaatteki diğer Müslümanlarla kardeşliği ifade eder", "Semadan yere, miraçtan kulluğa nüzulü (inişi) ifade eder", "Dünya hayatına dönüşü ve günlük işlere başlamayı ifade eder"], "answer": "D", "sinav": 4}, {"no": "18", "body": "Kitapta İblisin isyanının temeli kibir olarak açıklanmış ve insanı da aynı tuzağa düşürmeye çalıştığı anlatılmıştır. Hz. Yusuf \"Nefsimi tebrie etmem\" demiş, Hz. Yunus \"Seni tesbih ederim, ben zalimlerden oldum\" demiştir.\n\nBu iki peygamberin ortak tavrı ve Peygamberimizin bu konudaki duası aşağıdakilerden hangisinde doğru eşleştirilmiştir?", "options": ["Ortak tavır: Nefsini kusursuz görmeyip Allah'a sığınmaları — Dua: \"Allah'ım beni bir an nefsimle başbaşa bırakma\"", "Ortak tavır: Mucize göstermeleri — Dua: \"Allah'ım bana güç ver\"", "Ortak tavır: Kavimlerinden kaçmaları — Dua: \"Allah'ım beni affet\"", "Ortak tavır: Sabırla beklemeleri — Dua: \"Allah'ım bana sabır ver\"", "Ortak tavır: Tövbe etmeleri — Dua: \"Allah'ım tövbemi kabul et\""], "answer": "A", "sinav": 4}, {"no": "19", "body": "Kitapta Fâtiha sûresinin önemi anlatılırken Hasan-ı Basrî'den bir rivayet aktarılmıştır. Bu rivayette kutsal kitaplar arasında bir sıralama yapılmıştır.\n\nBu sıralama aşağıdakilerden hangisidir?", "options": ["104 kitabın özü 4 kitap, 4 kitabın özü Kur'ân büyük sûreleri, onların özü Fâtiha", "4 kitabın özü Kur'ân, Kur'ân'ın özü Bakara, Bakara'nın özü Âyetü'l-kürsî", "4 kitabın özü Kur'ân, Kur'ân'ın özü Yâsîn, Yâsîn'in özü Bismillah", "4 kitabın özü Kur'ân, Kur'ân'ın özü Mülk sûresi, Mülk'ün özü ilk âyet", "4 kitabın özü Kur'ân, Kur'ân'ın özü İhlâs, İhlâs'ın özü tevhid"], "answer": "A", "sinav": 4}, {"no": "20", "body": "Kitapta Şuayb (as)'ın kavmini ölçü ve tartıda doğruluğa çağırdığı, kavminin ise \"Sana namazın mı emrediyor bunları?\" diye itiraz ettiği anlatılmıştır. Ardından Hûd sûresinin 114. ayeti aktarılmıştır: \"Gündüzün iki tarafında ve gecenin gündüze yakın saatlerinde namaz kıl! Çünkü iyilikler, kötülükleri giderir.\"\n\nBu kıssa ve ayet birlikte kitapta hangi sonuca varmak için kullanılmıştır?", "options": ["Cennetin anahtarıdır; ahirette ilk sorulacak ameldir (Tirmizî)", "Günahların kefâretidir; ahirette son sorulacak amel olarak geçer", "Müminin kalkanıdır; dünyada her beladan korur", "İmanın en büyük göstergesidir; terk eden kâfir olur", "Cennet nimetlerinden biridir; dünyada karşılığı yoktur"], "answer": "E", "sinav": 4}, {"no": "21", "body": "Kitapta Miraç hadisinde Peygamberimizin semaya yükselirken duyduğu bir ses tasvir edilmiştir. Bu tasvir namazın Allah katındaki değerini gösteren önemli bir detaydır.\n\nPeygamberimizin Miraç'ta duyduğu ses aşağıdakilerden hangisidir?", "options": ["Kalem seslerini duyacak seviyeye çıkarılmıştır — yazgının yazıldığı yer", "Cebrail'in kanat sesleri — yükselirken rehberlik etmiştir", "Meleklerin tesbih sesleri — her semada farklı zikirler duyulmuştur", "Arş'ın uğultusu — Allah'ın azametinin fiziksel tezahürüdür", "Levh-i Mahfuz'un sesi — kaderin kaydedildiği yerin sesi"], "answer": "A", "sinav": 4}, {"no": "22", "body": "Kitapta \"Amellerin en faziletlisi vaktinde kılınan namazdır\" hadisi aktarılmış ve namazın vaktinde kılınmasının önemi vurgulanmıştır.\n\nBu hadisin kitaptaki kaynağı aşağıdakilerden hangisidir?", "options": ["Müslim, Salât, 42 — namazın fazileti babında geçmektedir", "Tirmizî, Kıyamet, 25 — ahiret babında geçmektedir", "Buhârî, Edeb, 1 — edep ve ahlak babında geçmektedir", "Ahmed b. Hanbel, Müsned — namazın fazileti babında geçer", "Ebû Dâvûd, Salât, 134 — namaz babında geçmektedir"], "answer": "C", "sinav": 4}, {"no": "23", "body": "Kitapta namazda el bağlamanın sembolik anlamı açıklanmıştır.\n\nKitaba göre namazda el bağlamak neyi ifade eder?", "options": ["Dünyevi meşguliyetlerden sıyrılmayı ve odaklanmayı ifade eder", "Meleklerin huzurunda saygılı durmayı ifade eder", "Allah'a teslimiyetin ve O'nun emir ve yasaklarına itaatin ifadesidir", "Namaz kılanın dış dünyadan koptuğunu gösterir", "Kıbleye yönelmenin bedensel tamamlayıcısıdır"], "answer": "C", "sinav": 4}, {"no": "24", "body": "Kitapta İmam Gazâlî'nin taharet (temizlik) konusundaki üç katmanlı yaklaşımı aktarılmıştır.\n\nBu üç katman aşağıdakilerden hangisidir?", "options": ["Beden temizliği — Elbise temizliği — Mekân temizliği sıralamasıdır", "Elbise temizliği — Beden temizliği — Kalp temizliği sıralamasıdır", "Niyet temizliği — Amel temizliği — Kalp temizliği sıralamasıdır", "Ruh temizliği — Akıl temizliği — Nefis temizliği sıralamasıdır", "Dil temizliği — Göz temizliği — Kulak temizliği sıralamasıdır"], "answer": "B", "sinav": 4}, {"no": "25", "body": "Kitapta namazda kıraat anının özel anlamı bir hadisle açıklanmıştır. Namazda Kur'ân okumanın kulun Rabbiyle özel bir iletişimi olduğu vurgulanmıştır.\n\nBu hadis aşağıdakilerden hangisidir?", "options": ["Namazda kıraat meleklerin kulağına ulaşır ve onlar da dinler", "Namazda kıraat kalbi temizler ve günahları siler", "Namazda kıraat kulun Rabbiyle özel konuşmasıdır (Buhârî, Salât, 36)", "Namazda kıraat cennetin kapılarını açan anahtardır", "Namazda kıraat kişiyi cehennemden koruyan kalkan gibidir"], "answer": "C", "sinav": 4}, {"no": "26", "body": "Kitapta namazın dışındaki farzlar (şartlar) altı madde olarak, içindeki farzlar (rükünler) da altı madde olarak sıralanmıştır. \"Niyet\" dışarıdaki farzlardan, \"kıraat\" ise içerideki farzlardandır.\n\nAşağıdakilerden hangisinde bir dışarıdaki farz ile bir içerideki farz doğru olarak eşleştirilmiştir?", "options": ["Dışarıdaki: İftitah tekbiri — İçerideki: Niyet", "Dışarıdaki: Ka'de-i ahire — İçerideki: Hadesten taharet", "Dışarıdaki: Kıraat — İçerideki: Vakit", "Dışarıdaki: Rükû — İçerideki: İstikbâl-i kıble", "Dışarıdaki: Setr-i avret — İçerideki: Kıyam"], "answer": "E", "sinav": 4}, {"no": "27", "body": "Kitapta Sübhâneke duasının namazdaki iki önemli işlevi açıklanmıştır: Birincisi emmâre nefse karşı ilk darbeyi vurmak, ikincisi mâsivâyı arkada bırakarak kesretten vahdete yol bulmak.\n\nKitaba göre Sübhâneke duasının özü aşağıdakilerden hangisidir?", "options": ["Allah'a hamd ederek namazın başlangıcını ilan etmektir", "Günahlardan tövbe ederek temiz bir başlangıç yapmaktır", "Sübhan olanın 'ben' değil 'O' olduğunu ikrar etmektir", "Meleklere selam vererek onların şahitliğini istemektir", "Namazdaki konsantrasyonu sağlamak için zihni hazırlamaktır"], "answer": "D", "sinav": 4}, {"no": "28", "body": "Kitapta sabah ezanında \"Hayye ale'l-felâh\" cümlesinden sonra eklenen ilave cümle ve bu ilavenin kametteki durumu açıklanmıştır.\n\nBu ilave cümle, kametteki durumu ve ezan dinlerken bu cümleye karşılık söylenmesi gereken ifade aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İlave: \"es-Salâtü hayrun mine'n-nevm\" — Kamette okunmaz — Karşılık: \"Sadakte ve berirte\"", "İlave: \"Kad kâmeti's-salâh\" — Kamette okunur — Karşılık: \"Allâh-u ekber\"", "İlave: \"Lâ ilâhe illallâh\" — Kamette de okunur — Karşılık: \"Sübhânallah\"", "İlave: \"Allâh-u ekber\" — Kamette okunur — Karşılık: \"Elhamdülillâh\"", "İlave: \"es-Salâtü hayrun mine'n-nevm\" — Kamette de okunur — Karşılık: \"Lâ havle velâ kuvvete illâ billâh\""], "answer": "A", "sinav": 4}, {"no": "29", "body": "Kitapta pijamayla namaz kılmanın hükmü açıklanmıştır.\n\nBuna göre doğru olan aşağıdakilerden hangisidir?", "options": ["Pijamayla namaz kılmak caiz değildir, namaz kesinlikle bozulur", "Pijamayla namaz adaba uygun olmasa da setr-i avret şartlarını taşıyorsa sahihtir", "Pijamayla yalnızca gece namazı kılınabilir, gündüz namazı kılınamaz", "Pijamayla namaz kılmak her durumda caizdir, hiçbir sakıncası yoktur", "Pijamayla yalnızca nafile namaz kılınabilir, farz namaz kılınamaz"], "answer": "B", "sinav": 4}, {"no": "30", "body": "Kitapta namazın farz olan çeşitleri aynî ve kifâî olarak ikiye ayrılmıştır.\n\nAşağıdakilerden hangisi farz-ı kifâye olan namazdır?", "options": ["Beş vakit namaz — her Müslümanın bizzat kılması farzdır", "Cuma namazı — şartları taşıyan her erkek Müslümana farzdır", "Vitir namazı — vâcip hükmündedir, farz değildir", "Cenaze namazı — bir grup kılarsa diğerlerinden sorumluluk düşer", "Bayram namazı — vâcip hükmündedir, farz değildir"], "answer": "D", "sinav": 4}, {"no": "31", "body": "Kitapta namazın vâcip çeşitleri li-aynihî ve li-gayrihî olarak ikiye ayrılmıştır.\n\nAşağıdakilerden hangisi vâcip li-gayrihî olan namazdır?", "options": ["Vitir namazı — her gece kılınması vâciptir", "Bayram namazı — yılda iki kez kılınması vâciptir", "Adak namazı — kişinin kendi üzerine aldığı bir yükümlülüktür", "Teravih namazı — Ramazanda kılınması sünnettir", "Kuşluk namazı — nafile bir namazdır, vâcip değildir"], "answer": "C", "sinav": 4}, {"no": "32", "body": "Kitapta namazın nafile çeşitleri revâtib ve regâib olarak ikiye ayrılmıştır. Revâtib farz namazlarla birlikte kılınan sünnetleri, regâib ise belirli zamanlarda kılınan nafile namazları kapsar.\n\nAşağıdakilerden hangisi regâib namazlardan biridir?", "options": ["Sabah namazının sünneti — farz öncesi kılınan iki rekâttır", "Öğle namazının ilk sünneti — farz öncesi kılınan dört rekâttır", "Teheccüd namazı — gece kalkıp kılınan nafile namazdır", "Yatsı namazının son sünneti — farz sonrası kılınan iki rekâttır", "Akşam namazının sünneti — farz sonrası kılınan iki rekâttır"], "answer": "C", "sinav": 4}, {"no": "33", "body": "Kitapta namazın psikolojik boyutunda merhamet duygusunun canlı tutulması ele alınmıştır. Namazda tekrarlanan belirli kavramların merhamet duygusunu güçlendirdiği belirtilmiştir.\n\nBu kavramlar aşağıdakilerden hangisidir?", "options": ["Sübhânallah ve Elhamdülillâh — tesbih ve hamd duyguları merhameti artırır", "Allâh-u Ekber ve Lâ ilâhe illallâh — tekbir ve tevhid merhameti güçlendirir", "Rahmân ve Rahîm — Allah'ın merhamet sıfatlarının namazda tekrarlanması", "Rabb ve Mâlik — Allah'ın sahiplik sıfatlarının hatırlanması", "Hâkim ve Adl — Allah'ın adalet sıfatlarının zikredilmesi"], "answer": "C", "sinav": 4}, {"no": "34", "body": "Kitapta namazın duygusal yönünde sevgi, saygı ve korku duygularının birlikte bulunduğu belirtilmiştir. Ancak buradaki korkunun niteliği özel olarak vurgulanmıştır.\n\nBu korkunun niteliği ve namazda Fatiha'daki \"Rahmân\" ve \"Rahîm\" kelimelerinin canlı tuttuğu duygu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Korku: Cehennem ateşi dehşeti — Canlı tutulan duygu: Endişe", "Korku: Ölüm korkusu — Canlı tutulan duygu: Üzüntü", "Korku: Allah'ın sevgisini ve rızasını kaybetme endişesi — Canlı tutulan duygu: Merhamet", "Korku: Toplumsal dışlanma — Canlı tutulan duygu: Aidiyet", "Korku: Ahiret azabı paniği — Canlı tutulan duygu: Korku"], "answer": "C", "sinav": 4}, {"no": "35", "body": "Kitapta namazın günahkârlık ve suçluluk duygusunu önlediği anlatılmıştır. Mümin namazda okuduğu ayet ve dualarla, namazdan sonra tövbe ve bağışlanma dileyerek Allah'ın kendisini bağışlayacağına inanır.\n\nAynı bölümde camide farklı toplumsal kesimlerin aynı safta namaz kılmasının psikolojik etkisi de açıklanmıştır. Bu etki aşağıdakilerden hangisidir?", "options": ["Kavanoz temsili: önce büyük taşlar (namaz), sonra çakıl-kum-su sığar", "Bardak temsili: önce suyu doldur (namaz), sonra buz eklenebilir", "Çanta temsili: önce kitapları koy (ilim), sonra kalem-defter sığar", "Bahçe temsili: önce ağaçları dik (iman), sonra çiçekler açar", "Sofra temsili: önce ekmeği koy (rızık), sonra diğer yemekler sığar"], "answer": "D", "sinav": 4}, {"no": "36", "body": "Kitapta \"Beni nasıl namaz kılarken gördüyseniz öyle kılın\" hadisi aktarılmış ve Kur'ân ile sünnetin namaz konusundaki rolleri açıklanmıştır.\n\nKur'ân'ın ve sünnetin namaz konusundaki rolleri aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Namaz — Namaz — Namaz — Cihat sırasıyla sorulmuştur (İbn Hibbân)", "Cihat — Namaz — Oruç — Hac sırasıyla en faziletli ibadetler", "İlim — Namaz — Zekât — Oruç sırasıyla en faziletli ameller", "Oruç — Namaz — Hac — Sadaka sırasıyla en sevaplı ameller", "Namaz — Oruç — Hac — Zekât olarak İslam'ın beş şartı sırasıyla"], "answer": "E", "sinav": 4}, {"no": "37", "body": "Kitapta Peygamberimizin namazla ilgili son sözleri aktarılmıştır. Vefatına yakın günlerde ümmetine tekrar tekrar namaz konusunda tembihte bulunmuştur.\n\nBu son sözler aşağıdakilerden hangisidir?", "options": ["Namazlarınızı cemaatle kılın, tek başına kılmayın", "Namazı son vaktine bırakmayın, ilk vaktinde kılın", "Namazda huşûyu muhafaza edin, acele etmeyin", "Namaza devam edin! Namaza, namaza!", "Beş vakit namazı asla terk etmeyin, kazaya bırakmayın"], "answer": "D", "sinav": 4}, {"no": "38", "body": "Kitapta Ebu'd-Derdâ (ra)'dan aktarılan bir söz nimetlerin kapsamı hakkında önemli bir uyarı içermektedir.\n\nBu söz aşağıdakilerden hangisidir?", "options": ["Nimeti gören şükreder, görmeyen nankörlük eder", "Nimeti yalnızca yediği-içtiğinde gören, nimetleri bilmemiş, ameli azalmış, azabı hazırlanmıştır", "Nimeti sayan zengindir, saymayan fakirdir", "Nimeti paylaşan çoğaltır, sakınıp biriktiren kaybeder", "Nimeti kalbiyle hisseden mümindir, görmezden gelen gafil"], "answer": "B", "sinav": 4}, {"no": "39", "body": "Kitapta Hz. Peygamber'in namaz kılış şekli anlatılırken sahâbenin aktardığı önemli bir hadis verilmiştir.\n\nBu hadis aşağıdakilerden hangisidir?", "options": ["Namaz kıyamette ilk sorulacak ameldir", "Namaz cennetin anahtarıdır", "Namaz müminin miracıdır", "Beni nasıl namaz kılarken gördüyseniz öyle kılın", "Namaz dinin direğidir"], "answer": "D", "sinav": 4}, {"no": "40", "body": "Kitapta oje, ruj gibi maddelerin abdeste etkisi açıklanmıştır. Mesleğini icra ederken tırnaklarına boya yapışan boyacı ve çiftçi gibi meslek sahipleri için özel bir ruhsat tanınmıştır.\n\nBu ruhsatın kapsamı ve isteğe bağlı olarak sürülen oje/ruj gibi maddelerin durumu aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Sübhânallah + Elhamdülillâh + Lâ ilâhe illallah + Allâhu ekber okuması yeterlidir", "Sadece Âyetü'l-kürsî okur ve bu yeterli sayılır", "Sessizce kıyamda durur ve hiçbir şey okuması gerekmez", "Türkçe dua okur ve bu kabul edilir", "Yalnızca tekbirleri söyler ve bu yeterli sayılır"], "answer": "B", "sinav": 4}, {"no": "41", "body": "Kitapta müekked sünnet ve gayrimüekked sünnet ayrımı yapılmıştır. Hz. Peygamber müekked sünneti sürekli kılmış ancak bağlayıcı olmadığını göstermek için bazen terk etmiştir.\n\nMüekked sünneti mazeret olmadan terk etmenin hükmü ve gayrimüekked sünnetin alternatif adı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Hüküm: İsâet (yanlış ve kusurlu davranış) olur ama azap gerektirmez — Alternatif ad: Müstehap", "Hüküm: Günahtır ve azap gerektirir — Alternatif ad: Farz", "Hüküm: Namazı bozar — Alternatif ad: Vacip", "Hüküm: Mekruhtur — Alternatif ad: Mubah", "Hüküm: Hiçbir sakıncası yoktur — Alternatif ad: Mendub"], "answer": "A", "sinav": 4}, {"no": "42", "body": "Kitapta kerâhet vakitleri üç zaman dilimi olarak açıklanmıştır. Bu vakitlerde kaza, vâcip ve cenaze namazı kılınamaz.\n\nAşağıdakilerden hangisi kerâhet vakitlerinden biri değildir?", "options": ["Güneş doğarken — yaklaşık 40-50 dakika sürer", "Güneş tam tepedeyken — yaklaşık 10 dakika sürer", "Güneş batarken — yaklaşık 40-50 dakika sürer", "Fecr-i sâdık ile güneş doğumu arasında — sabah namazı vaktidir", "Hem güneş doğarken hem batarken hem de tam tepedeyken"], "answer": "D", "sinav": 4}, {"no": "43", "body": "Kitapta namazda Kur'ân'dan hiçbir şey ezberleyemeyen kişi için bir kolaylık sunulmuştur.\n\nBu kolaylık aşağıdakilerden hangisidir?", "options": ["Sessizce kıyamda durması ve hiçbir şey okumaması yeterlidir", "Türkçe olarak dua etmesi ve Allah'tan bağışlanma dilemesi yeterli", "Sübhânallah, Elhamdülillâh, Lâ ilâhe illallah, Allâhu ekber demesi yeterli", "Yalnızca Bismillah demesi ve geri kalan kısımları atlaması yeterli", "Bir başkasının arkasında namaz kılması ve ona uyması yeterlidir"], "answer": "C", "sinav": 4}, {"no": "44", "body": "Kitapta tilavet secdesinin Kur'ân'daki secde ayetleriyle ilişkili olduğu belirtilmiştir. Secde ayetini bilerek okuyan veya işiten herkesin tilavet secdesi yapması gerekir.\n\nKur'ân'da toplam kaç secde ayeti bulunmaktadır ve namazda secde ayeti sûrenin sonuna denk gelirse ne olur?", "options": ["7 ayet — Ayrıca tilavet secdesi yapılır", "10 ayet — Namaz bozulur", "15 ayet — Namazdan sonra ayrıca yapılır", "14 ayet — Namaz secdeleri tilavet secdesi yerine geçer", "21 ayet — İmamın kararına bağlıdır"], "answer": "D", "sinav": 4}, {"no": "45", "body": "Kitapta yolculuk sırasında namazların birleştirilmesi (cem) konusu ele alınmıştır.\n\nCem hakkında kitapta verilen hüküm aşağıdakilerden hangisidir?", "options": ["Beş vakit namazın tamamı birleştirilebilir, sınırlama yoktur", "Yalnızca sabah-öğle veya ikindi-akşam birleştirilebilir", "Yalnızca öğle-ikindi veya akşam-yatsı birleştirilebilir, sabah asla", "Cem yalnızca hac ibadetinde geçerlidir, yolculukta yapılamaz", "Yalnızca akşam-yatsı birleştirilebilir, diğerleri birleştirilemez"], "answer": "C", "sinav": 4}, {"no": "46", "body": "Kitapta \"Vaktin Çağrısı\" bölümünde ikindi namazı vakti şöyle tasvir edilmiştir: \"İhtiyarlığın yükünü omuzlayan insan da büktü boynunu. Saçlarına düşen aklarla kızıl ufukları seyreden insan, fâniliğin şuuruna varıyor. İşte tam bu an, anlıyor Rabbinin neden 'asr'ın üzerine yemin ettiğini.\"\n\nBu tasvirde ikindi namazının insana hatırlattığı hakikat aşağıdakilerden hangisidir?", "options": ["Arapça olmalıdır — tercüme mütercimin sözüdür, Allah kelamı değildir", "Herhangi bir dilde olabilir — önemli olan anlamı bilmektir", "Farsça da olabilir — İmam-ı A'zam buna cevaz vermiştir", "Kıraat zorunlu değildir — sadece dua etmek de yeterlidir", "Yalnızca imam için gereklidir — cemaat sessiz durabilir"], "answer": "A", "sinav": 4}, {"no": "47", "body": "Kitapta \"Zamana Hükmeden Namaz\" bölümünde merhum Elmalılı Hamdi Yazır'ın \"Öyle ise akşama girdiğinizde, sabaha kavuştuğunuzda Allah'ı tesbih edin\" (Rûm, 30/17-18) ayetini tefsir ederken zamanın ahirete doğru akışından bahsettiği aktarılmıştır.\n\nElmalılı'nın bu tefsirinde akşam ve yatsı ile ilgili vurguladığı husus aşağıdakilerden hangisidir?", "options": ["Ebû Hanîfe: bozulur; Ebû Yûsuf ve Muhammed: mekruh ama geçerlidir", "Tüm Hanefî imamlarına göre namaz kesinlikle bozulur", "Tüm Hanefî imamlarına göre caizdir ve kerahet yoktur", "Ebû Hanîfe: caizdir; talebeleri ise bozulur demiştir", "Yalnızca nafile namazlarda caizdir; farz namazlarda bozulur"], "answer": "B", "sinav": 4}, {"no": "48", "body": "Kitapta Hz. Peygamber'in Medine'ye geldiğinde henüz devesinden inmeden yaptığı ilk iş anlatılmıştır. Bu, tarih boyunca İslam medeniyetinin şehir kurma geleneğine de temel oluşturmuştur.\n\nBu ilk iş ve onun İslam şehirciliğindeki yansıması aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Pazar yeri kurması — Şehirlerde merkeze çarşı inşa edilmesi", "Tarım alanı belirlemesi — Şehirlerin tarım bölgeleri oluşturması", "Ev taksimi — Şehirlerde mahallelerin düzenlenmesi", "Savunma hattı oluşturması — Şehirlere sur yapılması", "Mescid yeri tespiti — Yeni kurulan veya fethedilen şehirlerde merkeze cami inşa edilmesi"], "answer": "E", "sinav": 4}, {"no": "49", "body": "Kitapta Peygamberimizin son hastalığında bile namaza olan düşkünlüğü anlatılmıştır. Kendisi kıldıramayacak durumda olduğunda bir sahâbîyi imam tayin etmiş, kendisi oturarak kılmıştır.\n\nİmam tayin edilen sahâbî ve Peygamberimizin vefatından hemen önce ısrarla tekrarladığı son sözler aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İmam: Hz. Ömer — Son söz: \"Ümmetim, ümmetim!\"", "İmam: Hz. Ebu Bekir — Son söz: \"Namaza devam edin! Namaza, namaza!\"", "İmam: Hz. Ali — Son söz: \"Kur'ân'a sarılın!\"", "İmam: Hz. Osman — Son söz: \"Birbirinizi sevin!\"", "İmam: Hz. Bilal — Son söz: \"Allah'tan korkun!\""], "answer": "B", "sinav": 4}, {"no": "50", "body": "Kitapta \"Şüphesiz namaz kulun zimmetinde bir borç olmaktan çok daha fazlasıdır\" ifadesinin ardından namazın gerçek tanımı verilmiştir.\n\nKitaba göre namazın bu tanımı aşağıdakilerden hangisidir?", "options": ["Farz bir ibadetin yerine getirilmesi", "Toplumsal bir görevin ifası", "Maşuka aşk ve muhabbeti ilan etmek", "Günlük rutinin bir parçası", "Disiplin kazandıran bir alışkanlık"], "answer": "C", "sinav": 4}, {"no": "51", "body": "Kitapta Niyazi Mısrî'nin \"Savm u salât u hac ile sanma biter zahit işin / İnsan-ı kamil olmaya lazım olan irfan imiş\" beyti aktarılmıştır.\n\nBu beyit kitapta hangi bağlamda ve hangi mesajı vermek için kullanılmıştır?", "options": ["Yalnızca öğle-ikindi veya akşam-yatsı birleştirilebilir; sabah asla cem edilmez", "Beş vakit namazın tamamı birleştirilebilir; yolculukta herhangi ikisi cem edilir", "Yalnızca sabah-öğle veya ikindi-akşam birleştirilebilir; yatsı ayrıdır", "Cem yalnızca hac ibadetinde geçerlidir; başka durumda yapılamaz", "Yalnızca akşam-yatsı birleştirilebilir; diğer vakitler asla cem edilmez"], "answer": "C", "sinav": 4}, {"no": "52", "body": "Kitapta özenli kılınan namaz ile baştan savma kılınan namazın akıbeti birbirine zıt şekilde anlatılmıştır.\n\nÖzenli kılınan namazın ve baştan savma kılınan namazın akıbetleri aşağıdakilerden hangisinde doğru karşılaştırılmıştır?", "options": ["Özenli: Sevap yazılır — Baştan savma: Sevap yazılmaz ama günahı da yoktur", "Özenli: İki kat sevap — Baştan savma: Yarım sevap", "Özenli: Cennete götürür — Baştan savma: Cehenneme götürür", "Özenli: Melekler sevinir — Baştan savma: Melekler üzülür", "Özenli: Nurlu ve aydınlık yükseltilir — Baştan savma: Kapkara dürülüp sahibinin yüzüne fırlatılır"], "answer": "E", "sinav": 4}, {"no": "53", "body": "Kitapta okçu benzetmesiyle kalbin samimiyetinin namaza etkisi anlatılmıştır: \"Nice ok vardır ki sahibi tarafından atılır ama hedefe varmadan düşer. Yine nice ok vardır ki kuvvetle atılmış, karşısına kaya çıksa da hedefine varır.\"\n\nKitaba göre kalbin hedefe (vuslata) ulaşmasını belirleyen ölçü ve zulmet (perdeleme) durumunda gerekli olan şey aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Ölçü: İbadet miktarı — Gereken: Daha fazla ibadet", "Ölçü: İlim seviyesi — Gereken: Daha fazla kitap okumak", "Ölçü: Cemaatle namaz sıklığı — Gereken: Her namazı cemaatle kılmak", "Ölçü: İman, yakîn ve niyet samimiyeti — Gereken: Zulmeti bertaraf edecek nur", "Ölçü: Nafile namazların sayısı — Gereken: Daha fazla nafile kılmak"], "answer": "D", "sinav": 4}, {"no": "54", "body": "Kitapta okçu benzetmesiyle namazın kabulü açıklanmıştır. Okçunun oku bileğin gücü, yayın kalitesi ve okun sertliğine bağlıdır.\n\nBu benzetmeyle anlatılmak istenen aşağıdakilerden hangisidir?", "options": ["Namazda fiziksel güç ve dayanıklılık önemlidir", "Namaz ne kadar uzun kılınırsa o kadar makbuldür", "Kalpler iman, yakîn ve niyet samimiyeti ölçüsünde vuslata erer", "Namaz ancak cemaatle kılındığında tam etkili olur", "Namazda kıraatin uzunluğu kabulün ölçüsüdür"], "answer": "C", "sinav": 4}, {"no": "55", "body": "Kitapta \"Kişinin namazı eğer kendisini fuhşiyattan ve kötülüklerden alıkoymuyorsa, onu Allah'tan daha fazla uzaklaştırmaktan başka bir işe yaramamıştır\" hadisi aktarılmıştır.\n\nBu durumun sebebi olarak gösterilen üç özellik aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["Kalbi bozuk olması, göğsünün karanlık olması ve nefsinin etrafına düşkün ve meşgul olması", "Abdestinin eksik olması, kıbleden sapması ve vaktini geçirmesi", "İlminin yetersiz olması, niyetinin bozuk olması ve kibir taşıması", "Cemaatle kılmaması, sünnetleri terk etmesi ve tesbih çekmemesi", "Namazı aceleyle kılması, rükûyu kısa tutması ve secdeyi hızlı yapması"], "answer": "A", "sinav": 4}, {"no": "56", "body": "Kitapta ezan \"sadece bir ses değildir\" denilmiş ve kapsamlı bir tanım yapılmıştır. Ezanın namaz, cami ve cemaat üçlüsüyle olan ayrılmaz bağı vurgulanmıştır.\n\nKitapta ezana verilen tanım aşağıdakilerden hangisidir?", "options": ["En yakın normal bölgenin vakitleri esas alınır; bir gün 24 saat kabul edilir", "Güneş hiç batmıyorsa namaz kılınmaz; kaza olarak sonra kılınır", "Yalnızca üç vakit namaz kılınır; sabah ve yatsı düşer", "Mekke saatine göre namaz kılınır; yerel saat dikkate alınmaz", "Namaz vakitleri kişinin takdirine bırakılır; istediği zaman kılar"], "answer": "E", "sinav": 4}, {"no": "57", "body": "Kitapta \"Kurtuluşa erer ancak arınan; Rabbinin adını anan, sonra namaz kılan!\" (A'lâ, 87/14-15) ayeti aktarılmıştır.\n\nBu ayet, ezandaki hangi cümlenin Kur'ânî temelini oluşturmak amacıyla kullanılmıştır?", "options": ["Allâhü Ekber — Allah'ın büyüklüğünü ilan", "Hayye ale'l-felâh — Kurtuluşa çağrı", "Hayye ale's-salâh — Namaza çağrı", "Eşhedü en lâ ilâhe illallâh — Tevhid şehadeti", "Lâ ilâhe illallâh — Son tevhid ilanı"], "answer": "B", "sinav": 4}, {"no": "58", "body": "Kitapta Hollanda'da parkta namaz kılan Müslümanın hikâyesi anlatılmıştır. Hollandalı bir kişi onu izleyip kâmeti merak etmiş, Müslüman zat ezanın \"Hayye ale's-salah\" ve \"Hayye ale'l-felah\" cümlelerini açıklamıştır.\n\nHollandalı kişinin bu açıklamadan sonraki tepkisi ve bu hikâyenin kitaptaki mesajı aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["İkindi namazı kılınamamış; akşam-yatsı arasında kaza edilmiş — savaş sebebiyle", "Öğle namazı kılınamamış; ikindi vaktinde kaza edilmiş — kuşatma sebebiyle", "Sabah namazı kılınamamış; öğle vaktinde kaza edilmiş — görev sebebiyle", "Akşam namazı kılınamamış; yatsı vaktinde kaza edilmiş — savaş sebebiyle", "Yatsı namazı kılınamamış; sabah vaktinde kaza edilmiş — gece baskını sebebiyle"], "answer": "D", "sinav": 4}, {"no": "59", "body": "Kitapta cemaatle namazın fazileti vurgulanırken hem Peygamberimizin hadisi hem de tarihsel bir rivayet aktarılmıştır.\n\nCemaatle namazın tek başına kılınan namazdan kaç kat faziletli olduğu ve \"5 vakit namazı cemaatle kılan\" hakkındaki rivayet aşağıdakilerden hangisinde doğru verilmiştir?", "options": ["7 kat — \"Günahları silinir\"", "27 kat — \"Yeri ve denizi ibadetle doldurmuş olur\"", "25 kat — \"Cennete girer\"", "10 kat — \"Allah onu sever\"", "70 kat — \"Melekler ona dua eder\""], "answer": "B", "sinav": 4}, {"no": "60", "body": "Kitabın bütünü değerlendirildiğinde namaz ibadeti beş farklı kavram etrafında çok boyutlu olarak ele alınmıştır: şükür, zaman, kulluk, özgürlük ve diriliş. Peygamberimiz bu ibadeti \"gözümün nuru\" olarak nitelemiş, Mi'rac gecesinde farz kılınan namazı \"cennetin anahtarı\" olarak tanımlamıştır.\n\nKitabın ana tezlerinden biri olarak kabul edilemeyecek ifade aşağıdakilerden hangisidir?", "options": ["Namaz, yalnızca bireysel bir ibadet olup toplumsal ve kozmik hiçbir boyutu yoktur", "Namaz, insanı zamana hükmettiren bir disiplin kaynağıdır", "Namaz, insanı nefsinin ve mâsivânın köleliğinden özgürleştiren bir davettir", "Namaz, Allah'ın nimetlerine karşı şükrün en güzel ifadesidir", "Namaz, cennetin anahtarı ve ahirette ilk sorulacak ameldir"], "answer": "A", "sinav": 4}];

function gr(q){const b=(q.body||"").toLowerCase();const m=[["tolstoy","tolstoy"],["hasir","haşir|hasir|diriliş|berzah"],["nubuvvet","nübüvvet|nubuvvet|kimden öğren"],["tevhid","tevhid haki"],["ibrahim","ibrahim.*melek|fiyat.*ödeme"],["sukur","şükür|şükr|nimet.*artır|nankörlük"],["fabrika","fabrika|daire.*merkez|otomobil"],["nimet","nimet.*sayma|nefes.*fayda|christy|sol ayağ|başparmak|demir|ağrı.*nimet|kanser"],["sihat","sıhhat.*boş vakit"],["kanuni","kanunî"],["namaz","salât.*dua|namazın.*yer|mi.rac.*farz|doksandan"],["halife","halife|misal-i musaggar"],["fatiha","fatiha.*104|fatiha.*kur"],["sermaye","yüzde dört|güvenlik kemeri|nörobilim|kortizol|katalizör"],["kavanoz","kavanoz"],["kalbim","kalbim temiz|yansıtma|psikolojik denge|24 milyar"],["kiraat","imam-ı a.zam|kıraat|kolayınıza|arapça.*kılın|tercüme.*namaz"],["dua","vedûd|tüccar.*hırsız|laurence|brown"],["cennet","cennet.*anahtar|koç.*sûret|ölüm.*öldür|parmağını denize|akvaryum"],["hesap","dört şey.*sorgul|vaiz.*ölüm|kum saati|gölge.*nalin|lezzet.*acılaş"],["zaman","zamana hükm|vakit.*zaman|izafi|ahmet haşim|ikame|muvakkithane"],["vakit","sabah.*bahar|öğle.*zirve|ikindi.*hazan|akşam.*ölüm|yatsı.*karanlık|vaktin çağrı"],["ezan","ezan|müezzin|abdullah.*zeyd|bilal.*ezan|çan.*boru|kamet|es-salâtü hayrun|kad kâmet|sadakte"],["hayye","hayye|iblis.*kibir|yusuf.*tebrie|yunus.*tesbih|nefsimle.*başbaş|şuayb|ikbal.*secde|allâh-u ekber.*11|sübhâneke|özgürlük.*ferman"],["cami","cami.*cemaat|mescid.*alâka|27.*kat|cemaat.*fazilet|teravih"],["kaza","hendek|tertip sahibi|kazaya|kaza.*namaz"],["kulluk","7.*aza.*koyun|semere|gözlerimin nuru.*namazda|bilal.*rahata|cesedi.*ruhu|fuhşiyat|nurlu.*yüksel|kapkara.*dürül"],["mirac","50 vakit|musa.*6.*sema|sema.*kalem sesi|semavat.*ibadet|azimet"],["kabul","mukarrebîn|okçu|ömer.*ordu|niyazi mısrî|zayi eden|mücâhede"],["fikih","dışındaki farz|rükün|cenaze namaz|kerâhet|avret|oje|ruj|pijama|resim.*kıyafet|sehiv|tilavet|intihar|kutup|cem |tertip|müekked|bakarak namaz|tuvalet"],["psikoloji","psikoloj|şekli yön|zihinsel yön|duygusal yön|üstünlük.*aşağılık|merhamet.*rahmân|günahkârlık.*suçluluk"],["peygamber","nasıl.*namaz.*gördüyseniz|son hastalığ|ebu bekir.*imam"]];for(const[k,v]of m)for(const p of v.split("|")){try{if(new RegExp(p,"i").test(b))return R[k]||"";}catch(e){}}return"Kitabin ilgili bolumune bakiniz.";}

if(i===ci){el.classList.add('rt');cC++;}else{el.classList.add('fl');const ce=document.querySelectorAll('.o')[ci];ce.classList.remove('dm');ce.classList.add('ht');cW++;const ref=gr(q);const ex=document.getElementById('ex');ex.innerHTML=`<b>Dogru cevap: ${L[ci]})</b> ${q.options[ci]}<br><br><b>Kitaptaki yeri:</b> ${ref}`;ex.classList.add('on');wl.push({q,y:L[i],c:L[ci],ref});}
document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('nB').disabled=false;}

function nx(){document.getElementById('qC').classList.add('ol');setTimeout(()=>{cI++;if(cI>=cQ.length){srs();return;}rd();},280);}

function srs(){sh('result');const t=cQ.length,p=Math.round((cC/t)*100);document.getElementById('rP').textContent=p;document.getElementById('rC').textContent=cC;document.getElementById('rW').textContent=cW;
document.getElementById('rR').className='rr '+(p>=70?'gd':p>=50?'md':'bd');
document.getElementById('rE').textContent=p>=90?'\uD83C\uDF1F':p>=70?'\uD83D\uDE0A':p>=50?'\uD83D\uDE10':'\uD83D\uDE1E';
document.getElementById('rT').textContent=p>=90?'Mukemmel!':p>=70?'Basarili!':p>=50?'Gelistirilmeli':'Calismaniz Gerekiyor';
document.getElementById('rS').textContent=`${t} sorudan ${cC} dogru, ${cW} yanlis`;
if(cE>0){const s=JSON.parse(localStorage.getItem('ns')||'{}');const pr=s[`s${cE}`];if(!pr||p>pr.p)s[`s${cE}`]={c:cC,w:cW,p};localStorage.setItem('ns',JSON.stringify(s));}}

function sr(){sh('review');if(!wl.length){document.getElementById('rL').innerHTML='<div class="rvem">Tebrikler! Hic yanlis yok! \uD83C\uDF89</div>';return;}
let h='';wl.forEach((w,i)=>{h+=`<div class="rc"><div class="rn">Yanlis #${i+1}</div><div class="rb2">${w.q.body.replace(/\n/g,'<br>')}</div><div class="ar2"><span class="yr">\u2717 ${w.y})</span><span class="cr">\u2713 ${w.c}) ${w.q.options[w.c.charCodeAt(0)-65]}</span></div><div class="rf"><b>Kitaptaki Yeri:</b>${w.ref}</div></div>`;});
document.getElementById('rL').innerHTML=h;}

uh();
