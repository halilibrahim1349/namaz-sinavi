amanın, mekânın ve milletlerin değişmesinin ne soruları değiştirebilmesi ne de cevapları çürütebilmesi", "Her dilde tercümesinin yapılabilmesi", "Bütün peygamberlerin aynı kitabı tebliğ etmiş olması", "Felsefe ve bilimin de aynı cevapları desteklemesi"], "answer": "A", "sinav": 1}, {"no": "5", "body": "Kitapta tevhid kavramı, yalnızca Allah'ın varlığını ve birliğini kabul etmekle sınırlı tutulmamış, daha geniş bir çerçevede tanımlanmıştır.\n\nBuna göre aşağıdakilerden hangisi kitaptaki tevhid tanımının bir parçasıdır?", "options": ["Allah'ın isimlerini ve sıfatlarını ezbere bilmek", "Allah'ın varlığını akli delillerle kanıtlamak", "Diğer dinlerin batıl olduğunu ispat etmek", "Kâinattaki tüm düzenin ancak Allah'a nispetle anlam bulduğunu idrak etmek"], "answer": "D", "sinav": 1}, {"no": "6", "body": "Kitapta ölüm kavramı, insanın tamamen yok olması anlamında değerlendirilmemiştir. Aksine ölüm, ruhun bu dünyadan ayrılarak başka bir âleme geçişi olarak tanımlanmıştır. Bu geçiş âlemi, insanın varlık yolculuğunda yeni bir safhayı teşkil etmektedir.\n\nKitaba göre bu geçiş âleminin adı aşağıdakilerden hangisidir?", "options": ["Berzah", "Âraf", "Mahşer", "Sırat"], "answer": "A", "sinav": 1}, {"no": "7", "body": "Kitapta haşir inancının kapsamı açıklanırken, bu inancın sadece ölüm sonrası bir aşamayı değil, daha geniş bir bilinç halini de beraberinde getirdiği belirtilmiştir.\n\nBuna göre haşir inancının beraberinde getirdiği bilinç hali aşağıdakilerden hangisidir?", "options": ["Cennet ve cehennemin fiziksel yapısını bilme", "Meleklerin görevlerini anlama", "Peygamberlerin mucizelerini tasdik etme", "Dünya hayatının geçiciliğini ve ebedî sorumluluk bilincini kavrama"], "answer": "D", "sinav": 1}, {"no": "8", "body": "Kitapta ibadet kavramı kısa ve özlü bir şekilde tanımlanmıştır.\n\nAşağıdakilerden hangisi kitaptaki ibadet tanımıdır?", "options": ["Allah'ın emrettiklerini yapıp yasaklarından kaçınmaktır", "Yalnızca namaz, oruç ve zekât gibi farz ibadetleri yerine getirmektir", "Kalben Allah'a inanmak ve dille ikrar etmektir", "Allah'ı tanımak ve O'nun varlığını başkalarına anlatmaktır"], "answer": "A", "sinav": 1}, {"no": "9", "body": "Kitapta, İslam inanç sistemine göre kâinattaki tüm varlıkların Allah'a bir tür ibadet halinde olduğu anlatılmıştır. Her varlığın kendisine özgü bir tabiat ve işlevle yaratılmış olup bu işlevi yerine getirmek suretiyle ilahî iradeye tâbi olduğu belirtilmiştir.\n\nKitapta bu durum hangi benzetmeyle açıklanmıştır?", "options": ["Bir devlet teşkilatında farklı alanlarda hizmet veren görevlilerin çeşitli sorumluluklara sahip olması gibi", "Bir orkestrada her müzisyenin kendi enstrümanını çalması gibi", "Bir fabrikada her makinenin belirli bir ürünü üretmesi gibi", "Bir okulda her öğretmenin kendi branşını öğretmesi gibi"], "answer": "A", "sinav": 1}, {"no": "10", "body": "Kitapta hayvanların ve cansız varlıkların Allah'ı nasıl tesbih ettiği konusunda âlimlerin iki farklı görüşü aktarılmıştır. Birinci görüşe göre bütün varlıklar kendilerine mahsus bir hayat ve şuurla tesbih ederler. İkinci görüşe göre ise varlıklar dilleriyle değil, yaptıkları fiillerle Allah'ın yüceliğini ifade ederler.\n\nKitaba göre bu iki görüş hakkında aşağıdakilerden hangisi söylenmiştir?", "options": ["Birinci görüş tercih edilmiş, ikincisi reddedilmiştir", "İkinci görüş daha güçlü bulunmuş ve birincisi zayıf görülmüştür", "İki görüşü birleştirerek varlıkların hem kendilerine mahsus bir dille hem de lisan-ı halleriyle tesbih ettiklerini söylemenin en güzel olduğu ifade edilmiştir", "Her iki görüşün de yanlış olduğu ve üçüncü bir izahın doğru olduğu belirtilmiştir"], "answer": "C", "sinav": 1}, {"no": "11", "body": "Kitapta, lisan-ı hal kavramı bir örnekle açıklanmıştır. Bu örneğe göre bir nesne insanlarla \"konuşur\" ve onlara bilgi verir, fakat kendisi konuştuğunun farkında değildir.\n\nKitapta lisan-ı hal kavramını açıklamak için verilen bu örnek aşağıdakilerden hangisidir?", "options": ["Arının bal üretmesi", "Yağmurun toprağı sulaması", "Rüzgârın dalları sallaması", "Saatin vakti bildirmesi"], "answer": "D", "sinav": 1}, {"no": "12", "body": "Sahâbeden Ebu Zerr (ra) tarafından aktarılan bir rivayete göre, Peygamber Efendimizin (sav) önünde bulunan yedi çakıl taşı, Peygamberimizin avucuna alınmasıyla birlikte belirli bir ses çıkararak tesbih etmeye başlamıştır. Peygamberimiz bu taşları sırasıyla üç sahâbîsinin de avucuna koymuş ve taşlar her birinin elinde tesbih etmiştir.\n\nBu rivayete göre aşağıdakilerden hangisi yanlıştır?", "options": ["Taşlar arıların vızıldaması gibi ses çıkararak tesbih etmiştir", "Taşlar yere konulduğunda tesbihleri duyulmaz olmuştur", "Taşlar sırasıyla Ebu Bekir, Ömer ve Osman'ın avucunda tesbih etmiştir", "Taşlar Hz. Ali'nin avucuna da konulmuş ve tesbih etmiştir"], "answer": "D", "sinav": 1}, {"no": "13", "body": "Kitapta ağaçların ve bitkilerin secde etmesi konusunda âlimlerin iki farklı yorumu aktarılmıştır.\n\nAşağıdakilerden hangisi bu iki yorumdan biri değildir?", "options": ["Ağaçların ve bitkilerin secde etmesi, Allah'ın kanunlarına itaat ederek boyun eğmeleridir", "Bitkiler ve ağaçlar, güneşin doğuşundan batışına kadar ona yönelerek secde ederler", "Ağaçlar kökleriyle yerin derinliklerine inerek secde halini temsil ederler", "İnsan nasıl Kâbe'ye yöneliyorsa, bitkiler de güneşe yönelirler"], "answer": "C", "sinav": 1}, {"no": "14", "body": "Kitapta kâinat bir mescide benzetilmiş ve namaz kılmayan insanın durumu bu benzetme üzerinden değerlendirilmiştir. Buna göre bütün varlıklar yaratılışlarının diliyle ibadetle meşgulken, insan bu büyük ibadet topluluğunun içinde namaz kılmazsa belirli bir sonuçla karşılaşacaktır.\n\nKitaba göre namaz kılmayan insanın bu benzetmedeki sonucu aşağıdakilerden hangisidir?", "options": ["Kâinattaki mahlûklar ona öfkelenir ve ondan hoşnut olmazlar", "Diğer varlıklar onu fark etmez ve umursamazlar", "Melekler onun için af dilerler", "Diğer varlıklar ona acıyarak dua ederler"], "answer": "A", "sinav": 1}, {"no": "15", "body": "Kitapta insanların ibadet etme sebepleri üç ana kategoride sınıflandırılmıştır:\n\nI. Allah'ın nimetlerine bakarak şükretmek için ibadet etmek\nII. Cehennemden korunmak ve cenneti kazanmak amacıyla ibadet etmek\nIII. Allah'ın azametini, büyüklüğünü ve yüceliğini görüp, askerin komutana itaati gibi başka hiçbir gerekçe aramadan ibadet etmek\nIV. Toplumda saygınlık kazanmak ve insanlar tarafından takdir edilmek için ibadet etmek\n\nKitaba göre yukarıdakilerden hangisi veya hangileri ibadet motivasyonları arasında yer almaz?", "options": ["III ve IV", "Yalnız IV", "II ve IV", "Yalnız III"], "answer": "B", "sinav": 1}, {"no": "16", "body": "Kitapta, Allah'ın azametini ve büyüklüğünü görerek ibadet eden üçüncü grup insanların tavırları bir benzetmeyle açıklanmıştır. Bu grubun ibadet anlayışı, herhangi bir karşılık beklemeksizin sadece emre itaat etme şeklinde tarif edilmiştir.\n\nKitapta bu ibadet anlayışı hangi benzetmeyle ifade edilmiştir?", "options": ["Askerin komutana itaati gibi", "Çocuğun annesine olan sevgisi gibi", "Öğrencinin hocasına saygısı gibi", "İşçinin patronuna bağlılığı gibi"], "answer": "A", "sinav": 1}, {"no": "17", "body": "Kitapta namaz kılmayan bir asker ile namaz kılan bir asker arasında geçen bir diyalog aktarılmaktadır. Namaz kılmayan asker, arkadaşına \"Hangi asırda yaşıyoruz? Niçin kendini zahmete sokup her gün 5 defa namaz kılıyorsun?\" diye sorar. Namaz kılan asker ise cevabında, arkadaşının bir teğmene itaat etmesini örnek göstererek bir karşılaştırma yapar.\n\nNamaz kılan askerin cevabındaki temel argüman aşağıdakilerden hangisidir?", "options": ["Namazın insan sağlığına faydalarının bilimsel olarak kanıtlanmış olması", "Namaz kılmamanın cezasının çok ağır olması", "Namazın toplumsal düzeni sağlayan en önemli ibadet olması", "Omzunda bir yıldızı olan bir insana itaat edenin, kumlar adedince yıldızları olan Allah'a da itaat etmesi gerektiği"], "answer": "D", "sinav": 1}, {"no": "18", "body": "Kitapta uçak metaforu kullanılarak insanın dünya hayatındaki durumu anlatılmıştır. Dünya, bir uçaktan farklı olmayan bir ortam olarak tanımlanmış ve daha doğru bir ifadeyle adlandırılmıştır.\n\nKitaba göre dünya aşağıdakilerden hangisine benzetilmiştir?", "options": ["Bir gemiye", "Bir uçan daireye", "Bir trene", "Bir balonun sepetine"], "answer": "B", "sinav": 1}, {"no": "19", "body": "Kitapta, insanın hayatın anlamına dair dört temel soruyu cevaplandırmadıkça bazı şeyleri bilmesinin mümkün olmayacağı vurgulanmıştır.\n\nAşağıdakilerden hangisi bu dört sorunun cevapsız kalması durumunda kitapta belirtilen sonuçlardan biri değildir?", "options": ["Niçin yaşadığımızı bilmeden yaşarız", "Niçin öldüğümüzü bilemeden ölürüz", "Etrafımızdaki varlıkların neye hizmet ettiğini bilemeyiz", "İnsanlar arasındaki adaletsizliğin sebebini anlayamayız"], "answer": "D", "sinav": 1}, {"no": "20", "body": "Kitapta, Kur'ân-ı Kerîm'in dört temel esası anlatılmıştır. Bu esaslardan birinin kapsamı açıklanırken sadece ibadetlerden bahsetmekle kalmayıp, aynı zamanda şahsî hayat, aile hayatı ve diğer insanlara karşı vazifelerin de bu esasın içinde yer aldığı belirtilmiştir.\n\nBu geniş kapsamlı esas aşağıdakilerden hangisidir?", "options": ["Tevhid hakikati", "Nübüvvet hakikati", "İbadet ve adalet hakikati", "Haşir hakikati"], "answer": "C", "sinav": 1}, {"no": "21", "body": "Tolstoy, hayatın anlamına dair sorulara cevap bulmak için felsefeye ve bilime başvurmuştur. Kitapta, felsefe ve bilimin bu sorulara yaklaşımı aktarılmıştır.\n\nKitaba göre felsefe ve bilimin bu sorular karşısındaki tutumu aşağıdakilerden hangisidir?", "options": ["\"Yıldızları, hayvanları, bitkileri her şeyi sor ama bunları sorma, çünkü bu soruların cevabı yok\" demişlerdir", "Bu soruları çeşitli teorilerle yanıtlamaya çalışmışlardır", "Bu soruları ancak dinin cevaplayabileceğini kabul etmişlerdir", "Her disiplin kendi alanında kısmi cevaplar vermiştir"], "answer": "A", "sinav": 1}, {"no": "22", "body": "Kitapta varlıkların ibadet biçimleri anlatılırken, insanın ibadeti ile diğer varlıkların ibadeti arasındaki temel fark vurgulanmıştır. Buna göre tüm varlıklar bir tür ibadet halindedir, ancak insanın ibadeti diğer varlıklardan belirli bir yönüyle ayrılmaktadır.\n\nKitaba göre insanın ibadetini diğer varlıklardan ayıran temel özellik aşağıdakilerden hangisidir?", "options": ["İnsanın ibadetinin daha uzun sürmesi", "İnsanın ibadetinin bilinçli bir kulluk olması", "İnsanın yalnızca namaz kılarak ibadet etmesi", "İnsanın ibadetinin meleklerin ibadetiyle aynı olması"], "answer": "B", "sinav": 1}, {"no": "23", "body": "Kitapta, İslam inanç sistemine göre kâinattaki her bir varlığın varoluşsal görevi çerçevesinde belirli bir konumda olduğu ifade edilmiştir.\n\nKitaba göre her bir varlık, ilahî iradenin hangi konumundadır?", "options": ["Bir nevi şahidi", "Bir nevi kulu", "Bir nevi memuru", "Bir nevi elçisi"], "answer": "C", "sinav": 1}, {"no": "24", "body": "Kitapta, insanların ibadet etme sebepleri anlatıldıktan sonra bazı insanların bu sebepleri tek tek değil, hepsini bir arada değerlendirdikleri belirtilmiştir. Ardından ibadetlerin çeşitliliğine dikkat çekilmiş ve bunlar arasında en mühim olanı vurgulanmıştır.\n\nKitaba göre namazın diğer ibadetlerden ayrılan en önemli özelliği aşağıdakilerden hangisidir?", "options": ["Günde beş vakit farz kılınmış olması", "Mi'rac gecesinde farz kılınması", "Bütün ibadetleri bünyesinde barındırması", "Yalnızca Müslümanlara farz olması"], "answer": "C", "sinav": 1}, {"no": "25", "body": "Kitaptaki uçak metaforunda, insanın aklına gelen dört soru sırasıyla Kur'ân'ın dört temel hakikatine karşılık gelmektedir.\n\nAşağıdaki eşleştirmelerden hangisi yanlıştır?", "options": ["\"Beni buraya kim getirdi?\" → Tevhid hakikati", "\"Beni niçin getirdi?\" → Haşir hakikati", "\"Bu uçak nereye gidiyor?\" → Haşir hakikati", "\"Bu soruların cevabını kimden öğreneceğiz?\" → Nübüvvet hakikati"], "answer": "B", "sinav": 1}, {"no": "26", "body": "Kitapta, haşir hakikati anlatılırken insanın ölümden sonraki varlık yolculuğunun safhaları sıralanmıştır.\n\nAşağıdakilerden hangisi kitapta anlatılan bu safhaların doğru sıralamasıdır?", "options": ["Ölüm → Mahşer → Berzah → Cennet/Cehennem", "Ölüm → Berzah → Kıyamet → Mahşer → Cennet/Cehennem", "Ölüm → Sırat → Berzah → Mahşer → Cennet/Cehennem", "Ölüm → Kıyamet → Berzah → Sırat → Cennet/Cehennem"], "answer": "B", "sinav": 1}, {"no": "27", "body": "Kitapta, Tolstoy'un hayatın anlamına dair sorularla ilgili önemli bir değerlendirmesi aktarılmıştır. Tolstoy, başlangıçta bu soruları belirli bir şekilde nitelendirmiş, ancak daha sonra bu değerlendirmesini tamamen değiştirmiştir.\n\nTolstoy'un bu sorular hakkındaki değerlendirme değişimi aşağıdakilerden hangisidir?", "options": ["Önce imkânsız bulmuş, sonra kolay olduğunu anlamıştır", "Önce çocukça bulmuş, sonra dünyanın en mühim soruları olduğunu görmüştür", "Önce önemsemiş, sonra gereksiz bulmuştur", "Önce felsefi sorular olarak görmüş, sonra dinî sorular olduğunu kabul etmiştir"], "answer": "B", "sinav": 1}, {"no": "28", "body": "Kitapta, kâinatın bir mescide benzetilmesinin ardından, camide namaz kılmayan bir kişinin durumu ile kâinatta ibadet etmeyen insanın durumu arasında bir paralellik kurulmuştur.\n\nBu paralelliğe göre, namaz vaktinde camiye girip köşeye çekilerek dünyevî meşguliyetlerle oyalanan kişi hakkında aşağıdakilerden hangisi söylenmiştir?", "options": ["Bu kişi, cemaatin dualarından faydalanarak sevap kazanır", "Bu kişi, ibadet ortamının ruhuna aykırı davranmış olur ve cemaatin gönlünde hoşnutsuzluk uyandırır", "Bu kişi, namazını sonradan kaza ettiğinde günahı affedilir", "Bu kişi, camide bulunduğu sürece namaz kılmış sayılır"], "answer": "B", "sinav": 1}, {"no": "29", "body": "Kitapta Kur'ân-ı Kerîm'in dört temel hakikati anlatılırken, her bir hakikatin kapsamı ve tanımı verilmiştir.\n\nAşağıdakilerden hangisi kitapta verilen bilgilere göre doğrudur?", "options": ["Tevhid hakikati yalnızca Allah'ın varlığını ve birliğini kabul etmektir", "İbadet ve adalet hakikati sadece namaz, oruç ve zekât gibi ibadetleri kapsar", "Haşir hakikati, dünya hayatının geçiciliğini ve ebedî sorumluluk bilincini de beraberinde getirir", "Nübüvvet hakikati, insanın kendi aklıyla hakikate ulaşabileceğini ifade eder"], "answer": "C", "sinav": 1}, {"no": "30", "body": "Kitapta, Tolstoy'un depresyondan çıkış süreci kısaca anlatılmıştır. Buna göre Tolstoy, uzun süren bunalım döneminin ardından belirli bir yolla hayatın anlamına dair sorularına cevap bularak bu hallerden kurtulmuştur.\n\nKitaba göre Tolstoy'un bu bunalımdan kurtuluş yolu aşağıdakilerden hangisidir?", "options": ["Felsefe alanında yeni bir ekol keşfetmesi", "Allah'a inanması", "Edebiyata yönelerek iç dünyasını ifade etmesi", "Doğaya çekilip münzevi bir hayat yaşaması"], "answer": "B", "sinav": 1}];
const R={"tolstoy":"Giris, s.12-14","tevhid":"Giris, s.15","ibadet":"Giris, s.15","hasir":"Giris, s.15-16","nubuvvet":"Giris, s.16","tesbih":"Giris, s.17-19","sukur":"1. Bolum, s.22-26","fabrika":"1. Bolum, s.23-25","ibrahim":"1. Bolum, s.25-26","nimet":"1. Bolum, s.33-39","sihat":"1. Bolum, s.36","kanuni":"1. Bolum, s.36","namaz":"1. Bolum, s.47-49","halife":"1. Bolum, s.50-51","fatiha":"1. Bolum, s.51-52","sermaye":"1. Bolum, s.52-54","kavanoz":"1. Bolum, s.54-57","kalbim":"1. Bolum, s.57-61","kiraat":"1. Bolum, s.60-62","dua":"1. Bolum, s.62-66","cennet":"1. Bolum, s.67-76","hesap":"1. Bolum, s.45-47","zaman":"2. Bolum, s.80-88","vakit":"2. Bolum, s.88-94","ezan":"2. Bolum, s.94-105","hayye":"2. Bolum, s.105-120","cami":"2. Bolum, s.121-132","kaza":"2. Bolum, s.136-140","kulluk":"3. Bolum, s.142-158","mirac":"3. Bolum, s.159-161","kabul":"3. Bolum, s.165-174","fikih":"4. Bolum, s.175-217","psikoloji":"Ekler, s.218-228","peygamber":"Ekler, s.234-243"};
function gr(q){const b=(q.body||"").toLowerCase();const m=[["tolstoy","tolstoy"],["hasir","haşir|hasir|diriliş|berzah"],["nubuvvet","nübüvvet|nubuvvet|kimden öğren"],["tevhid","tevhid haki"],["ibrahim","ibrahim.*melek|fiyat.*ödeme"],["sukur","şükür|şükr|nimet.*artır|nankörlük"],["fabrika","fabrika|daire.*merkez|otomobil"],["nimet","nimet.*sayma|nefes.*fayda|christy|sol ayağ|başparmak|demir|ağrı.*nimet|kanser"],["sihat","sıhhat.*boş vakit"],["kanuni","kanunî"],["namaz","salât.*dua|namazın.*yer|mi.rac.*farz|doksandan"],["halife","halife|misal-i musaggar"],["fatiha","fatiha.*104|fatiha.*kur"],["sermaye","yüzde dört|güvenlik kemeri|nörobilim|kortizol|katalizör"],["kavanoz","kavanoz"],["kalbim","kalbim temiz|yansıtma|psikolojik denge|24 milyar"],["kiraat","imam-ı a.zam|kıraat|kolayınıza|arapça.*kılın|tercüme.*namaz"],["dua","vedûd|tüccar.*hırsız|laurence|brown"],["cennet","cennet.*anahtar|koç.*sûret|ölüm.*öldür|parmağını denize|akvaryum"],["hesap","dört şey.*sorgul|vaiz.*ölüm|kum saati|gölge.*nalin|lezzet.*acılaş"],["zaman","zamana hükm|vakit.*zaman|izafi|ahmet haşim|ikame|muvakkithane"],["vakit","sabah.*bahar|öğle.*zirve|ikindi.*hazan|akşam.*ölüm|yatsı.*karanlık|vaktin çağrı"],["ezan","ezan|müezzin|abdullah.*zeyd|bilal.*ezan|çan.*boru|kamet|es-salâtü hayrun|kad kâmet|sadakte"],["hayye","hayye|iblis.*kibir|yusuf.*tebrie|yunus.*tesbih|nefsimle.*başbaş|şuayb|ikbal.*secde|allâh-u ekber.*11|sübhâneke|özgürlük.*ferman"],["cami","cami.*cemaat|mescid.*alâka|27.*kat|cemaat.*fazilet|teravih"],["kaza","hendek|tertip sahibi|kazaya|kaza.*namaz"],["kulluk","7.*aza.*koyun|semere|gözlerimin nuru.*namazda|bilal.*rahata|cesedi.*ruhu|fuhşiyat|nurlu.*yüksel|kapkara.*dürül"],["mirac","50 vakit|musa.*6.*sema|sema.*kalem sesi|semavat.*ibadet|azimet"],["kabul","mukarrebîn|okçu|ömer.*ordu|niyazi mısrî|zayi eden|mücâhede"],["fikih","dışındaki farz|rükün|cenaze namaz|kerâhet|avret|oje|ruj|pijama|resim.*kıyafet|sehiv|tilavet|intihar|kutup|cem |tertip|müekked|bakarak namaz|tuvalet"],["psikoloji","psikoloj|şekli yön|zihinsel yön|duygusal yön|üstünlük.*aşağılık|merhamet.*rahmân|günahkârlık.*suçluluk"],["peygamber","nasıl.*namaz.*gördüyseniz|son hastalığ|ebu bekir.*imam"]];for(const[k,v]of m)for(const p of v.split("|")){try{if(new RegExp(p,"i").test(b))return R[k]||"";}catch(e){}}return"Kitabin ilgili bolumune bakiniz.";}

let cQ=[],cI=0,cC=0,cW=0,dn=false,wl=[],cE=0;const L=['A','B','C','D','E'];
function sh(id){document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));document.getElementById(id).classList.add('a')}
function hm(){sh('home');uh()}
function uh(){const s=JSON.parse(localStorage.getItem('ns')||'{}');let h='';for(let i=1;i<=4;i++){const d=s[`s${i}`];if(d)h+=`<div class="hc2">Sinav ${i}: <b>%${d.p}</b> (${d.c}D/${d.w}Y)</div>`;}document.getElementById('hst').innerHTML=h||'<div class="hc2">Henuz sinav cozulmedi</div>';}

function go(n){cE=n;cQ=n===0?[...Q].sort(()=>Math.random()-.5):Q.filter(q=>q.sinav===n);cI=0;cC=0;cW=0;dn=false;wl=[];document.getElementById('qT').textContent=n===0?'Tum Sorular':`${n}. Sinav`;sh('quiz');rd();}

function rd(){const q=cQ[cI],t=cQ.length;document.getElementById('qU').textContent=`Soru ${cI+1} / ${t}`;document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('pF').style.width=`${(cI/t)*100}%`;
let h=`<div class="qb">Soru ${cI+1} / ${t}</div><div class="qt2">${q.body}</div><div class="os">`;
q.options.forEach((o,i)=>{h+=`<div class="o" onclick="pk(this,${i})"><div class="lt">${L[i]}</div><div class="tx">${o}</div></div>`;});
h+=`</div><div class="ex" id="ex"></div>`;document.getElementById('cI').innerHTML=h;document.getElementById('nB').disabled=true;document.getElementById('nB').textContent=cI<t-1?'Sonraki \u2192':'Sonuclari Gor';dn=false;
const c=document.getElementById('qC');c.classList.remove('ol');c.classList.add('en');requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.remove('en')));}

function pk(el,i){if(dn)return;dn=true;const q=cQ[cI],ci=q.answer.charCodeAt(0)-65;document.querySelectorAll('.o').forEach(o=>o.classList.add('dm'));el.classList.remove('dm');
if(i===ci){el.classList.add('rt');cC++;}else{el.classList.add('fl');const ce=document.querySelectorAll('.o')[ci];ce.classList.remove('dm');ce.classList.add('ht');cW++;const ref=gr(q);const ex=document.getElementById('ex');ex.innerHTML=`<b>Dogru cevap: ${L[ci]})</b> ${q.options[ci]}<br><br><b>Kitaptaki yeri:</b> ${ref}`;ex.classList.add('on');wl.push({q,y:L[i],c:L[ci],ref});}
document.getElementById('pG').textContent=cC;document.getElementById('pR').textContent=cW;document.getElementById('nB').disabled=false;}

function nx(){document.getElementById('qC').classList.add('ol');setTimeout(()=>{cI++;if(cI>=cQ.length){srs();return;}rd();},280);}

function srs(){sh('result');const t=cQ.length,p=Math.round((cC/t)*100);document.getElementById('rP').textContent=p;document.getElementById('rC').textContent=cC;document.getElementById('rW').textContent=cW;
document.getElementById('rR').className='rr '+(p>=70?'gd':p>=50?'md':'bd');
document.getElementById('rE').textContent=p>=90?'\uD83C\uDF1F':p>=70?'\uD83D\uDE0A':p>=50?'\uD83D\uDE10':'\uD83D\uDE1E';
document.getElementById('rT').textContent=p>=90?'Mukemmel!':p>=70?'Basarili!':p>=50?'Gelistirilmeli':'Calismaniz Gerekiyor';
document.getElementById('rS').textContent=`${t} sorudan ${cC} dogru, ${cW} yanlis`;
if(cE>0){const s=JSON.parse(localStorage.getItem('ns')||'{}');const pr=s[`s${cE}`];if(!pr||p>pr.p)s[`s${cE}`]={c:cC,w:cW,p};localStorage.setItem('ns',JSON.stringify(s));}}

function sr(){sh('review');if(!wl.length){document.getElementById('rL').innerHTML='<div class="rvem">Tebrikler! Hic yanlis yok! \uD83C\uDF89</div>';return;}
let h='';wl.forEach((w,i)=>{h+=`<div class="rc"><div class="rn">Yanlis #${i+1}</div><div class="rb2">${w.q.body.replace(/\n/g,'<br>')}</div><div class="ar2"><span class="yr">\u2717 ${w.y})</span><span class="cr">\u2713 ${w.c}) ${w.q.options[w.c.charCodeAt(0)-65]}</span></div><div class="rf"><b>Kitaptaki Yeri:</b>${w.ref}</div></div>`;});
document.getElementById('rL').innerHTML=h;}

uh();
</script>
